<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/admin_auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理员登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #1a1d24;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 380px;
            background: #252a33;
            border-radius: 12px;
            padding: 32px 28px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.35);
        }
        h1 { color: #e8eaed; font-size: 20px; text-align: center; margin-bottom: 24px; font-weight: 600; }
        .field { margin-bottom: 16px; }
        label { display: block; color: #9aa0a6; font-size: 13px; margin-bottom: 6px; }
        input {
            width: 100%;
            height: 44px;
            border: 1px solid #3c4043;
            border-radius: 8px;
            background: #1a1d24;
            color: #e8eaed;
            padding: 0 12px;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #8ab4f8; }
        .btn {
            width: 100%;
            height: 46px;
            margin-top: 8px;
            background: #8ab4f8;
            color: #202124;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .err { color: #f28b82; font-size: 13px; margin-top: 12px; min-height: 1.2em; }
        .back { text-align: center; margin-top: 20px; }
        .back a { color: #8ab4f8; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>管理后台</h1>
        <div class="field">
            <label for="u">账号</label>
            <input type="text" id="u" autocomplete="username" placeholder="管理员账号">
        </div>
        <div class="field">
            <label for="p">密码</label>
            <input type="password" id="p" autocomplete="current-password" placeholder="密码">
        </div>
        <p class="err" id="err"></p>
        <button type="button" class="btn" id="btn">登录</button>
        <div class="back"><a href="index.html">返回用户登录</a></div>
    </div>
    <script>
        function showErr(m) {
            document.getElementById('err').textContent = m || '';
        }
        document.getElementById('btn').addEventListener('click', function () {
            var u = document.getElementById('u').value.trim();
            var p = document.getElementById('p').value;
            if (!u || !p) {
                showErr('请输入账号和密码');
                return;
            }
            var btn = document.getElementById('btn');
            btn.disabled = true;
            showErr('');
            fetch('api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            })
                .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
                .then(function (x) {
                    if (x.ok && x.j.code === 200 && x.j.data && x.j.data.token) {
                        localStorage.setItem('admin_token', x.j.data.token);
                        window.location.href = 'admin_panel.html';
                        return;
                    }
                    showErr((x.j && x.j.msg) || '登录失败');
                })
                .catch(function () {
                    showErr('网络错误');
                })
                .finally(function () {
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
