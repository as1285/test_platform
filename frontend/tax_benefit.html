<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260513-track-no-userid"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>可享税收优惠信息</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .header {
            flex-shrink: 0;
            background: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f0f0f0;
        }
        .back-btn {
            position: absolute;
            left: 12px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
            max-width: 62%;
            text-align: center;
            line-height: 1.25;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px 100px;
            min-height: 0;
        }
        .empty-illus { width: 200px; height: 170px; margin-bottom: 22px; }
        .empty-primary { font-size: 15px; color: #888; margin-bottom: 12px; }
        .empty-secondary {
            font-size: 13px;
            color: #aaa;
            line-height: 1.6;
            text-align: center;
            max-width: 300px;
        }
        .footer {
            flex-shrink: 0;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
            background: #f5f6fa;
        }
        .btn-add {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 6px;
            background: #1e6fff;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-add:active { opacity: 0.92; }
    </style>
</head>
<body>
    <div class="header">
        <a href="personal_info.html" class="back-btn">
            <img src="jt.png" alt="" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">可享税收优惠信息</span>
    </div>
    <div class="main">
        <svg class="empty-illus" viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
                <linearGradient id="docg" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#5b8cff"/>
                    <stop offset="100%" stop-color="#8b6cff"/>
                </linearGradient>
                <filter id="ds" x="-15%" y="-15%" width="130%" height="130%">
                    <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.1"/>
                </filter>
            </defs>
            <rect x="44" y="28" width="112" height="118" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ds)"/>
            <rect x="56" y="42" width="32" height="32" rx="6" fill="url(#docg)"/>
            <rect x="96" y="48" width="48" height="5" rx="2" fill="#eef1f6"/>
            <rect x="96" y="60" width="40" height="5" rx="2" fill="#eef1f6"/>
            <rect x="96" y="72" width="52" height="5" rx="2" fill="#eef1f6"/>
            <rect x="56" y="88" width="88" height="5" rx="2" fill="#eef1f6"/>
            <rect x="56" y="100" width="72" height="5" rx="2" fill="#eef1f6"/>
            <rect x="56" y="112" width="80" height="5" rx="2" fill="#eef1f6"/>
            <circle cx="132" cy="118" r="22" fill="#f5a623" stroke="#fff" stroke-width="3"/>
            <text x="132" y="126" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="system-ui,sans-serif">¥</text>
        </svg>
        <p class="empty-primary">当前没有信息</p>
        <p class="empty-secondary">如有残疾、烈属等可享税收优惠情形，请添加税收优惠减免备案</p>
    </div>
    <div class="footer">
        <button type="button" class="btn-add">添加</button>
    </div>
    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
</body>
</html>
