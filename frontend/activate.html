<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>账号激活</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #e8f2ff 0%, #f5f6fa 40%);
            min-height: 100vh;
            padding: 24px 20px 40px;
        }
        .card {
            max-width: 400px;
            margin: 40px auto 0;
            background: #fff;
            border-radius: 16px;
            padding: 28px 22px;
            box-shadow: 0 8px 32px rgba(30, 111, 255, 0.08);
        }
        h1 { font-size: 20px; color: #333; text-align: center; margin-bottom: 8px; font-weight: 600; }
        .sub { font-size: 14px; color: #888; text-align: center; margin-bottom: 24px; line-height: 1.5; }
        label { display: block; font-size: 14px; color: #555; margin-bottom: 8px; }
        input[type="text"] {
            width: 100%;
            height: 48px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 0 14px;
            font-size: 16px;
            letter-spacing: 0.05em;
        }
        input:focus { outline: none; border-color: #1e6fff; }
        .btn {
            width: 100%;
            height: 48px;
            margin-top: 20px;
            background: #1e6fff;
            color: #fff;
            border: none;
            border-radius: 24px;
            font-size: 17px;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary {
            background: #fff;
            color: #1e6fff;
            border: 1px solid #d0d8e8;
            margin-top: 12px;
        }
        .err { color: #e53935; font-size: 13px; margin-top: 10px; min-height: 1.2em; }
        .ok { color: #2e7d32; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>账号激活</h1>
        <p class="sub">请输入管理员提供的激活码。激活后方可使用税务记录等功能。</p>
        <label for="code">激活码</label>
        <input type="text" id="code" placeholder="粘贴或输入激活码" autocomplete="off" autocapitalize="characters">
        <p class="err" id="errBox"></p>
        <p class="ok" id="okBox"></p>
        <button type="button" class="btn" id="btnActivate">立即激活</button>
        <button type="button" class="btn btn-secondary" id="btnLogout">退出并换账号</button>
    </div>
    <script>
        function showErr(msg) {
            document.getElementById('errBox').textContent = msg || '';
            document.getElementById('okBox').textContent = '';
        }
        function showOk(msg) {
            document.getElementById('okBox').textContent = msg || '';
            document.getElementById('errBox').textContent = '';
        }

        document.getElementById('btnActivate').addEventListener('click', function () {
            var code = document.getElementById('code').value.trim();
            if (!code) {
                showErr('请输入激活码');
                return;
            }
            var btn = document.getElementById('btnActivate');
            btn.disabled = true;
            showErr('');
            fetch('api/auth.php', {
                method: 'POST',
                headers: typeof authHeaders === 'function' ? authHeaders() : { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'activate', code: code })
            })
                .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
                .then(function (x) {
                    if (x.status === 200 && x.body.code === 200 && x.body.data) {
                        var d = x.body.data;
                        if (d.token) localStorage.setItem('token', d.token);
                        localStorage.setItem('account_active', '1');
                        if (d.user_id) localStorage.setItem('user_id', d.user_id);
                        if (d.real_name) localStorage.setItem('real_name', d.real_name);
                        showOk('激活成功，正在进入…');
                        setTimeout(function () { window.location.href = 'mine.html'; }, 400);
                        return;
                    }
                    showErr((x.body && x.body.msg) || '激活失败');
                })
                .catch(function () {
                    showErr('网络错误');
                })
                .finally(function () {
                    btn.disabled = false;
                });
        });

        document.getElementById('btnLogout').addEventListener('click', function () {
            if (typeof authClearSession === 'function') authClearSession();
            else {
                localStorage.removeItem('token');
                localStorage.removeItem('account_active');
            }
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
