<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人所得税</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #fff;
            min-height: 100vh;
        }
        
        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 15px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .back-btn {
            position: absolute;
            left: 16px;
            color: #1e6fff;
            font-size: 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }
        
        /* 头像区域 */
        .avatar-section {
            display: flex;
            justify-content: center;
            padding: 50px 0 40px;
        }
        
        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(180deg, #a8d4ff 0%, #e8f4ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .avatar-icon {
            width: 50px;
            height: 50px;
        }
        
        /* 表单区域 */
        .form-section {
            padding: 0 24px;
        }
        
        .form-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .form-label {
            width: 50px;
            font-size: 16px;
            color: #333;
            flex-shrink: 0;
        }
        
        .form-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
            padding: 0 10px;
        }
        
        .form-input::placeholder {
            color: #999;
        }
        
        .form-icon {
            width: 20px;
            height: 20px;
            color: #ccc;
            flex-shrink: 0;
        }
        
        /* 测试体验：通栏大按钮，与下方登录区视觉对齐 */
        .trial-row {
            display: flex;
            justify-content: center;
            padding: 12px 0 4px;
        }

        .trial-btn {
            width: 100%;
            height: 48px;
            border: 1px solid #1e6fff;
            border-radius: 24px;
            background: linear-gradient(180deg, #f5f9ff 0%, #eef4ff 100%);
            color: #1e6fff;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        .trial-btn:active {
            opacity: 0.88;
            background: #e4eeff;
        }

        body.login-test-guide-open {
            overflow: hidden;
            touch-action: none;
        }

        .trial-btn.login-test-guide-target {
            position: relative;
            z-index: 10001;
            box-shadow: 0 0 0 3px #1e6fff, 0 4px 20px rgba(30, 111, 255, 0.35);
        }

        #loginTestGuideLayer {
            position: fixed;
            inset: 0;
            z-index: 10000;
        }

        .login-test-guide-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.48);
        }

        .login-test-guide-card {
            position: absolute;
            left: 16px;
            right: 16px;
            bottom: 28%;
            max-width: 400px;
            margin: 0 auto;
            background: #fff;
            border-radius: 14px;
            padding: 16px 18px 14px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 10002;
        }

        .login-test-guide-card::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-2px);
            border: 10px solid transparent;
            border-top-color: #fff;
        }

        .login-test-guide-badge {
            display: inline-block;
            font-size: 11px;
            color: #1e40af;
            background: #dbeafe;
            padding: 2px 8px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .login-test-guide-title {
            font-size: 16px;
            font-weight: 600;
            color: #111;
            margin-bottom: 8px;
        }

        .login-test-guide-text {
            font-size: 14px;
            color: #444;
            line-height: 1.55;
            margin-bottom: 14px;
        }

        .login-test-guide-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .login-test-guide-btn {
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 15px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .login-test-guide-btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .login-test-guide-btn-primary {
            background: linear-gradient(135deg, #1e6fff 0%, #4d9aff 100%);
            color: #fff;
        }
        
        /* 按钮区域 */
        .btn-section {
            padding: 30px 24px 20px;
        }
        
        .login-btn {
            width: 100%;
            height: 48px;
            background: #1e6fff;
            border: none;
            border-radius: 24px;
            font-size: 17px;
            color: #fff;
            cursor: pointer;
            margin-bottom: 16px;
        }
        
        .register-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 48px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 17px;
            color: #1e6fff;
            cursor: pointer;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <a href="javascript:history.back()" class="back-btn">
            <img src="jt.png" alt="" width="9" height="15" style="width: 9px; height: auto; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">个人所得税</span>
    </div>
    
    <!-- 头像区域 -->
    <div class="avatar-section">
        <div class="avatar">
            <svg class="avatar-icon" viewBox="0 0 50 50" fill="none">
                <!-- 头部 -->
                <circle cx="25" cy="18" r="10" fill="#4a9eff"/>
                <!-- 身体 -->
                <path d="M10 45 C10 32 40 32 40 45" fill="#4a9eff"/>
                <!-- 笑脸 -->
                <path d="M21 20 Q25 24 29 20" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
    </div>
    
    <!-- 表单区域 -->
    <div class="form-section">
        <div class="form-item">
            <span class="form-label">账号</span>
            <input type="text" id="loginUsername" class="form-input" placeholder="手机号码/证件号码" autocomplete="username">
            <svg class="form-icon" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" stroke="#ccc" stroke-width="2"/>
                <text x="12" y="16" font-size="12" fill="#ccc" text-anchor="middle">?</text>
            </svg>
        </div>
        <div class="form-item">
            <span class="form-label">密码</span>
            <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" autocomplete="current-password">
        </div>
        
        <div class="trial-row">
            <button type="button" class="trial-btn" id="trialExperienceBtn" onclick="doTestLogin()">测试体验</button>
        </div>
    </div>
    
    <!-- 按钮区域 -->
    <div class="btn-section">
        <button type="button" class="login-btn" onclick="doLogin()">登录</button>
        <a href="register.html" class="register-btn">注册</a>
    </div>
    
    <script>
        var LOGIN_TEST_EXPERIENCE_GUIDE_KEY = 'login_test_experience_guide_v1';

        function dismissLoginTestGuide(permanent) {
            var layer = document.getElementById('loginTestGuideLayer');
            if (layer) {
                layer.remove();
            }
            var btn = document.getElementById('trialExperienceBtn');
            if (btn) {
                btn.classList.remove('login-test-guide-target');
            }
            document.body.classList.remove('login-test-guide-open');
            if (permanent) {
                try {
                    localStorage.setItem(LOGIN_TEST_EXPERIENCE_GUIDE_KEY, '1');
                } catch (e0) {}
            }
        }

        function showLoginTestExperienceGuide() {
            var btn = document.getElementById('trialExperienceBtn');
            if (!btn || document.getElementById('loginTestGuideLayer')) {
                return;
            }
            try {
                btn.scrollIntoView({ block: 'center', behavior: 'smooth' });
            } catch (e1) {
                btn.scrollIntoView(true);
            }
            btn.classList.add('login-test-guide-target');
            document.body.classList.add('login-test-guide-open');

            var layer = document.createElement('div');
            layer.id = 'loginTestGuideLayer';
            layer.setAttribute('role', 'dialog');
            layer.setAttribute('aria-modal', 'true');
            layer.setAttribute('aria-labelledby', 'loginTestGuideTitle');
            layer.innerHTML =
                '<div class="login-test-guide-backdrop" data-ltg-dismiss="1"></div>' +
                '<div class="login-test-guide-card">' +
                '<span class="login-test-guide-badge">快速体验</span>' +
                '<div class="login-test-guide-title" id="loginTestGuideTitle">测试体验</div>' +
                '<p class="login-test-guide-text">点击该按钮将自动填入内置演示账号并登录，用于查看个人中心、办税数据等功能。也可自行输入账号密码后点「登录」。若不再需要本提示，点「知道了」即可。</p>' +
                '<div class="login-test-guide-actions">' +
                '<button type="button" class="login-test-guide-btn login-test-guide-btn-secondary" data-ltg-later="1">下次再说</button>' +
                '<button type="button" class="login-test-guide-btn login-test-guide-btn-primary" data-ltg-dismiss="1">知道了</button>' +
                '</div></div>';

            document.body.appendChild(layer);

            layer.addEventListener('click', function (ev) {
                var t = ev.target;
                if (t && t.getAttribute('data-ltg-dismiss') === '1') {
                    dismissLoginTestGuide(true);
                } else if (t && t.getAttribute('data-ltg-later') === '1') {
                    dismissLoginTestGuide(false);
                }
            });
        }

        function maybeShowLoginTestExperienceGuide() {
            try {
                if (localStorage.getItem(LOGIN_TEST_EXPERIENCE_GUIDE_KEY) === '1') {
                    return;
                }
            } catch (e2) {}
            setTimeout(showLoginTestExperienceGuide, 400);
        }

        /** 测试账号一键登录：账号 1 / 密码 1 */
        function doTestLogin() {
            dismissLoginTestGuide(false);
            document.getElementById('loginUsername').value = '1';
            document.getElementById('loginPassword').value = '1';
            doLogin();
        }

        function doLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;

            if (!username) {
                alert('请输入账号');
                return;
            }
            if (!password) {
                alert('请输入密码');
                return;
            }

            fetch('api/auth.php', {
                method: 'POST',
                headers: typeof authHeaders === 'function' ? authHeaders() : { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'login',
                    username: username,
                    password: password
                })
            })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.code === 200 && data.data) {
                        var d = data.data;
                        if (d.token) {
                            localStorage.setItem('token', d.token);
                        }
                        localStorage.setItem('userName', d.username || username);
                        localStorage.setItem('user_id', d.user_id || username);
                        localStorage.setItem('real_name', d.real_name || username);
                        var act = d.account_active === true || d.account_active === 1;
                        localStorage.setItem('account_active', act ? '1' : '0');
                        window.location.href = act ? 'mine.html' : 'activate.html';
                        return;
                    }
                    alert(data.msg || '登录失败');
                })
                .catch(function () {
                    alert('网络错误，请检查服务是否可用');
                });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', maybeShowLoginTestExperienceGuide);
        } else {
            maybeShowLoginTestExperienceGuide();
        }
    </script>
</body>
</html>
