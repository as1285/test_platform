<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260509-shellgrad50"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人所得税</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #fff;
            min-height: 100vh;
        }
        
        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 15px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .back-btn {
            position: absolute;
            left: 16px;
            color: #1e6fff;
            font-size: 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }
        
        /* 头像区域 */
        .avatar-section {
            display: flex;
            justify-content: center;
            padding: 50px 0 40px;
        }
        
        .avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(180deg, #a8d4ff 0%, #e8f4ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .avatar-icon {
            width: 50px;
            height: 50px;
        }
        
        /* 表单区域 */
        .form-section {
            padding: 0 24px;
        }
        
        .form-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .form-label {
            width: 50px;
            font-size: 16px;
            color: #333;
            flex-shrink: 0;
        }
        
        .form-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            color: #333;
            padding: 0 10px;
        }
        
        .form-input::placeholder {
            color: #999;
        }
        
        .form-icon {
            width: 20px;
            height: 20px;
            color: #ccc;
            flex-shrink: 0;
        }
        
        /* 按钮区域 */
        .btn-section {
            padding: 30px 24px 20px;
        }
        
        .login-btn {
            width: 100%;
            height: 48px;
            background: #1e6fff;
            border: none;
            border-radius: 24px;
            font-size: 17px;
            color: #fff;
            cursor: pointer;
            margin-bottom: 16px;
        }
        
        .register-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 48px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 17px;
            color: #1e6fff;
            cursor: pointer;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        #activateSection {
            display: none;
            padding: 0 24px 32px;
        }
        #activateSection.activate-visible {
            display: block;
        }
        .activate-hint {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 16px;
            text-align: center;
        }
        .activate-code-input {
            width: 100%;
            height: 48px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 0 14px;
            font-size: 16px;
            letter-spacing: 0.04em;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        .activate-code-input:focus {
            outline: none;
            border-color: #1e6fff;
        }
        .activate-btn {
            width: 100%;
            height: 48px;
            background: #1e6fff;
            border: none;
            border-radius: 24px;
            font-size: 17px;
            color: #fff;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .activate-btn:disabled {
            opacity: 0.6;
        }
        .activate-btn-secondary {
            background: #fff;
            color: #1e6fff;
            border: 1px solid #d0d8e8;
        }
        .activate-msg {
            font-size: 13px;
            min-height: 1.2em;
            margin-bottom: 8px;
            text-align: center;
        }
        .activate-msg.err {
            color: #e53935;
        }
        .activate-msg.ok {
            color: #2e7d32;
        }
    </style>
</head>
<body class="page-login">
    <script>
        (function () {
            try {
                if (navigator.userAgent.indexOf('MicroMessenger') !== -1) {
                    alert('⚠️ 微信内无法下载，请点右上角「…」→「在浏览器中打开」');
                }
            } catch (e) {}
        })();
    </script>
    <!-- 顶部导航 -->
    <div class="header">
        <a href="javascript:history.back()" class="back-btn">
            <img src="jt.png" alt="" width="9" height="15" style="width: 9px; height: auto; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">个人所得税</span>
    </div>
    
    <div id="loginMainWrap">
        <!-- 头像区域 -->
        <div class="avatar-section">
            <div class="avatar">
                <svg class="avatar-icon" viewBox="0 0 50 50" fill="none">
                    <!-- 头部 -->
                    <circle cx="25" cy="18" r="10" fill="#4a9eff"/>
                    <!-- 身体 -->
                    <path d="M10 45 C10 32 40 32 40 45" fill="#4a9eff"/>
                    <!-- 笑脸 -->
                    <path d="M21 20 Q25 24 29 20" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <!-- 表单区域 -->
        <div class="form-section">
            <div class="form-item">
                <span class="form-label">账号</span>
                <input type="text" id="loginUsername" class="form-input" placeholder="手机号码/证件号码" autocomplete="username" value="1">
                <svg class="form-icon" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="#ccc" stroke-width="2"/>
                    <text x="12" y="16" font-size="12" fill="#ccc" text-anchor="middle">?</text>
                </svg>
            </div>
            <div class="form-item">
                <span class="form-label">密码</span>
                <input type="password" id="loginPassword" class="form-input" placeholder="请输入密码" autocomplete="current-password" value="1">
            </div>
        </div>

        <!-- 按钮区域 -->
        <div class="btn-section">
            <button type="button" class="login-btn" onclick="doLogin()">登录</button>
            <a href="register.html" class="register-btn">注册</a>
        </div>
    </div>

    <div id="activateSection">
        <p class="activate-hint">您的账号尚未激活，请输入管理员提供的激活码。新用户注册时填写激活码即可直接开通，无需此步骤。</p>
        <p class="activate-msg" id="activateMsg"></p>
        <input type="text" id="activateCodeInput" class="activate-code-input" placeholder="粘贴或输入激活码" autocomplete="off" autocapitalize="characters">
        <button type="button" class="activate-btn" id="btnDoActivate">立即激活</button>
        <button type="button" class="activate-btn activate-btn-secondary" id="btnActivateLogout">退出并换账号</button>
    </div>

    <script>
        function isNeedActivateMode() {
            try {
                return new URLSearchParams(window.location.search).get('need_activate') === '1';
            } catch (e) {
                return false;
            }
        }

        function setActivateMsg(text, isErr) {
            var el = document.getElementById('activateMsg');
            if (!el) {
                return;
            }
            el.textContent = text || '';
            el.className = 'activate-msg' + (text ? (isErr ? ' err' : ' ok') : '');
        }

        function showActivateMode() {
            var main = document.getElementById('loginMainWrap');
            var act = document.getElementById('activateSection');
            if (main) {
                main.style.display = 'none';
            }
            if (act) {
                act.classList.add('activate-visible');
            }
            try {
                document.querySelector('.header-title').textContent = '账号激活';
            } catch (e0) {}
        }

        function initActivateFromUrl() {
            if (!isNeedActivateMode()) {
                return;
            }
            var token = '';
            try {
                token = localStorage.getItem('token') || '';
            } catch (e1) {}
            if (!token) {
                return;
            }
            try {
                if (localStorage.getItem('account_active') === '1') {
                    window.location.replace('mine.html');
                    return;
                }
            } catch (e2) {}
            showActivateMode();
        }

        initActivateFromUrl();

        document.getElementById('btnDoActivate').addEventListener('click', function () {
            var code = document.getElementById('activateCodeInput').value.trim();
            if (!code) {
                setActivateMsg('请输入激活码', true);
                return;
            }
            var btn = document.getElementById('btnDoActivate');
            btn.disabled = true;
            setActivateMsg('');
            fetch('api/auth.php', {
                method: 'POST',
                headers: typeof authHeaders === 'function' ? authHeaders() : { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'activate', code: code })
            })
                .then(function (r) {
                    return r.json().then(function (j) {
                        return { status: r.status, body: j };
                    });
                })
                .then(function (x) {
                    if (x.status === 200 && x.body.code === 200 && x.body.data) {
                        var d = x.body.data;
                        if (d.token) {
                            localStorage.setItem('token', d.token);
                        }
                        localStorage.setItem('account_active', '1');
                        localStorage.setItem('is_test_account', d.is_test_account ? '1' : '0');
                        if (d.user_id) {
                            localStorage.setItem('user_id', d.user_id);
                        }
                        if (d.real_name) {
                            localStorage.setItem('real_name', d.real_name);
                        }
                        setActivateMsg('激活成功，正在进入…', false);
                        setTimeout(function () {
                            window.location.href = 'mine.html';
                        }, 400);
                        return;
                    }
                    setActivateMsg((x.body && x.body.msg) || '激活失败', true);
                })
                .catch(function () {
                    setActivateMsg('网络错误', true);
                })
                .finally(function () {
                    btn.disabled = false;
                });
        });

        document.getElementById('btnActivateLogout').addEventListener('click', function () {
            if (typeof authClearSession === 'function') {
                authClearSession();
            } else {
                try {
                    localStorage.removeItem('token');
                    localStorage.removeItem('account_active');
                } catch (e3) {}
            }
            window.location.href = 'index.html';
        });

        function doLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;

            if (!username) {
                alert('请输入账号');
                return;
            }
            if (!password) {
                alert('请输入密码');
                return;
            }

            fetch('api/auth.php', {
                method: 'POST',
                headers: typeof authHeaders === 'function' ? authHeaders() : { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'login',
                    username: username,
                    password: password
                })
            })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.code === 200 && data.data) {
                        var d = data.data;
                        if (d.token) {
                            localStorage.setItem('token', d.token);
                        }
                        localStorage.setItem('userName', d.username || username);
                        localStorage.setItem('user_id', d.user_id || username);
                        localStorage.setItem('real_name', d.real_name || username);
                        var act = d.account_active === true || d.account_active === 1;
                        localStorage.setItem('account_active', act ? '1' : '0');
                        localStorage.setItem('is_test_account', d.is_test_account ? '1' : '0');
                        window.location.href = act ? 'mine.html' : 'index.html?need_activate=1';
                        return;
                    }
                    alert(data.msg || '登录失败');
                })
                .catch(function () {
                    alert('网络错误，请检查服务是否可用');
                });
        }

        function ensureDefaultLoginCredentials() {
            if (isNeedActivateMode()) {
                return;
            }
            var u = document.getElementById('loginUsername');
            var p = document.getElementById('loginPassword');
            if (u && String(u.value).trim() === '') {
                u.value = '1';
            }
            if (p && String(p.value).trim() === '') {
                p.value = '1';
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', ensureDefaultLoginCredentials);
        } else {
            ensureDefaultLoginCredentials();
        }
    </script>
</body>
</html>
