<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收入纳税明细</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* 顶部导航 */
        .header {
            background: #fff;
            padding: calc(15px + env(safe-area-inset-top, 0px)) 16px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #eee;
        }
        
        .back-btn {
            position: absolute;
            left: 16px;
            color: #1e6fff;
            font-size: 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }
        
        /* 内容区域 */
        .content {
            padding: 0 0 100px;
        }
        
        /* 区块标题 */
        .section-title {
            padding: 20px 16px 12px;
            font-size: 15px;
            color:#000000;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: #1e6fff;
            border-radius: 2px;
        }
        
        /* 年度选择：三栏 flex，左右箭头用 SVG，避免系统字体 > 粗细不一 */
        .year-select {
            background: #fff;
            margin: 0 16px;
            border-radius: 8px;
            padding: 14px 12px 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            min-height: 48px;
        }
        
        .year-label {
            font-size: 15px;
            color: #333;
            flex: 0 0 auto;
        }
        
        .year-value {
            flex: 1;
            text-align: center;
            color: #000;
            font-size: 15px;
            font-weight: 400;
        }
        
        .year-chevron-wrap {
            flex: 0 0 auto;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        
        .year-chevron {
            width: 18px;
            height: 18px;
            color: #c8c8c8;
            flex-shrink: 0;
        }
        .year-chevron path {
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        /* 所得类型列表 */
        .type-list {
            background: #fff;
            margin: 0 16px;
            border-radius: 8px;
        }
        
        .type-item {
            padding: 13px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .type-item:last-child {
            border-bottom: none;
        }

        /* 第四项与「其他类型」之间只保留一条分隔线（由 .type-toggle 的 border-top 承担） */
        .type-list > .type-item:nth-child(4) {
            border-bottom: none;
        }
        
        .check-icon {
            width: 22px;
            height: 22px;
            background: #1e6fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .check-icon svg {
            width: 14px;
            height: 14px;
        }
        
        /* 未选中的空心圆（与参考图一致） */
        .check-icon.check-off {
            background: transparent;
            border: 2px solid #ccc;
            box-sizing: border-box;
        }
        .check-icon.check-off svg {
            display: none;
        }
        
        .type-text {
            font-size: 15px;
            color: #333;
        }
        
        .income-types-extra {
            display: none;
        }
        .income-types-extra.is-open {
            display: block;
        }
        
        /* 展开 / 收起：官方态 — 白卡片内一行，文案+双箭头整体居中，无右侧「>」 */
        .type-toggle {
            padding: 12px 16px 14px;
            color: #4d94ff;
            font-size: 15px;
            font-weight: 400;
            line-height: 1.4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            border-top: 1px solid #ebebeb;
        }
        .type-toggle.hidden {
            display: none;
        }
        .type-toggle-text {
            flex: 0 0 auto;
        }
        .type-toggle-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            display: block;
            color: currentColor;
        }
        .type-toggle-icon path {
            stroke: currentColor;
            stroke-width: 1.65;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
        
        /* 查询按钮：左右留白更接近官方 */
        .query-btn-wrapper {
            padding: 28px 28px 36px;
        }
        
        .query-btn {
            width: 100%;
            max-width: 100%;
            background: #1e6fff;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 13px 16px;
            font-size: 16px;
            cursor: pointer;
        }
        
        /* 日期选择器遮罩 */
        .picker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            display: none;
        }
        
        .picker-overlay.show {
            display: block;
        }
        
        /* 日期选择器 */
        .year-picker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 16px 16px 0 0;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        
        .year-picker.show {
            transform: translateY(0);
        }
        
        .picker-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
        }
        
        .picker-cancel {
            color: #666;
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        .picker-confirm {
            color: #1e6fff;
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        /* iOS风格滚轮选择器 */
        .picker-wrapper {
            position: relative;
            height: 200px;
            overflow: hidden;
        }
        
        /* 中间选中区域的灰色线条指示器 */
        .picker-indicator {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 40px;
            pointer-events: none;
            z-index: 2;
        }
        
        .picker-indicator::before,
        .picker-indicator::after {
            content: '';
            position: absolute;
            left: 16px;
            right: 16px;
            height: 1px;
            background: #e0e0e0;
        }
        
        .picker-indicator::before {
            top: 0;
        }
        
        .picker-indicator::after {
            bottom: 0;
        }
        
        /* 上下渐变遮罩 */
        .picker-mask-top,
        .picker-mask-bottom {
            position: absolute;
            left: 0;
            right: 0;
            height: 80px;
            pointer-events: none;
            z-index: 1;
        }
        
        .picker-mask-top {
            top: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 100%);
        }
        
        .picker-mask-bottom {
            bottom: 0;
            background: linear-gradient(to top, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0) 100%);
        }
        
        .picker-list {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        .picker-list::-webkit-scrollbar {
            display: none;
        }
        
        /* 上下留白，让第一个和最后一个选项能滚动到中间 */
        .picker-list::before,
        .picker-list::after {
            content: '';
            display: block;
            height: 80px;
        }
        
        .picker-item {
            height: 40px;
            line-height: 40px;
            text-align: center;
            font-size: 18px;
            color: #999;
            cursor: pointer;
            scroll-snap-align: center;
            transition: color 0.2s ease;
        }
        
        .picker-item.selected {
            color: #333;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <a href="shouye.html" class="back-btn">
            <img src="jt.png" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">收入纳税明细</span>
    </div>
    
    <!-- 内容区域 -->
    <div class="content">
        <!-- 请选择纳税年度 -->
        <div class="section-title">请选择纳税年度</div>
        <div class="year-select" id="yearSelect">
            <span class="year-label">年度</span>
            <span class="year-value" id="yearDisplay">2026</span>
            <span class="year-chevron-wrap" aria-hidden="true">
                <svg class="year-chevron" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 6l6 6-6 6" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </div>
        
        <!-- 请选择所得类型 -->
        <div class="section-title">请选择所得类型</div>
        <div class="type-list">
            <div class="type-item" role="checkbox" aria-checked="true" tabindex="0">
                <div class="check-icon">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="type-text">工资薪金</span>
            </div>
            <div class="type-item" role="checkbox" aria-checked="true" tabindex="0">
                <div class="check-icon">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="type-text">劳务报酬</span>
            </div>
            <div class="type-item" role="checkbox" aria-checked="true" tabindex="0">
                <div class="check-icon">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="type-text">稿酬</span>
            </div>
            <div class="type-item" role="checkbox" aria-checked="true" tabindex="0">
                <div class="check-icon">
                    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="type-text">特许权使用费</span>
            </div>

        <div class="type-toggle" id="btnExpandTypes" role="button" tabindex="0" aria-expanded="false">
            <span class="type-toggle-text">其他类型</span>
            <svg class="type-toggle-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M6 9l6 6 6-6"/>
                <path d="M6 5l6 6 6-6"/>
            </svg>
        </div>

            <div id="incomeTypesExtra" class="income-types-extra" aria-hidden="true">
                <div class="type-item" role="checkbox" aria-checked="false" tabindex="0">
                    <div class="check-icon check-off">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="type-text">经营所得</span>
                </div>
                <div class="type-item" role="checkbox" aria-checked="false" tabindex="0">
                    <div class="check-icon check-off">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="type-text">利息、股息、红利</span>
                </div>
                <div class="type-item" role="checkbox" aria-checked="false" tabindex="0">
                    <div class="check-icon check-off">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="type-text">财产租赁</span>
                </div>
                <div class="type-item" role="checkbox" aria-checked="false" tabindex="0">
                    <div class="check-icon check-off">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="type-text">财产转让</span>
                </div>
                <div class="type-item" role="checkbox" aria-checked="false" tabindex="0">
                    <div class="check-icon check-off">
                        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M5 12l5 5L20 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="type-text">偶然所得</span>
                </div>
            </div>

        <div class="type-toggle hidden" id="btnCollapseTypes" role="button" tabindex="0" aria-expanded="false">
            <span class="type-toggle-text">收起</span>
            <svg class="type-toggle-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M6 15l6-6 6 6"/>
                <path d="M6 19l6-6 6 6"/>
            </svg>
        </div>
        </div>
        
        <!-- 查询按钮 -->
        <div class="query-btn-wrapper">
            <button class="query-btn" onclick="doQuery()">查询</button>
        </div>
    </div>
    
    <!-- 日期选择器遮罩 -->
    <div class="picker-overlay" id="pickerOverlay"></div>
    
    <!-- 日期选择器 -->
    <div class="year-picker" id="yearPicker">
        <div class="picker-header">
            <button class="picker-cancel" id="pickerCancel">取消</button>
            <button class="picker-confirm" id="pickerConfirm">确定</button>
        </div>
        <div class="picker-wrapper">
            <!-- 中间选中区域指示器（两条灰色线） -->
            <div class="picker-indicator"></div>
            <!-- 上下渐变遮罩 -->
            <div class="picker-mask-top"></div>
            <div class="picker-mask-bottom"></div>
            <!-- 滚动列表 -->
            <div class="picker-list" id="pickerList">
                <div class="picker-item" data-year="2019">2019</div>
                <div class="picker-item" data-year="2020">2020</div>
                <div class="picker-item" data-year="2021">2021</div>
                <div class="picker-item" data-year="2022">2022</div>
                <div class="picker-item" data-year="2023">2023</div>
                <div class="picker-item" data-year="2024">2024</div>
                <div class="picker-item" data-year="2025">2025</div>
                <div class="picker-item" data-year="2026">2026</div>
            </div>
        </div>
    </div>
    
    <script>
        const yearSelect = document.getElementById('yearSelect');
        const yearDisplay = document.getElementById('yearDisplay');
        const pickerOverlay = document.getElementById('pickerOverlay');
        const yearPicker = document.getElementById('yearPicker');
        const pickerCancel = document.getElementById('pickerCancel');
        const pickerConfirm = document.getElementById('pickerConfirm');
        const pickerList = document.getElementById('pickerList');
        const pickerItems = document.querySelectorAll('.picker-item');
        
        // 从URL参数或localStorage获取上次选择的年份，默认当前年份
        function getInitialYear() {
            var urlParams = new URLSearchParams(window.location.search);
            // reset=1 时清除记忆，回到当前年份
            if (urlParams.get('reset') === '1') {
                localStorage.removeItem('selected_year');
                return new Date().getFullYear().toString();
            }
            // 优先从URL参数获取
            var yearFromUrl = urlParams.get('year');
            if (yearFromUrl) return yearFromUrl;
            // 其次从localStorage获取
            var yearFromStorage = localStorage.getItem('selected_year');
            if (yearFromStorage) return yearFromStorage;
            // 默认当前年份
            return new Date().getFullYear().toString();
        }
        
        let selectedYear = getInitialYear();
        const itemHeight = 40; // 每个选项的高度
        
        // 初始化显示
        document.getElementById('yearDisplay').textContent = selectedYear;
        
        // 打开选择器
        yearSelect.addEventListener('click', function() {
            pickerOverlay.classList.add('show');
            yearPicker.classList.add('show');
            // 滚动到当前选中的年份
            scrollToYear(selectedYear);
        });
        
        // 滚动到指定年份
        function scrollToYear(year) {
            const items = Array.from(pickerItems);
            const index = items.findIndex(item => item.dataset.year === year);
            if (index !== -1) {
                // 滚动位置 = 选项索引 * 选项高度
                pickerList.scrollTop = index * itemHeight;
            }
        }
        
        // 关闭选择器
        function closePicker() {
            pickerOverlay.classList.remove('show');
            yearPicker.classList.remove('show');
        }
        
        pickerOverlay.addEventListener('click', closePicker);
        pickerCancel.addEventListener('click', closePicker);
        
        // 滚动时更新选中状态
        let scrollTimer = null;
        pickerList.addEventListener('scroll', function() {
            // 实时更新选中样式
            updateSelectedItem();
            
            // 滚动停止后自动对齐
            clearTimeout(scrollTimer);
            scrollTimer = setTimeout(function() {
                snapToItem();
            }, 100);
        });
        
        // 根据滚动位置更新选中的选项
        function updateSelectedItem() {
            const scrollTop = pickerList.scrollTop;
            const centerIndex = Math.round(scrollTop / itemHeight);
            
            pickerItems.forEach((item, index) => {
                if (index === centerIndex) {
                    item.classList.add('selected');
                    selectedYear = item.dataset.year;
                } else {
                    item.classList.remove('selected');
                }
            });
        }
        
        // 滚动停止后对齐到最近的选项
        function snapToItem() {
            const scrollTop = pickerList.scrollTop;
            const targetIndex = Math.round(scrollTop / itemHeight);
            const targetScrollTop = targetIndex * itemHeight;
            
            pickerList.scrollTo({
                top: targetScrollTop,
                behavior: 'smooth'
            });
        }
        
        // 点击选项时滚动到该选项
        pickerItems.forEach((item, index) => {
            item.addEventListener('click', function() {
                pickerList.scrollTo({
                    top: index * itemHeight,
                    behavior: 'smooth'
                });
            });
        });
        
        // 确定选择
        pickerConfirm.addEventListener('click', function() {
            yearDisplay.textContent = selectedYear;
            closePicker();
        });
        
        // 查询
        function doQuery() {
            // 保存选择的年份到localStorage
            localStorage.setItem('selected_year', selectedYear);
            window.location.href = 'shuiming_result.html?year=' + selectedYear;
        }
        
        // 所得类型：默认四项，点击「其他类型」展开全部，「收起」还原
        (function () {
            var extra = document.getElementById('incomeTypesExtra');
            var btnExpand = document.getElementById('btnExpandTypes');
            var btnCollapse = document.getElementById('btnCollapseTypes');
            if (!extra || !btnExpand || !btnCollapse) return;
            function setExpanded(open) {
                extra.classList.toggle('is-open', open);
                extra.setAttribute('aria-hidden', open ? 'false' : 'true');
                btnExpand.classList.toggle('hidden', open);
                btnCollapse.classList.toggle('hidden', !open);
                btnExpand.setAttribute('aria-expanded', open ? 'true' : 'false');
                btnCollapse.setAttribute('aria-expanded', open ? 'true' : 'false');
            }
            btnExpand.addEventListener('click', function () { setExpanded(true); });
            btnCollapse.addEventListener('click', function () { setExpanded(false); });
        })();

        // 所得类型：多选，点击行切换勾选
        (function () {
            var list = document.querySelector('.type-list');
            if (!list) return;

            function syncAria(item) {
                var icon = item.querySelector('.check-icon');
                if (!icon) return;
                var on = !icon.classList.contains('check-off');
                item.setAttribute('aria-checked', on ? 'true' : 'false');
            }

            function toggleItem(item) {
                var icon = item.querySelector('.check-icon');
                if (!icon) return;
                icon.classList.toggle('check-off');
                syncAria(item);
            }

            list.addEventListener('click', function (e) {
                var item = e.target.closest('.type-item');
                if (!item || !list.contains(item)) return;
                toggleItem(item);
            });

            list.addEventListener('keydown', function (e) {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                var item = e.target.closest('.type-item');
                if (!item || !list.contains(item)) return;
                e.preventDefault();
                toggleItem(item);
            });
        })();
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
