<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260513-jump-aggregate"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>详情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 0));
        }
        .header {
            background: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        .back-btn {
            position: absolute;
            left: 12px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .header-title { font-size: 17px; font-weight: 500; color: #333; }
        .form-wrap {
            margin-top: 12px;
            background: #fff;
        }
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            min-height: 48px;
        }
        .form-row:last-of-type { border-bottom: none; }
        .form-label {
            font-size: 15px;
            color: #333;
            flex-shrink: 0;
            max-width: 46%;
        }
        .form-value {
            flex: 1;
            text-align: right;
            font-size: 15px;
            color: #999;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
        }
        .form-value.dark { color: #333; }
        .form-value.readonly {
            pointer-events: none;
            user-select: none;
        }
        .form-value.filled {
            color: #333;
        }
        .form-row-link {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            color: #999;
            font-size: 15px;
            text-decoration: none;
        }
        .form-row-link.dark { color: #333; }
        .form-row-extra {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 10px;
            margin-top: -6px;
        }
        .link-rare {
            font-size: 14px;
            color: #1e6fff;
            text-decoration: none;
        }
        .slider-section {
            margin: 16px 16px 0;
        }
        .slider-lane {
            position: relative;
            height: 48px;
            background: #eef1f6;
            border-radius: 4px;
            overflow: hidden;
        }
        .slider-hint {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            line-height: 48px;
            text-align: center;
            font-size: 14px;
            color: #999;
            pointer-events: none;
            user-select: none;
        }
        .slider-arrows {
            position: absolute;
            left: 0;
            top: 0;
            width: 52px;
            height: 48px;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            cursor: grab;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .slider-arrows:active { cursor: grabbing; }
        .slider-arrows svg {
            width: 26px;
            height: 26px;
            fill: #999;
        }
        .slider-arrows.verified {
            background: #e8f5e9;
        }
        .slider-arrows.verified svg {
            fill: #52c41a;
        }
        .footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
            background: #f5f6fa;
        }
        .btn-save {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            background: #7eb4ff;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-save:active { opacity: 0.92; }
        .btn-save:disabled {
            cursor: default;
            opacity: 1;
        }
        .hint-icon {
            display: inline-flex;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid #1e6fff;
            color: #1e6fff;
            font-size: 11px;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
            vertical-align: middle;
        }
        .form-row-pick {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 15px;
            color: #999;
            text-align: right;
            cursor: pointer;
            padding: 0;
            margin: 0;
            min-width: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .form-row-pick.dark { color: #333; }
        body.jtcy-picker-open {
            overflow: hidden;
            touch-action: none;
        }
        .picker-root {
            position: fixed;
            inset: 0;
            z-index: 300;
            visibility: hidden;
            pointer-events: none;
        }
        .picker-root.open {
            visibility: visible;
            pointer-events: auto;
        }
        .picker-mask {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            opacity: 0;
            transition: opacity 0.22s ease;
        }
        .picker-root.open .picker-mask { opacity: 1; }
        .picker-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            border-radius: 12px 12px 0 0;
            max-height: 56vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 0);
            transform: translateY(100%);
            transition: transform 0.26s ease;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
        }
        .picker-root.open .picker-sheet { transform: translateY(0); }
        .picker-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid #eee;
        }
        .picker-bar button {
            border: none;
            background: none;
            font-family: inherit;
            font-size: 16px;
            padding: 8px 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .picker-cancel { color: #333; }
        .picker-ok { color: #1e6fff; font-weight: 500; }
        .picker-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .picker-item {
            padding: 14px 16px;
            font-size: 17px;
            color: #333;
            text-align: center;
            border-bottom: 1px solid #f2f2f2;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .picker-item:last-child { border-bottom: none; }
        .picker-item:active { background: #f5f5f5; }
        .picker-item.selected {
            color: #1e6fff;
            font-weight: 500;
            background: #f5f9ff;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="jtcy.html" class="back-btn">
            <img src="jt.png" alt="" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">详情</span>
    </div>
    <div class="form-wrap">
        <div class="form-row">
            <span class="form-label">他(她)是我的</span>
            <button type="button" class="form-row-pick" id="jtcyRelationBtn" aria-haspopup="dialog" aria-expanded="false">
                <span id="jtcyRelationText">请选择与我的关系</span><span style="color:#ccc;">›</span>
            </button>
        </div>
        <div class="form-row">
            <span class="form-label">证件类型</span>
            <button type="button" class="form-row-pick dark" id="jtcyIdTypeBtn" data-id-type="resident" aria-haspopup="dialog" aria-expanded="false">
                <span id="jtcyIdTypeText">居民身份证</span><span style="color:#ccc;">›</span>
            </button>
        </div>
        <div class="form-row">
            <span class="form-label">证件号</span>
            <input type="text" class="form-value" id="jtcyIdNo" placeholder="请填写证件号" autocomplete="off" maxlength="18" inputmode="numeric" autocapitalize="characters" spellcheck="false">
        </div>
        <div class="form-row">
            <span class="form-label">姓名</span>
            <input type="text" class="form-value" id="jtcyName" placeholder="请填写姓名" autocomplete="name">
        </div>
        <div class="form-row-extra">
            <span></span>
            <a href="#" class="link-rare" onclick="return false;">录入生僻字</a>
        </div>
        <div class="form-row">
            <span class="form-label">国籍(地区)</span>
            <span class="form-value dark" style="pointer-events:none;">中华人民共和国</span>
        </div>
        <div class="form-row">
            <span class="form-label">出生日期<span class="hint-icon" title="18位身份证第7–14位为出生日期；15位老证第7–12位为出生年月日（YYMMDD）">i</span></span>
            <span class="form-value readonly" id="jtcyBirthDisplay">根据证件号自动填入</span>
        </div>
    </div>
    <div class="slider-section">
        <div class="slider-lane" id="jtcySliderLane">
            <span class="slider-hint" id="jtcySliderHint">请按住滑块，拖动到最右边</span>
            <div class="slider-arrows" id="jtcySliderHandle" aria-label="拖动滑块完成验证">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M9.29 15.88L13.17 12 9.29 8.12a1 1 0 011.41-1.41l4.59 4.59a1 1 0 010 1.41l-4.59 4.59a1 1 0 01-1.41-1.42z"/>
                    <path d="M4.29 15.88L8.17 12 4.29 8.12a1 1 0 011.41-1.41l4.59 4.59a1 1 0 010 1.41l-4.59 4.59a1 1 0 01-1.41-1.42z"/>
                </svg>
            </div>
        </div>
    </div>
    <div class="footer">
        <button type="button" class="btn-save" id="jtcySaveBtn" disabled>保存</button>
    </div>
    <div id="jtcyPickerRoot" class="picker-root" aria-hidden="true">
        <div class="picker-mask" id="jtcyPickerMask" role="presentation"></div>
        <div class="picker-sheet" role="dialog" aria-modal="true" aria-labelledby="jtcyPickerTitle">
            <div class="picker-bar">
                <button type="button" class="picker-cancel" id="jtcyPickerCancel">取消</button>
                <span id="jtcyPickerTitle" class="sr-only">请选择</span>
                <button type="button" class="picker-ok" id="jtcyPickerOk">确定</button>
            </div>
            <div class="picker-list" id="jtcyPickerList"></div>
        </div>
    </div>
    <script>
        (function () {
            var PLACEHOLDER = '根据证件号自动填入';
            var RELATIONS = ['配偶', '子', '女', '父母', '祖（外祖）父母', '其他'];
            var ID_TYPES = [
                { type: 'resident', label: '居民身份证' },
                { type: 'passport_foreign', label: '外国护照' },
                { type: 'hk_macau', label: '港澳居民来往内地通行证' },
                { type: 'taiwan', label: '台湾居民来往大陆通行证' },
                { type: 'passport_cn', label: '中国护照' },
                { type: 'foreign_pr', label: '外国人永久居留身份证' }
            ];
            var idInput = document.getElementById('jtcyIdNo');
            var nameInput = document.getElementById('jtcyName');
            var birthEl = document.getElementById('jtcyBirthDisplay');
            var saveBtn = document.getElementById('jtcySaveBtn');
            var sliderVerified = false;
            var typeBtn = document.getElementById('jtcyIdTypeBtn');
            var typeText = document.getElementById('jtcyIdTypeText');
            var relationBtn = document.getElementById('jtcyRelationBtn');
            var relationText = document.getElementById('jtcyRelationText');
            var pickerRoot = document.getElementById('jtcyPickerRoot');
            var pickerMask = document.getElementById('jtcyPickerMask');
            var pickerList = document.getElementById('jtcyPickerList');
            var pickerCancel = document.getElementById('jtcyPickerCancel');
            var pickerOk = document.getElementById('jtcyPickerOk');
            var pickerMode = '';
            var tempIndex = -1;
            var relationValue = '';

            function isResidentIdCard() {
                return typeBtn && String(typeBtn.getAttribute('data-id-type') || '') === 'resident';
            }

            function openPicker(mode) {
                if (!pickerRoot || !pickerList) return;
                pickerMode = mode;
                if (mode === 'relation') {
                    tempIndex = relationValue ? RELATIONS.indexOf(relationValue) : -1;
                } else if (mode === 'idtype') {
                    var cur = typeBtn ? typeBtn.getAttribute('data-id-type') : '';
                    tempIndex = -1;
                    for (var i = 0; i < ID_TYPES.length; i++) {
                        if (ID_TYPES[i].type === cur) {
                            tempIndex = i;
                            break;
                        }
                    }
                    if (tempIndex < 0) tempIndex = 0;
                }
                renderPickerList();
                pickerRoot.classList.add('open');
                pickerRoot.setAttribute('aria-hidden', 'false');
                document.body.classList.add('jtcy-picker-open');
                if (relationBtn) relationBtn.setAttribute('aria-expanded', mode === 'relation' ? 'true' : 'false');
                if (typeBtn) typeBtn.setAttribute('aria-expanded', mode === 'idtype' ? 'true' : 'false');
            }

            function closePicker() {
                if (pickerRoot) {
                    pickerRoot.classList.remove('open');
                    pickerRoot.setAttribute('aria-hidden', 'true');
                }
                document.body.classList.remove('jtcy-picker-open');
                if (relationBtn) relationBtn.setAttribute('aria-expanded', 'false');
                if (typeBtn) typeBtn.setAttribute('aria-expanded', 'false');
                pickerMode = '';
            }

            function renderPickerList() {
                if (!pickerList) return;
                pickerList.innerHTML = '';
                if (pickerMode === 'relation') {
                    RELATIONS.forEach(function (label, i) {
                        var el = document.createElement('button');
                        el.type = 'button';
                        el.className = 'picker-item' + (i === tempIndex ? ' selected' : '');
                        el.textContent = label;
                        el.addEventListener('click', function () {
                            tempIndex = i;
                            renderPickerList();
                        });
                        pickerList.appendChild(el);
                    });
                } else if (pickerMode === 'idtype') {
                    ID_TYPES.forEach(function (row, i) {
                        var el = document.createElement('button');
                        el.type = 'button';
                        el.className = 'picker-item' + (i === tempIndex ? ' selected' : '');
                        el.textContent = row.label;
                        el.addEventListener('click', function () {
                            tempIndex = i;
                            renderPickerList();
                        });
                        pickerList.appendChild(el);
                    });
                }
            }

            function confirmPicker() {
                if (pickerMode === 'relation') {
                    if (tempIndex >= 0 && tempIndex < RELATIONS.length) {
                        relationValue = RELATIONS[tempIndex];
                        if (relationText) relationText.textContent = relationValue;
                        if (relationBtn) relationBtn.classList.add('dark');
                    }
                } else if (pickerMode === 'idtype') {
                    if (tempIndex >= 0 && tempIndex < ID_TYPES.length) {
                        var row = ID_TYPES[tempIndex];
                        if (typeBtn) typeBtn.setAttribute('data-id-type', row.type);
                        if (typeText) typeText.textContent = row.label;
                        syncBirthFromId();
                    }
                }
                closePicker();
                syncSaveBtn();
            }

            if (relationBtn) {
                relationBtn.addEventListener('click', function () {
                    openPicker('relation');
                });
            }
            if (typeBtn) {
                typeBtn.addEventListener('click', function () {
                    openPicker('idtype');
                });
            }
            if (pickerCancel) pickerCancel.addEventListener('click', closePicker);
            if (pickerOk) pickerOk.addEventListener('click', confirmPicker);
            if (pickerMask) pickerMask.addEventListener('click', closePicker);
            document.addEventListener('keydown', function (ev) {
                if (ev.key === 'Escape' && pickerRoot && pickerRoot.classList.contains('open')) {
                    closePicker();
                }
            });

            function pad2(n) {
                return n < 10 ? '0' + n : String(n);
            }

            function validDate(y, m, d) {
                if (y < 1900 || y > 2100 || m < 1 || m > 12 || d < 1 || d > 31) return false;
                var dt = new Date(y, m - 1, d);
                return dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
            }

            /** 返回 YYYY-MM-DD 或 '' */
            function parseBirthFromChineseId(raw) {
                var s = String(raw || '').replace(/\s/g, '').toUpperCase();
                if (!s) return '';
                if (s.length === 18 && /^\d{17}[\dX]$/.test(s)) {
                    var y = parseInt(s.substring(6, 10), 10);
                    var m = parseInt(s.substring(10, 12), 10);
                    var d = parseInt(s.substring(12, 14), 10);
                    if (!validDate(y, m, d)) return '';
                    return y + '-' + pad2(m) + '-' + pad2(d);
                }
                if (s.length === 15 && /^\d{15}$/.test(s)) {
                    var yy = parseInt(s.substring(6, 8), 10);
                    var mm = parseInt(s.substring(8, 10), 10);
                    var dd = parseInt(s.substring(10, 12), 10);
                    var nowY = new Date().getFullYear();
                    var fullY = (2000 + yy <= nowY) ? (2000 + yy) : (1900 + yy);
                    if (!validDate(fullY, mm, dd)) return '';
                    return fullY + '-' + pad2(mm) + '-' + pad2(dd);
                }
                return '';
            }

            function syncBirthFromId() {
                if (!idInput || !birthEl) return;
                var birth = '';
                if (isResidentIdCard()) {
                    birth = parseBirthFromChineseId(idInput.value);
                }
                if (birth) {
                    var parts = birth.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                    if (parts) {
                        birthEl.textContent = parts[1] + '年' + parseInt(parts[2], 10) + '月' + parseInt(parts[3], 10) + '日';
                    } else {
                        birthEl.textContent = birth;
                    }
                    birthEl.classList.add('filled');
                    birthEl.setAttribute('data-iso', birth);
                } else {
                    birthEl.textContent = PLACEHOLDER;
                    birthEl.classList.remove('filled');
                    birthEl.removeAttribute('data-iso');
                }
            }

            function formReady() {
                var name = nameInput ? String(nameInput.value || '').trim() : '';
                var idNo = idInput ? String(idInput.value || '').trim() : '';
                if (!relationValue || !name || !idNo) return false;
                if (isResidentIdCard()) {
                    return !!(birthEl && birthEl.getAttribute('data-iso'));
                }
                return true;
            }

            function syncSaveBtn() {
                if (!saveBtn) return;
                var ok = sliderVerified && formReady();
                saveBtn.disabled = !ok;
                saveBtn.style.background = ok ? '#1e6fff' : '#7eb4ff';
            }

            function initSlider() {
                var lane = document.getElementById('jtcySliderLane');
                var handle = document.getElementById('jtcySliderHandle');
                var hint = document.getElementById('jtcySliderHint');
                if (!lane || !handle || !hint) return;
                var maxX = 0;
                var startLeft = 0;
                var startClientX = 0;
                var dragging = false;

                function layout() {
                    maxX = Math.max(0, lane.offsetWidth - handle.offsetWidth);
                }
                function setHandle(x) {
                    x = Math.max(0, Math.min(x, maxX));
                    handle.style.left = x + 'px';
                }
                function resetSlider() {
                    sliderVerified = false;
                    handle.style.left = '0px';
                    handle.classList.remove('verified');
                    hint.textContent = '请按住滑块，拖动到最右边';
                    hint.style.color = '#999';
                    syncSaveBtn();
                }
                function onPointerDown(e) {
                    if (handle.classList.contains('verified')) return;
                    dragging = true;
                    layout();
                    startLeft = handle.offsetLeft;
                    startClientX = e.clientX != null ? e.clientX : e.touches[0].clientX;
                    e.preventDefault();
                }
                function onPointerMove(e) {
                    if (!dragging) return;
                    var cx = e.clientX != null ? e.clientX : (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
                    setHandle(startLeft + cx - startClientX);
                    e.preventDefault();
                }
                function onPointerUp() {
                    if (!dragging) return;
                    dragging = false;
                    layout();
                    if (handle.offsetLeft >= maxX - 2) {
                        sliderVerified = true;
                        handle.classList.add('verified');
                        hint.textContent = '验证通过';
                        hint.style.color = '#52c41a';
                        syncSaveBtn();
                    } else {
                        resetSlider();
                    }
                }

                handle.addEventListener('mousedown', onPointerDown);
                handle.addEventListener('touchstart', onPointerDown, { passive: false });
                document.addEventListener('mousemove', onPointerMove);
                document.addEventListener('touchmove', onPointerMove, { passive: false });
                document.addEventListener('mouseup', onPointerUp);
                document.addEventListener('touchend', onPointerUp);
                document.addEventListener('touchcancel', onPointerUp);
                window.addEventListener('resize', function () {
                    if (!handle.classList.contains('verified')) {
                        layout();
                        setHandle(handle.offsetLeft);
                    }
                });
                layout();
            }

            if (idInput) {
                idInput.addEventListener('input', function () {
                    syncBirthFromId();
                    syncSaveBtn();
                });
                idInput.addEventListener('paste', function () {
                    setTimeout(function () {
                        syncBirthFromId();
                        syncSaveBtn();
                    }, 0);
                });
            }
            if (nameInput) {
                nameInput.addEventListener('input', syncSaveBtn);
            }
            if (saveBtn) {
                saveBtn.addEventListener('click', function () {
                    if (saveBtn.disabled) return;
                    var name = nameInput ? String(nameInput.value || '').trim() : '';
                    var idNo = idInput ? String(idInput.value || '').trim() : '';
                    if (!relationValue || !name || !idNo) {
                        alert('请完整填写信息');
                        return;
                    }
                    saveBtn.disabled = true;
                    saveBtn.textContent = '保存中…';
                    var idType = typeBtn ? String(typeBtn.getAttribute('data-id-type') || 'resident') : 'resident';
                    var idTypeLabel = typeText ? String(typeText.textContent || '').trim() : '';
                    var birthIso = birthEl ? birthEl.getAttribute('data-iso') || '' : '';
                    var fetchFn = typeof authFetch === 'function' ? authFetch : fetch;
                    var headers = typeof authHeaders === 'function' ? authHeaders() : { 'Content-Type': 'application/json' };
                    fetchFn('api/user.php', {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            action: 'add_family_member',
                            real_name: name,
                            relation: relationValue,
                            id_type: idType,
                            id_type_label: idTypeLabel,
                            id_no: idNo,
                            birth_date: birthIso
                        })
                    })
                        .then(function (r) {
                            return r.json().then(function (j) {
                                return { status: r.status, body: j };
                            });
                        })
                        .then(function (x) {
                            if (x.status === 200 && x.body && x.body.code === 200) {
                                var cnt =
                                    x.body.data && x.body.data.family_count != null
                                        ? Number(x.body.data.family_count)
                                        : null;
                                try {
                                    if (cnt != null && !isNaN(cnt)) {
                                        localStorage.setItem('family_count', String(cnt));
                                    }
                                } catch (e) {}
                                window.location.href = 'jtcy.html';
                                return;
                            }
                            alert((x.body && x.body.msg) || '保存失败');
                        })
                        .catch(function () {
                            alert('网络错误，请稍后重试');
                        })
                        .finally(function () {
                            saveBtn.textContent = '保存';
                            syncSaveBtn();
                        });
                });
            }

            syncBirthFromId();
            initSlider();
            syncSaveBtn();
        })();
    </script>
    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
</body>
</html>
