server {
    listen 80;
    server_name localhost;

    # 管理端上传等资源：默认 1m 会导致 413；0 表示不限制请求体大小（仍受磁盘与上游内存约束）
    client_max_body_size 0;

    location /api/ {
        # 指向后端 API 服务（Docker 网络内用服务名）
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 避免上游偶发慢（DB 冷启动、长事务）时默认 60s 过短导致 504；仍无法解决「进程挂死」类问题
        proxy_connect_timeout 15s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # 根路径显式跳转到登录页（与 frontend/index.html 一致）
    location = / {
        return 302 /index.html;
    }

    # 首页横幅更新后避免浏览器长期缓存旧图
    location = /sydb-v2.jpg {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /sydb.jpg {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /message_header.jpg {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /daiban.jpg {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ^~ /uploads/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 底栏图标与内置静态图在镜像构建时固定，允许浏览器缓存，减少 tab 切换时的闪烁/卡顿
    location ^~ /caidan/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location ~* \.(?:png|jpg|jpeg|webp|gif|svg|ico)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # 壳内状态栏/登录态等关键脚本需要及时生效，避免 WebView 继续使用旧 auth.js
    location ^~ /js/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 页面结构经常调整（状态栏安全区、导航热区等），HTML 不缓存，避免壳内 WebView 继续使用旧页面
    location ~* \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # iOS 描述文件：正确 MIME，便于 Safari 触发「安装描述文件」
    location = /personal.mobileconfig {
        root /usr/share/nginx/html;
        default_type application/x-apple-aspen-config;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Content-Disposition "attachment; filename=personal.mobileconfig";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
