<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f5f6fa;
            min-height: 100vh;
            max-width: 100vw;
            overflow-x: hidden;
        }
        
        /* 顶部蓝色背景区域 */
        .header-bg {
        }
        
        .header-bg img {
            width: 100%;
            display: block;
        }
        
        /* 内容包装器 - 顶部圆角 */
        .content-wrapper {
            background: #f5f6fa;
            border-radius: 20px 20px 0 0;
            margin-top: -20px;
            position: relative;
            z-index: 10;
            padding-top: 10px;
        }
        
        /* 用户信息卡片 */
        .user-card {
            background: #eed3aa;
            margin: -70px 16px 9px;
            border-radius: 12px 12px 0 0;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 10;
        }
        
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .user-name {
            font-size: 14.5px;
            color: #333;
            margin-bottom: 8px;
        }
        
        .user-id {
            font-size: 12px;
            color: #b46d03;
        }
        
        .personal-info-btn {
            background: #edaa66;
            border: none;
            border-radius: 20px 0 0 20px;
            padding: 4px 14px;
            font-size: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .personal-info-btn::after {
            content: '>';
            font-size: 12px;
        }
        
        /* 功能入口区域 */
        .function-cards {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-left: 16px;
            margin-right: 16px;
        }
        
        .function-card {
            flex: 1;
            background: #fff;
            border-radius: 12px;
            padding: 7px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .function-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .function-title {
            font-size: 15px;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .function-btn {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }
        
        .function-btn.orange {
            background: transparent;
            color: #0050fd;
            border: 1px solid #0050fd;
        }
        
        .function-btn.blue {
            background: linear-gradient(135deg, #1a94ff 0%, #008afd 100%);
            color: #fff;
        }
        
        /* 菜单列表 */
        .menu-list {
            background: #fff;
            margin: 16px;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-icon {
            width: 21px;
            margin-right: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .menu-text {
            flex: 1;
            font-size: 15px;
            color: #333;
        }
        
        .menu-arrow {
            color: #000000;
            font-size: 14px;
        }
        
        /* 退出登录 */
        .logout-section {
            background: #fff;
            margin: 16px;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        
        .logout-btn {
            color: #1e6fff;
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
        }
        
        /* 页面切换 */
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
            padding-bottom: 80px;
        }
        
        </style>

    <script>
        // 纳税人识别号显示状态
        var taxIdVisible = false;
        
        // 切换纳税人识别号显示/隐藏
        function toggleTaxId() {
            var taxId = localStorage.getItem('tax_id');
            if (!taxId) {
                taxId = '620000000000000000'; // 默认值
            }
            
            taxIdVisible = !taxIdVisible;
            updateTaxIdDisplay(taxId);
        }
        
        // 更新纳税人识别号显示
        function updateTaxIdDisplay(taxId) {
            var displayTaxId;
            if (taxIdVisible) {
                displayTaxId = taxId;
            } else {
                displayTaxId = taxId.substring(0, 1) + '***************' + taxId.substring(taxId.length - 1);
            }
            // 眼睛图标（闭眼表示隐藏状态，睁眼表示显示状态）
            var eyeIcon = taxIdVisible 
                ? '<svg onclick="toggleTaxId()" style="cursor:pointer;vertical-align:middle;margin-left:5px;" t="1768653736506" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><path d="M512 256c-209.768 0-390.024 120.056-480 294.248C121.976 724.44 302.232 844.496 512 844.496S902.024 724.44 992 550.248C902.024 376.056 721.768 256 512 256z m0 490.416c-108.272 0-196.168-87.896-196.168-196.168S403.728 354.08 512 354.08s196.168 87.896 196.168 196.168S620.272 746.416 512 746.416z" fill="#b46d03"></path><path d="M512 432.336c-65.096 0-117.912 52.816-117.912 117.912S446.904 668.16 512 668.16s117.912-52.816 117.912-117.912S577.096 432.336 512 432.336z" fill="#b46d03"></path></svg>'
                : '<svg onclick="toggleTaxId()" style="cursor:pointer;vertical-align:middle;margin-left:5px;" t="1768653736506" class="icon" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" width="16" height="16"><path d="M926.03392 339.87072c-9.86624 0-19.16928 4.14208-26.17856 11.0848-14.09024 13.94688-39.44448 30.94016-79.85664 47.27808-79.86176 32.28672-192.12288 50.80064-307.9936 50.80064s-228.13696-18.51392-307.9936-50.80064c-40.41216-16.33792-65.7664-33.3312-79.85664-47.27808-7.0144-6.94272-16.31232-11.07968-26.17856-11.07968-33.05472 0-48.9984 40.35584-24.9856 63.07328 72.832 68.89472 241.9712 117.1712 439.01952 117.1712s366.18752-48.2816 439.01952-117.1712c24.00256-22.72256 8.05376-63.0784-24.99584-63.0784z" fill="#b46d03"></path><path d="M353.83808 642.41152l22.92224-130.00192a35.54816 35.54816 0 0 1 70.00064 12.3392l-22.92224 130.00192a35.53792 35.53792 0 1 1-70.00064-12.3392zM610.31424 654.75584l-22.92224-130.00192a35.5328 35.5328 0 0 1 28.83072-41.16992 35.5328 35.5328 0 0 1 41.16992 28.83072l22.92224 130.00192a35.54816 35.54816 0 0 1-70.00064 12.3392zM878.7968 589.37856l-93.34272-93.34272a35.53792 35.53792 0 1 1 50.26304-50.26304l93.34272 93.34272a35.53792 35.53792 0 1 1-50.26304 50.26304zM105.09824 539.11552l93.34272-93.34272a35.53792 35.53792 0 1 1 50.26304 50.26304l-93.34272 93.34272a35.53792 35.53792 0 1 1-50.26304-50.26304z" fill="#b46d03"></path></svg>';
            document.getElementById('userTaxId').innerHTML = '纳税人识别号 ' + displayTaxId + ' ' + eyeIcon;
        }
        
        // 加载用户信息
        function loadUserInfo() {
            var userId = localStorage.getItem('user_id');
            
            // 先用localStorage的数据快速显示
            var realName = localStorage.getItem('real_name');
            var taxId = localStorage.getItem('tax_id') || '620000000000000000';
            var gender = localStorage.getItem('gender');
            if (realName) {
                document.getElementById('userName').textContent = realName;
            }
            updateTaxIdDisplay(taxId);
            
            // 根据localStorage中的性别快速切换图片
            var headerImg = document.getElementById('headerImg');
            if (gender == 2) {
                headerImg.src = 'nx.jpg';
            } else {
                headerImg.src = 'grdb.jpg';
            }
            
            // 如果没有登录信息，跳转到登录页
            if (!userId) {
                // window.location.href = 'login.html';
                return;
            }
            
            // 从API获取最新数据
            fetch('api/user.php?action=info&user_id=' + userId)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 200) {
                        var user = data.data;
                        
                        // 更新localStorage
                        localStorage.setItem('real_name', user.real_name);
                        localStorage.setItem('tax_id', user.tax_id);
                        localStorage.setItem('employer_count', user.employer_count);
                        localStorage.setItem('family_count', user.family_count);
                        localStorage.setItem('bank_card_count', user.bank_card_count);
                        localStorage.setItem('gender', user.gender);
                        
                        // 根据性别切换头部图片
                        var headerImg = document.getElementById('headerImg');
                        if (user.gender == 2) {
                            headerImg.src = 'nx.jpg';
                        } else {
                            headerImg.src = 'grdb.jpg';
                        }
                        
                        // 更新页面显示
                        document.getElementById('userName').textContent = user.real_name;
                        updateTaxIdDisplay(user.tax_id);
                        
                        // 更新任职受雇数量
                        var employerBtn = document.getElementById('employerCount');
                        if (user.employer_count > 0) {
                            employerBtn.textContent = user.employer_count + '家';
                            employerBtn.className = 'function-btn blue';
                        } else {
                            employerBtn.textContent = '暂无';
                            employerBtn.className = 'function-btn orange';
                        }
                        
                        // 更新家庭成员数量
                        var familyBtn = document.getElementById('familyCount');
                        if (user.family_count > 0) {
                            familyBtn.textContent = user.family_count + '人';
                            familyBtn.className = 'function-btn blue';
                        } else {
                            familyBtn.textContent = '添加';
                            familyBtn.className = 'function-btn orange';
                        }
                        
                        // 更新银行卡数量
                        var bankCardBtn = document.getElementById('bankCardCount');
                        if (user.bank_card_count > 0) {
                            bankCardBtn.textContent = user.bank_card_count + '张';
                            bankCardBtn.className = 'function-btn blue';
                        } else {
                            bankCardBtn.textContent = '添加';
                            bankCardBtn.className = 'function-btn orange';
                        }
                    }
                })
                .catch(error => {
                    console.error('获取用户信息失败:', error);
                    // API失败时使用localStorage的数据
                    updateCountsFromLocalStorage();
                });
        }
        
        // 从localStorage更新数量显示
        function updateCountsFromLocalStorage() {
            var employerCount = localStorage.getItem('employer_count');
            var familyCount = localStorage.getItem('family_count');
            var bankCardCount = localStorage.getItem('bank_card_count');
            
            var employerBtn = document.getElementById('employerCount');
            if (employerCount !== null && employerCount != 0) {
                employerBtn.textContent = employerCount + '家';
                employerBtn.className = 'function-btn blue';
            } else {
                employerBtn.textContent = '暂无';
                employerBtn.className = 'function-btn orange';
            }
            
            var familyBtn = document.getElementById('familyCount');
            if (familyCount !== null && familyCount != 0) {
                familyBtn.textContent = familyCount + '人';
                familyBtn.className = 'function-btn blue';
            } else {
                familyBtn.textContent = '添加';
                familyBtn.className = 'function-btn orange';
            }
            
            var bankCardBtn = document.getElementById('bankCardCount');
            if (bankCardCount !== null && bankCardCount != 0) {
                bankCardBtn.textContent = bankCardCount + '张';
                bankCardBtn.className = 'function-btn blue';
            } else {
                bankCardBtn.textContent = '添加';
                bankCardBtn.className = 'function-btn orange';
            }
        }
        
        // 退出登录
        function doLogout() {
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            localStorage.removeItem('real_name');
            localStorage.removeItem('tax_id');
            window.location.href = 'login.html';
        }
        
        // 跳转到用户数据管理中心
        function goUserCenter() {
            window.location.href = 'consult.html';
        }
        
        // 跳转到个人信息页面
        function goPersonalInfo() {
            var userId = localStorage.getItem('user_id');
            if (userId) {
                window.location.href = 'gerenxinxi_menu.html';
            } else {
                window.location.href = 'login.html';
            }
        }
        
        // 跳转到任职受雇页面
        function goEmployer() {
            var userId = localStorage.getItem('user_id');
            if (userId) {
                window.location.href = 'renzhi.html';
            } else {
                window.location.href = 'login.html';
            }
        }
        
        // 页面加载时执行
        loadUserInfo();
        
        // iOS设备检测，底部导航上移
        (function() {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) {
                var bottomNav = document.querySelector('.bottom-nav');
                if (bottomNav) {
                    bottomNav.classList.add('ios-device');
                }
            }
        })();
    </script>
