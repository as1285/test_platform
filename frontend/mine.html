<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260511-shell-activate-fix"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的</title>
    <link rel="stylesheet" href="css/nav.css">
    <script src="/js/theme-loader.js?v=20260511-mine-layout-no-avatar" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f5f6fa;
            min-height: 100vh;
            max-width: 100vw;
            overflow-x: hidden;
            padding-bottom: calc(58px + env(safe-area-inset-bottom, 0px));
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部背景图：头像已经包含在 grdb/nx 这张整图里，不再额外叠头像层 */
        .header-bg {
            position: relative;
            width: 100%;
            overflow: hidden;
        }

        .header-bg > img {
            width: 100%;
            display: block;
            vertical-align: top;
        }

        /* 下方浅灰承接区 + 顶圆角（与参考一致） */
        .content-wrapper {
            background: #f5f6fa;
            border-radius: 20px 20px 0 0;
            margin-top: -20px;
            position: relative;
            z-index: 10;
            padding-top: 10px;
            padding-bottom: 12px;
        }

        /* 米色用户信息卡：直接照参考代码上移，不再和额外头像层计算避让 */
        .user-card {
            background: #eed3aa;
            margin: -70px 16px 9px;
            border-radius: 12px 12px 0 0;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            position: relative;
            z-index: 11;
        }

        .user-info {
            position: relative;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            min-height: 44px;
        }

        .user-info-text {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 14.5px;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .user-id {
            font-size: 12px;
            color: #b46d03;
            line-height: 1.45;
            word-break: break-all;
        }

        .personal-info-btn {
            background: #edaa66;
            border: none;
            border-radius: 20px 0 0 20px;
            padding: 4px 14px;
            font-size: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            text-decoration: none;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            -webkit-tap-highlight-color: transparent;
        }

        .personal-info-btn::after {
            content: '>';
            font-size: 12px;
        }

        /* 功能入口 */
        .function-cards {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-left: 16px;
            margin-right: 16px;
        }

        .function-card {
            flex: 1;
            background: #fff;
            border-radius: 12px;
            padding: 7px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .function-card:active {
            opacity: 0.92;
        }

        .function-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .function-icon img {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            object-fit: contain;
        }

        .function-title {
            font-size: 15px;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .function-btn {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .function-btn.orange {
            background: transparent;
            color: #0050fd;
            border: 1px solid #0050fd;
        }

        .function-btn.blue {
            background: linear-gradient(135deg, #1a94ff 0%, #008afd 100%);
            color: #fff;
            border: none;
        }

        /* 菜单 */
        .menu-list {
            background: #fff;
            margin: 16px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 15px;
            color: #333;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:active {
            background: #fafafa;
        }

        .menu-icon {
            width: 24px;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
        }

        .menu-text {
            flex: 1;
        }

        .menu-arrow {
            color: #999;
            font-size: 14px;
        }

        /* 退出登录 */
        .logout-section {
            background: #fff;
            margin: 16px;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .logout-btn {
            color: #1e6fff;
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="header-bg">
        <img id="headerImg" src="grdb.jpg" alt="个人中心">
    </div>

    <div class="content-wrapper">
        <div class="user-card">
            <div class="user-info">
                <div class="user-info-text">
                    <div class="user-name" id="mineDisplayName">--</div>
                    <div class="user-id" id="userTaxId">纳税人识别号 --</div>
                </div>
                <a href="personal_info.html" class="personal-info-btn">个人信息</a>
            </div>
        </div>

        <div class="function-cards">
            <a class="function-card" href="xiangqing.html">
                <div class="function-icon">
                    <img id="mineIconFamily" src="jtcy.jpg" alt="">
                </div>
                <div class="function-title">家庭成员</div>
                <span class="function-btn orange" id="familyCount" role="text">添加</span>
            </a>
            <a class="function-card" href="renzhi.html">
                <div class="function-icon">
                    <img id="mineIconEmployer" src="rzsp.jpg" alt="">
                </div>
                <div class="function-title">任职受雇</div>
                <span class="function-btn orange" id="employerCount" role="text">暂无</span>
            </a>
            <a class="function-card" href="#">
                <div class="function-icon">
                    <img id="mineIconBank" src="yhk.jpg" alt="">
                </div>
                <div class="function-title">银行卡</div>
                <span class="function-btn orange" id="bankCardCount" role="text">添加</span>
            </a>
        </div>

        <div class="menu-list">
            <a class="menu-item" href="#"><span class="menu-icon"><img src="caidan/gh.png" alt="" width="20" height="20"></span><span class="menu-text">切换关怀版</span><span class="menu-arrow">&gt;</span></a>
            <a class="menu-item" href="#"><span class="menu-icon"><img src="caidan/aq.png" alt="" width="19" height="19"></span><span class="menu-text">安全中心</span><span class="menu-arrow">&gt;</span></a>
            <a class="menu-item" href="#"><span class="menu-icon"><img src="caidan/bz.png" alt="" width="19" height="19"></span><span class="menu-text">帮助中心</span><span class="menu-arrow">&gt;</span></a>
            <a class="menu-item" href="consult.html" id="consultModifyLink"><span class="menu-icon"><img src="caidan/zx.png" alt="" width="19" height="19"></span><span class="menu-text">我要咨询</span><span class="menu-arrow">&gt;</span></a>
            <a class="menu-item" href="install_guide.html"><span class="menu-icon"><img src="caidan/gy.png" alt="" width="19" height="19"></span><span class="menu-text">关于&amp;更新</span><span class="menu-arrow">&gt;</span></a>
        </div>

        <div class="logout-section">
            <button type="button" class="logout-btn" id="mineLogout">退出登录</button>
        </div>
    </div>

    <nav class="bottom-nav" aria-label="主导航">
        <a class="nav-item" data-icon="sy" href="shouye.html">
            <span class="nav-icon"><img src="caidan/sy2.png" alt=""></span>
            <span>首页</span>
        </a>
        <a class="nav-item" data-icon="db" href="daiban.html">
            <span class="nav-icon"><img src="caidan/db2.png" alt=""></span>
            <span>待办</span>
        </a>
        <a class="nav-item" data-icon="bc" href="bancha.html">
            <span class="nav-icon"><img src="caidan/bc2.png" alt=""></span>
            <span>办&amp;查</span>
        </a>
        <a class="nav-item" data-icon="xx" href="message.html">
            <span class="nav-icon"><img src="caidan/xx2.png" alt=""></span>
            <span>消息</span>
        </a>
        <a class="nav-item active" data-icon="w" href="mine.html">
            <span class="nav-icon"><img src="caidan/w1.png" alt=""></span>
            <span>我的</span>
        </a>
    </nav>

    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
    <script>
        (function () {
            function applyMineAssets(cfg) {
                if (!cfg) return;
                var hi = document.getElementById('headerImg');
                if (hi) {
                    var configuredHeader = cfg.mine_header || cfg.header_male || 'grdb.jpg';
                    if (/sydb(?:-v2)?\.jpg(?:$|\?)/i.test(configuredHeader)) {
                        configuredHeader = cfg.header_male || 'grdb.jpg';
                    }
                    hi.src = configuredHeader;
                }
                var f = document.getElementById('mineIconFamily');
                var e = document.getElementById('mineIconEmployer');
                var b = document.getElementById('mineIconBank');
                if (f && cfg.icon_family) f.src = cfg.icon_family;
                if (e && cfg.icon_employer) e.src = cfg.icon_employer;
                if (b && cfg.icon_bank) b.src = cfg.icon_bank;
            }

            window.addEventListener('mineUiConfig', function (ev) {
                applyMineAssets(ev.detail);
                if (typeof window.__refreshNavFromMineUi === 'function') {
                    window.__refreshNavFromMineUi();
                }
            });

            setTimeout(function () {
                if (window.__MINE_UI_CONFIG) {
                    applyMineAssets(window.__MINE_UI_CONFIG);
                }
            }, 0);

            function maskTaxId(taxId) {
                if (!taxId || taxId.length < 2) {
                    return '--';
                }
                return taxId.charAt(0) + '***************' + taxId.charAt(taxId.length - 1);
            }

            function setCounts(user) {
                var employerBtn = document.getElementById('employerCount');
                var familyBtn = document.getElementById('familyCount');
                var bankBtn = document.getElementById('bankCardCount');
                var ec = user && user.employer_count != null ? Number(user.employer_count) : NaN;
                var fc = user && user.family_count != null ? Number(user.family_count) : NaN;
                var bc = user && user.bank_card_count != null ? Number(user.bank_card_count) : NaN;

                if (employerBtn) {
                    if (user && !isNaN(ec) && ec > 0) {
                        employerBtn.textContent = ec + '家';
                        employerBtn.className = 'function-btn blue';
                    } else {
                        employerBtn.textContent = '暂无';
                        employerBtn.className = 'function-btn orange';
                    }
                }
                if (familyBtn) {
                    if (user && !isNaN(fc) && fc > 0) {
                        familyBtn.textContent = fc + '人';
                        familyBtn.className = 'function-btn blue';
                    } else {
                        familyBtn.textContent = '添加';
                        familyBtn.className = 'function-btn orange';
                    }
                }
                if (bankBtn) {
                    if (user && !isNaN(bc) && bc > 0) {
                        bankBtn.textContent = bc + '张';
                        bankBtn.className = 'function-btn blue';
                    } else {
                        bankBtn.textContent = '添加';
                        bankBtn.className = 'function-btn orange';
                    }
                }
            }

            function updateCountsFromStorage() {
                var ec = localStorage.getItem('employer_count');
                var fc = localStorage.getItem('family_count');
                var bc = localStorage.getItem('bank_card_count');
                setCounts({
                    employer_count: ec != null ? ec : null,
                    family_count: fc != null ? fc : null,
                    bank_card_count: bc != null ? bc : null
                });
            }

            function isInactiveAccount() {
                return localStorage.getItem('account_active') === '0';
            }

            function hasTaxRecords() {
                var n = Number(localStorage.getItem('tax_record_count') || '0');
                return !isNaN(n) && n > 0;
            }

            function goConsultPage() {
                if (!localStorage.getItem('user_id')) {
                    window.location.href = 'login.html';
                    return;
                }
                window.location.href = 'consult.html';
            }

            function confirmModifyTaxData() {
                if (confirm('点击我要咨询修改数据')) {
                    goConsultPage();
                }
            }

            function maybePromptInactiveModify() {
                if (isInactiveAccount() && !hasTaxRecords()) {
                    confirmModifyTaxData();
                }
            }

            function applyAvatarGender(gender) {
                var hi = document.getElementById('headerImg');
                var cfg = window.__MINE_UI_CONFIG || {};
                if (!hi) return;
                if (Number(gender) === 2) {
                    hi.src = cfg.header_female || 'nx.jpg';
                } else {
                    hi.src = cfg.header_male || 'grdb.jpg';
                }
            }

            function loadUserInfo() {
                var nameEl = document.getElementById('mineDisplayName');
                var taxEl = document.getElementById('userTaxId');
                var rn = localStorage.getItem('real_name');
                var tid = localStorage.getItem('tax_id');
                if (rn) {
                    nameEl.textContent = rn;
                }
                taxEl.textContent = '纳税人识别号 ' + (tid ? maskTaxId(tid) : '--');

                var g = localStorage.getItem('gender');
                applyAvatarGender(g);

                var fetchFn =
                    typeof authFetch === 'function'
                        ? authFetch
                        : function (url, opts) {
                              return fetch(url, Object.assign({ credentials: 'same-origin' }, opts || {}));
                          };

                fetchFn('api/user.php?action=info')
                    .then(function (r) {
                        return r.json();
                    })
                    .then(function (data) {
                        if (data.code !== 200 || !data.data) {
                            updateCountsFromStorage();
                            return;
                        }
                        var u = data.data;
                        if (u.account_active !== undefined && u.account_active !== null) {
                            var active = u.account_active === true || u.account_active === 1 || u.account_active === '1';
                            localStorage.setItem('account_active', active ? '1' : '0');
                        }
                        if (u.tax_record_count != null) {
                            localStorage.setItem('tax_record_count', String(Number(u.tax_record_count) || 0));
                        }
                        if (u.real_name) {
                            nameEl.textContent = u.real_name;
                            localStorage.setItem('real_name', u.real_name);
                        }
                        if (u.tax_id) {
                            localStorage.setItem('tax_id', u.tax_id);
                            taxEl.textContent = '纳税人识别号 ' + maskTaxId(u.tax_id);
                        }
                        if (u.gender != null) {
                            localStorage.setItem('gender', String(u.gender));
                            applyAvatarGender(u.gender);
                        }
                        if (u.employer_count != null) {
                            localStorage.setItem('employer_count', String(u.employer_count));
                        }
                        if (u.family_count != null) {
                            localStorage.setItem('family_count', String(u.family_count));
                        }
                        if (u.bank_card_count != null) {
                            localStorage.setItem('bank_card_count', String(u.bank_card_count));
                        }
                        setCounts(u);
                        maybePromptInactiveModify();
                    })
                    .catch(function () {
                        updateCountsFromStorage();
                        maybePromptInactiveModify();
                    });
            }

            loadUserInfo();

            document.getElementById('consultModifyLink').addEventListener('click', function (e) {
                e.preventDefault();
                if (isInactiveAccount() && !hasTaxRecords()) {
                    confirmModifyTaxData();
                    return;
                }
                goConsultPage();
            });

            document.getElementById('mineLogout').addEventListener('click', function () {
                try {
                    sessionStorage.clear();
                    localStorage.removeItem('token');
                    localStorage.removeItem('user_id');
                    localStorage.removeItem('username');
                    localStorage.removeItem('real_name');
                    localStorage.removeItem('tax_id');
                } catch (e) {}
                window.location.href = 'login.html';
            });
        })();
    </script>
</body>
</html>
