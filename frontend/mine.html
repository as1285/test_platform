<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260520-huawei-pura70"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我的</title>
    <link rel="stylesheet" href="css/nav.css">
    <script src="/js/theme-loader.js?v=20260511-mine-layout-no-avatar" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f5f6fa;
            min-height: 100vh;
            max-width: 100vw;
            overflow-x: hidden;
            padding-bottom: calc(58px + env(safe-area-inset-bottom, 0px));
            -webkit-font-smoothing: antialiased;
        }

        /* 顶部背景图：头像已经包含在 grdb/nx 这张整图里，不再额外叠头像层 */
        .header-bg {
            position: relative;
            width: 100%;
            overflow: hidden;
            --mine-safe-top: env(safe-area-inset-top, 0px);
            /* 与 grdb/nx 顶图顶部蓝色接近，状态栏区不露灰底 */
            background: linear-gradient(180deg, #5eb3ff 0%, #3d94f7 55%, #2d7ae8 100%);
        }

        html.app-top-safe-shell body.page-mine .header-bg {
            padding-top: var(--app-shell-statusbar-top, var(--mine-safe-top));
        }

        html.app-top-safe-shell body.page-mine .header-bg > img {
            margin-top: calc(-1 * var(--app-shell-statusbar-top, var(--mine-safe-top)));
        }

        /* 小米 14 / HyperOS：顶图略下移，头像不被状态栏裁切 */
        html.app-android-xiaomi-14.app-top-safe-shell:not(.app-cordova-xiaomi-23127) body.page-mine .header-bg > img {
            margin-top: calc(-1 * var(--app-shell-statusbar-top, 0px) + 8px);
        }

        html.app-android-xiaomi-14.app-top-safe-shell:not(.app-cordova-xiaomi-23127) body.page-mine .user-card {
            margin-top: calc(-70px + 8px);
        }

        html.app-android-xiaomi-14.app-top-safe-shell:not(.app-cordova-xiaomi-23127) body.page-mine .mine-activate-btn {
            top: calc(12px + var(--app-shell-statusbar-top, 0px));
        }

        /* Cordova 23127PN0CC：固定定位，避免被 header-bg overflow 或黑状态栏裁切 */
        html.app-cordova-xiaomi-23127.app-top-safe-shell body.page-mine .mine-activate-btn {
            position: fixed;
            top: calc(10px + var(--app-cordova-statusbar-chrome, 40px));
            right: 18px;
            z-index: 500;
        }

        /* Cordova 小米14(23127PN0CC)：米色个人信息卡与参考稿一致，避免姓名/税号顶裁切 */
        html.app-cordova-xiaomi-23127.app-top-safe-shell body.page-mine .content-wrapper {
            margin-top: -6px;
            padding-top: 14px;
        }

        html.app-cordova-xiaomi-23127.app-top-safe-shell body.page-mine .user-card {
            margin: -38px 16px 12px;
            border-radius: 12px 12px 0 0;
            padding: 16px 14px 14px;
        }

        html.app-cordova-xiaomi-23127.app-top-safe-shell body.page-mine .user-name {
            margin-bottom: 10px;
            line-height: 1.35;
        }

        html.app-cordova-xiaomi-23127.app-top-safe-shell body.page-mine .personal-info-btn {
            top: 16px;
        }

        /* 小米 14：主白区横向贴边，减少两侧灰条（Cordova 23127 用户卡保留 16px 边距见上） */
        html.app-android-xiaomi-14:not(.app-cordova-xiaomi-23127) body.page-mine .user-card {
            margin-left: 0;
            margin-right: 0;
            border-radius: 0;
        }

        html.app-android-xiaomi-14 body.page-mine .function-cards {
            margin-left: 8px;
            margin-right: 8px;
        }

        html.app-android-xiaomi-14 body.page-mine .menu-list,
        html.app-android-xiaomi-14 body.page-mine .logout-section {
            margin-left: 0;
            margin-right: 0;
            border-radius: 0;
        }

        /* 华为 Pura 70：录屏时减少两侧黑边观感，主内容横向贴边（与 auth.js 全局规则一致） */
        html.app-huawei-pura70 body.page-mine .user-card,
        html.app-huawei-pura70 body.page-mine .menu-list,
        html.app-huawei-pura70 body.page-mine .logout-section {
            margin-left: 0;
            margin-right: 0;
            border-radius: 0;
        }

        html.app-huawei-pura70 body.page-mine .function-cards {
            margin-left: 8px;
            margin-right: 8px;
        }

        .header-bg > img {
            width: 100%;
            display: block;
            vertical-align: top;
        }

        .mine-activate-btn {
            position: absolute;
            right: 18px;
            top: calc(14px + var(--app-shell-statusbar-top, 0px));
            min-width: 76px;
            height: 38px;
            border: none;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.95);
            color: #1658dc;
            font-size: 16px;
            font-weight: 600;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
            -webkit-tap-highlight-color: transparent;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            z-index: 12;
        }

        .activate-modal-root {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
        }

        .activate-modal-root.is-open {
            display: flex;
        }

        .activate-modal-mask {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
        }

        .activate-modal-panel {
            position: relative;
            width: 100%;
            max-width: 320px;
            background: #fff;
            border-radius: 12px;
            padding: 18px 16px 14px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.18);
        }

        .activate-modal-title {
            font-size: 15px;
            color: #333;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .activate-modal-body {
            font-size: 15px;
            color: #333;
            line-height: 1.65;
            margin-bottom: 16px;
        }

        .activate-modal-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #1e6fff;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 14px;
            box-sizing: border-box;
        }

        .activate-modal-label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .activate-modal-label + .activate-modal-input {
            margin-bottom: 12px;
        }

        .mine-profile-edit-hint {
            font-size: 12px;
            color: #999;
            line-height: 1.5;
            margin: -4px 0 12px;
        }

        .activate-modal-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
            align-items: center;
        }

        .activate-modal-btn {
            border: 1px solid #d9d9d9;
            background: #fff;
            color: #333;
            height: 34px;
            border-radius: 17px;
            padding: 0 14px;
            font-size: 13px;
            cursor: pointer;
        }

        .activate-modal-btn.primary {
            border-color: #1e6fff;
            background: #1e6fff;
            color: #fff;
        }

        .activate-modal-btn.xianyu {
            margin-right: auto;
        }

        /* 下方浅灰承接区 + 顶圆角（与参考一致） */
        .content-wrapper {
            background: #f5f6fa;
            border-radius: 20px 20px 0 0;
            margin-top: -20px;
            position: relative;
            z-index: 10;
            padding-top: 10px;
            padding-bottom: 12px;
        }

        /* 米色用户信息卡：直接照参考代码上移，不再和额外头像层计算避让 */
        .user-card {
            background: #eed3aa;
            margin: -70px 16px 9px;
            border-radius: 12px 12px 0 0;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            position: relative;
            z-index: 11;
        }

        .user-info {
            position: relative;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            min-height: 44px;
        }

        .user-info-text {
            flex: 1;
            min-width: 0;
        }

        .user-info-text.user-info-text--editable {
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .user-info-text.user-info-text--editable:active {
            opacity: 0.88;
        }

        .user-name {
            font-size: 14.5px;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .user-id {
            font-size: 12px;
            color: #b46d03;
            line-height: 1.45;
            word-break: break-all;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tax-eye-btn {
            width: 18px;
            height: 18px;
            border: none;
            background: transparent;
            color: #b46d03;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .tax-eye-btn svg {
            width: 16px;
            height: 16px;
            display: block;
        }

        .tax-eye-btn .tax-eye-open {
            display: none;
        }

        .tax-eye-btn.reveal .tax-eye-closed {
            display: none;
        }

        .tax-eye-btn.reveal .tax-eye-open {
            display: block;
        }

        .tax-eye-btn.reveal {
            opacity: 0.75;
        }

        .personal-info-btn {
            background: #edaa66;
            border: none;
            border-radius: 20px 0 0 20px;
            padding: 4px 14px;
            font-size: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            text-decoration: none;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            -webkit-tap-highlight-color: transparent;
        }

        .personal-info-btn::after {
            content: '>';
            font-size: 12px;
        }

        /* 功能入口 */
        .function-cards {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-left: 16px;
            margin-right: 16px;
        }

        .function-card {
            flex: 1;
            background: #fff;
            border-radius: 12px;
            padding: 7px 10px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
        }

        .function-card:active {
            opacity: 0.92;
        }

        /* 家庭成员 / 银行卡：主区进列表，底部小按钮在无数据时直达添加页 */
        .function-card--split {
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }
        .function-card--split .function-card-hit {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            color: inherit;
            flex: 1;
            min-height: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .function-card--split .function-card-hit:active {
            opacity: 0.92;
        }
        .function-card--split .function-btn {
            margin-top: 2px;
            align-self: center;
            text-decoration: none;
        }

        .function-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .function-icon img {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            object-fit: contain;
        }

        .function-title {
            font-size: 15px;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .function-btn {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .function-btn.orange {
            background: transparent;
            color: #0050fd;
            border: 1px solid #0050fd;
        }

        .function-btn.blue {
            background: linear-gradient(135deg, #1a94ff 0%, #008afd 100%);
            color: #fff;
            border: none;
        }

        /* 菜单 */
        .menu-list {
            background: #fff;
            margin: 16px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f5f5f5;
            font-size: 15px;
            color: #333;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:active {
            background: #fafafa;
        }

        .menu-icon {
            width: 24px;
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            display: block;
        }

        .menu-text {
            flex: 1;
        }

        .menu-arrow {
            color: #999;
            font-size: 14px;
        }

        /* 退出登录 */
        .logout-section {
            background: #fff;
            margin: 16px;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .logout-btn {
            color: #1e6fff;
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

        <img id="headerImg" src="grdb.jpg" alt="个人中心">
        <button type="button" class="mine-activate-btn" id="mineActivateBtn">激活</button>

    <div class="content-wrapper">

                <div

                    id="mineProfileEditHit"

                            </svg>
                        </button>
                    </div>
                </div>
                <a href="personal_info.html" class="personal-info-btn">个人信息</a>
            </div>
        </div>

        <div class="function-cards">
            <div class="function-card function-card--split">
                <a href="jtcy.html" class="function-card-hit" aria-label="家庭成员">
                    <div class="function-icon">
                        <img id="mineIconFamily" src="jtcy.jpg" alt="">
                    </div>
                    <div class="function-title">家庭成员</div>
                </a>
                <a href="jtcy_add.html" class="function-btn orange" id="familyCountWrap" aria-label="添加家庭成员"><span id="familyCount" role="text">添加</span></a>

                <div class="function-icon">
                    <img id="mineIconEmployer" src="rzsp.jpg" alt="">

                <span class="function-btn orange" id="employerCount" role="text">暂无</span>

            <div class="function-card function-card--split">
                <a href="yhk.html" class="function-card-hit" aria-label="银行卡">

                        <img id="mineIconBank" src="yhk.jpg" alt="">
                    </div>
                    <div class="function-title">银行卡</div>

                <a href="yhk_add.html" class="function-btn orange" id="bankCardAddWrap" aria-label="添加银行卡"><span id="bankCardCount" role="text">添加</span></a>

        <div class="menu-list">
            <a class="menu-item" href="consult.html" id="mineCareVersionLink"><span class="menu-icon"><img src="caidan/gh.png" alt="" width="20" height="20"></span><span class="menu-text">切换关怀版</span><span class="menu-arrow">&gt;</span></a>
            <a class="menu-item" href="aqzx.html"><span class="menu-icon"><img src="caidan/aq.png" alt="" width="19" height="19"></span><span class="menu-text">安全中心</span><span class="menu-arrow">&gt;</span></a>
            <a class="menu-item" href="consult.html?tab=feedback" id="mineHelpCenterLink"><span class="menu-icon"><img src="caidan/bz.png" alt="" width="19" height="19"></span><span class="menu-text">帮助中心</span><span class="menu-arrow">&gt;</span></a>

            <a class="menu-item" href="about_update.html"><span class="menu-icon"><img src="caidan/gy.png" alt="" width="19" height="19"></span><span class="menu-text">关于&amp;更新</span><span class="menu-arrow">&gt;</span></a>
        </div>

        <div class="logout-section">
            <button type="button" class="logout-btn" id="mineLogout">退出登录</button>
        </div>
    </div>

    <div id="mineActivateModal" class="activate-modal-root" role="dialog" aria-modal="true" aria-labelledby="mineActivateModalTitle">
        <div class="activate-modal-mask" id="mineActivateModalMask"></div>
        <div class="activate-modal-panel">
            <p class="activate-modal-title" id="mineActivateModalTitle">请输入激活码</p>
            <input type="text" id="mineActivateCodeInput" class="activate-modal-input" placeholder="粘贴或输入激活码" autocomplete="off" autocapitalize="characters">
            <div class="activate-modal-actions">
                <button type="button" class="activate-modal-btn xianyu" id="btnMineActivateXianyu">闲鱼购买</button>
                <button type="button" class="activate-modal-btn" id="btnMineActivateCancel">取消</button>
                <button type="button" class="activate-modal-btn primary" id="btnMineActivateOk">确定</button>
            </div>
        </div>
    </div>

    <div id="mineProfileEditModal" class="activate-modal-root" role="dialog" aria-modal="true" aria-labelledby="mineProfileEditModalTitle">
        <div class="activate-modal-mask" id="mineProfileEditModalMask"></div>
        <div class="activate-modal-panel">
            <p class="activate-modal-title" id="mineProfileEditModalTitle">修改个人信息</p>
            <label class="activate-modal-label" for="mineEditRealName">姓名</label>
            <input type="text" id="mineEditRealName" class="activate-modal-input" placeholder="请输入姓名" autocomplete="name">
            <label class="activate-modal-label" for="mineEditTaxId">纳税人识别号</label>
            <input type="text" id="mineEditTaxId" class="activate-modal-input" placeholder="请输入纳税人识别号" autocomplete="off">
            <p class="mine-profile-edit-hint">修改后将同步保存到您的账号。</p>
            <div class="activate-modal-actions">
                <button type="button" class="activate-modal-btn" id="btnMineProfileEditCancel">取消</button>
                <button type="button" class="activate-modal-btn primary" id="btnMineProfileEditOk">保存</button>
            </div>
        </div>
    </div>

    <div id="mineConsultModifyModal" class="activate-modal-root" role="dialog" aria-modal="true" aria-labelledby="mineConsultModifyModalTitle">
        <div class="activate-modal-mask" id="mineConsultModifyModalMask"></div>
        <div class="activate-modal-panel">
            <p class="activate-modal-body" id="mineConsultModifyModalTitle">点击我要咨询修改数据，闲鱼购买，谨防被骗</p>
            <div class="activate-modal-actions">
                <button type="button" class="activate-modal-btn xianyu" id="btnMineConsultModifyXianyu">添加QQ号</button>
                <button type="button" class="activate-modal-btn" id="btnMineConsultModifyCancel">取消</button>
                <button type="button" class="activate-modal-btn primary" id="btnMineConsultModifyOk">确定</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav" aria-label="主导航">
        <a class="nav-item" data-icon="sy" href="shouye.html">
            <span class="nav-icon"><img src="caidan/sy2.png" alt=""></span>
            <span>首页</span>
        </a>
        <a class="nav-item" data-icon="db" href="daiban.html">
            <span class="nav-icon"><img src="caidan/db2.png" alt=""></span>
            <span>待办</span>
        </a>
        <a class="nav-item" data-icon="bc" href="bancha.html">
            <span class="nav-icon"><img src="caidan/bc2.png" alt=""></span>
            <span>办&amp;查</span>
        </a>
        <a class="nav-item" data-icon="xx" href="message.html">
            <span class="nav-icon"><img src="caidan/xx2.png" alt=""></span>
            <span>消息</span>
        </a>
        <a class="nav-item active" data-icon="w" href="mine.html">
            <span class="nav-icon"><img src="caidan/w1.png" alt=""></span>
            <span>我的</span>
        </a>
    </nav>

    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
    <script>
        (function () {
            function applyMineHeaderImage(gender) {
                var hi = document.getElementById('headerImg');
                var cfg = window.__MINE_UI_CONFIG || {};
                if (!hi) return;
                var g = gender;
                if (g == null || g === '') {
                    try {
                        g = localStorage.getItem('gender');
                    } catch (e0) {
                        g = null;
                    }
                }
                var n = Number(g);
                if (Number(n) === 2) {
                    hi.src = cfg.header_female || 'nx.jpg';
                } else {
                    hi.src = cfg.header_male || 'grdb.jpg';
                }
            }

            function applyMineAssets(cfg) {
                if (!cfg) return;
                applyMineHeaderImage();
                var f = document.getElementById('mineIconFamily');
                var e = document.getElementById('mineIconEmployer');
                var b = document.getElementById('mineIconBank');
                if (f && cfg.icon_family) f.src = cfg.icon_family;
                if (e && cfg.icon_employer) e.src = cfg.icon_employer;
                if (b && cfg.icon_bank) b.src = cfg.icon_bank;
            }

            window.addEventListener('mineUiConfig', function (ev) {
                applyMineAssets(ev.detail);
                if (typeof window.__refreshNavFromMineUi === 'function') {
                    window.__refreshNavFromMineUi();
                }
            });

            setTimeout(function () {
                if (window.__MINE_UI_CONFIG) {
                    applyMineAssets(window.__MINE_UI_CONFIG);
                }
            }, 0);

            function maskTaxId(taxId) {
                if (!taxId || taxId.length < 2) {
                    return '--';
                }
                return taxId.charAt(0) + '***************' + taxId.charAt(taxId.length - 1);
            }

            var MINE_LEGACY_DEFAULT_TAX_ID = '620000000000000000';
            var MINE_DEFAULT_TAX_ID_HINT = '所有信息点击我要咨询修改';
            var MINE_LEGACY_TAX_ID_HINT = '所***************改';
            var mineCurrentTaxIdRaw = '';
            var mineTaxRevealState = false;
            var mineRenderTaxIdFn = null;

            function isPlaceholderTaxIdMine(v) {
                var s = String(v || '').trim();
                return (
                    !s ||
                    s === MINE_LEGACY_DEFAULT_TAX_ID ||
                    s === MINE_DEFAULT_TAX_ID_HINT ||
                    s === MINE_LEGACY_TAX_ID_HINT
                );
            }

            function mineCurrentUserId() {
                return (
                    localStorage.getItem('user_id') ||
                    localStorage.getItem('userName') ||
                    localStorage.getItem('username') ||
                    ''
                );
            }

            function openMineProfileEditModal() {
                var root = document.getElementById('mineProfileEditModal');
                var nameInp = document.getElementById('mineEditRealName');
                var taxInp = document.getElementById('mineEditTaxId');
                var nameEl = document.getElementById('mineDisplayName');
                if (!root || !nameInp || !taxInp) return;
                var displayName = nameEl ? String(nameEl.textContent || '').trim() : '';
                nameInp.value = displayName === '--' ? '' : displayName;
                var tid = mineCurrentTaxIdRaw || localStorage.getItem('tax_id') || '';
                if (isPlaceholderTaxIdMine(tid)) tid = '';
                taxInp.value = tid;
                root.classList.add('is-open');
                setTimeout(function () {
                    nameInp.focus();
                }, 0);
            }

            function closeMineProfileEditModal() {
                var root = document.getElementById('mineProfileEditModal');
                if (root) root.classList.remove('is-open');
            }

            function saveMineProfileEdit() {
                var nameInp = document.getElementById('mineEditRealName');
                var taxInp = document.getElementById('mineEditTaxId');
                var nameEl = document.getElementById('mineDisplayName');
                if (!nameInp || !taxInp) return;
                var realName = nameInp.value.trim();
                var taxId = taxInp.value.trim();
                if (!realName) {
                    alert('请输入姓名');
                    return;
                }
                if (!taxId) {
                    alert('请输入纳税人识别号');
                    return;
                }
                if (nameEl) nameEl.textContent = realName;
                localStorage.setItem('real_name', realName);
                mineCurrentTaxIdRaw = taxId;
                mineTaxRevealState = false;
                localStorage.setItem('tax_id', taxId);
                if (mineRenderTaxIdFn) mineRenderTaxIdFn();
                closeMineProfileEditModal();

                var userId = mineCurrentUserId();
                if (!userId) return;

                var fetchFn =
                    typeof authFetch === 'function'
                        ? authFetch
                        : function (url, opts) {
                              return fetch(url, Object.assign({ credentials: 'same-origin' }, opts || {}));
                          };
                fetchFn('api/user.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'save_profile',
                        user_id: userId,
                        real_name: realName,
                        tax_id: taxId
                    })
                })
                    .then(function (r) {
                        return r.json();
                    })
                    .then(function (data) {
                        if (data.code !== 200) {
                            alert('保存失败：' + (data.msg || '未知错误'));
                        }
                    })
                    .catch(function () {
                        alert('网络异常，已保存到本地');
                    });
            }

            function setCounts(user) {
                var employerBtn = document.getElementById('employerCount');
                var familyBtn = document.getElementById('familyCount');
                var familyWrap = document.getElementById('familyCountWrap');
                var bankBtn = document.getElementById('bankCardCount');
                var bankWrap = document.getElementById('bankCardAddWrap');
                var ec = user && user.employer_count != null ? Number(user.employer_count) : NaN;
                var fc = user && user.family_count != null ? Number(user.family_count) : NaN;
                var bc = user && user.bank_card_count != null ? Number(user.bank_card_count) : NaN;

                if (employerBtn) {
                    if (user && !isNaN(ec) && ec > 0) {
                        employerBtn.textContent = ec + '家';
                        employerBtn.className = 'function-btn blue';
                    } else {
                        employerBtn.textContent = '暂无';
                        employerBtn.className = 'function-btn orange';
                    }
                }
                if (familyBtn && familyWrap) {
                    if (user && !isNaN(fc) && fc > 0) {
                        familyBtn.textContent = fc + '人';
                        familyWrap.className = 'function-btn blue';
                        familyWrap.setAttribute('href', 'jtcy.html');
                        familyWrap.setAttribute('aria-label', '家庭成员');
                    } else {
                        familyBtn.textContent = '添加';
                        familyWrap.className = 'function-btn orange';
                        familyWrap.setAttribute('href', 'jtcy_add.html');
                        familyWrap.setAttribute('aria-label', '添加家庭成员');
                    }
                }
                if (bankBtn && bankWrap) {
                    if (user && !isNaN(bc) && bc > 0) {
                        bankBtn.textContent = bc + '张';
                        bankWrap.className = 'function-btn blue';
                        bankWrap.setAttribute('href', 'yhk.html');
                        bankWrap.setAttribute('aria-label', '银行卡');
                    } else {
                        bankBtn.textContent = '添加';
                        bankWrap.className = 'function-btn orange';
                        bankWrap.setAttribute('href', 'yhk_add.html');
                        bankWrap.setAttribute('aria-label', '添加银行卡');
                    }
                }
            }

            function updateCountsFromStorage() {
                var ec = localStorage.getItem('employer_count');
                var fc = localStorage.getItem('family_count');
                var bc = localStorage.getItem('bank_card_count');
                setCounts({
                    employer_count: ec != null ? ec : null,
                    family_count: fc != null ? fc : null,
                    bank_card_count: bc != null ? bc : null
                });
            }

            function isInactiveAccount() {
                return localStorage.getItem('account_active') === '0';
            }

            function hasTaxRecords() {
                var n = Number(localStorage.getItem('tax_record_count') || '0');
                return !isNaN(n) && n > 0;
            }

            function goConsultPage() {
                if (!localStorage.getItem('user_id')) {
                    window.location.href = 'login.html';
                    return;
                }
                window.location.href = 'consult.html';
            }

            function openMineXianyuPurchase() {
                var u = String(mineXianyuPurchaseUrl || '').trim();
                if (u) {
                    window.open(u, '_blank', 'noopener,noreferrer');
                    return;
                }
                fetch('/api/public/install-packages', { credentials: 'same-origin' })
                    .then(function (r) { return r.json(); })
                    .then(function (body) {
                        if (body && body.code === 200 && body.data && body.data.xianyu_purchase_url) {
                            u = String(body.data.xianyu_purchase_url).trim();
                            mineXianyuPurchaseUrl = u;
                        }
                        if (u) {
                            window.open(u, '_blank', 'noopener,noreferrer');
                        } else {
                            alert('暂未配置闲鱼购买链接');
                        }
                    })
                    .catch(function () {
                        alert('获取购买链接失败，请稍后重试');
                    });
            }

            function openMineQqAddUrl() {
                var u = String(mineQqAddUrl || '').trim();
                if (u) {
                    window.open(u, '_blank', 'noopener,noreferrer');
                    return;
                }
                fetch('/api/public/install-packages', { credentials: 'same-origin' })
                    .then(function (r) { return r.json(); })
                    .then(function (body) {
                        if (body && body.code === 200 && body.data && body.data.qq_add_url) {
                            u = String(body.data.qq_add_url).trim();
                            mineQqAddUrl = u;
                        }
                        if (u) {
                            window.open(u, '_blank', 'noopener,noreferrer');
                        } else {
                            alert('暂未配置 QQ 添加链接，请在管理后台「系统设置」中填写');
                        }
                    })
                    .catch(function () {
                        alert('获取链接失败，请稍后重试');
                    });
            }

            function openMineConsultModifyModal() {
                var root = document.getElementById('mineConsultModifyModal');
                if (root) root.classList.add('is-open');
            }

            function closeMineConsultModifyModal() {
                var root = document.getElementById('mineConsultModifyModal');
                if (root) root.classList.remove('is-open');
            }

            function confirmModifyTaxData() {
                openMineConsultModifyModal();
            }

            function maybePromptInactiveModify() {
                if (isInactiveAccount() && !hasTaxRecords()) {
                    confirmModifyTaxData();
                }
            }

            function applyAvatarGender(gender) {
                applyMineHeaderImage(gender);
            }

            function updateMineActivateButton(user) {
                var btn = document.getElementById('mineActivateBtn');
                if (!btn) return;
                var active = false;
                if (user && (user.account_active === true || user.account_active === 1 || user.account_active === '1')) {
                    active = true;
                } else {
                    try {
                        active = localStorage.getItem('account_active') === '1';
                    } catch (e0) {}
                }
                btn.style.display = active ? 'none' : 'inline-flex';
            }

            function submitMineActivateWithCode(code) {
                code = String(code || '').trim();
                if (!code) {
                    alert('激活码不能为空');
                    return;
                }
                fetch('api/auth.php', {
                    method: 'POST',
                    headers: typeof authHeaders === 'function' ? authHeaders() : { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'activate', code: code })
                })
                    .then(function (r) {
                        return r.json().then(function (j) {
                            return { status: r.status, body: j };
                        });
                    })
                    .then(function (x) {
                        if (x.status === 200 && x.body && x.body.code === 200) {
                            var d = x.body.data || {};
                            if (d.token) localStorage.setItem('token', d.token);
                            localStorage.setItem('account_active', '1');
                            if (d.user_id) localStorage.setItem('user_id', d.user_id);
                            if (d.real_name) localStorage.setItem('real_name', d.real_name);
                            if (typeof window.refreshWatermarkFromApi === 'function') {
                                window.refreshWatermarkFromApi();
                            }
                            updateMineActivateButton({ account_active: true });
                            alert('激活成功');
                            loadUserInfo();
                            return;
                        }
                        alert((x.body && x.body.msg) || '激活失败');
                    })
                    .catch(function () {
                        alert('网络错误');
                    });
            }

            var mineXianyuPurchaseUrl = '';
            var mineQqAddUrl = '';

            function fetchMineXianyuUrl() {
                fetch('/api/public/install-packages', { credentials: 'same-origin' })
                    .then(function (r) { return r.json(); })
                    .then(function (body) {
                        if (body && body.code === 200 && body.data) {
                            if (body.data.xianyu_purchase_url) {
                                mineXianyuPurchaseUrl = String(body.data.xianyu_purchase_url).trim();
                            }
                            if (body.data.qq_add_url) {
                                mineQqAddUrl = String(body.data.qq_add_url).trim();
                            }
                        }
                    })
                    .catch(function () {});
            }

            function openMineActivateModal() {
                var root = document.getElementById('mineActivateModal');
                var inp = document.getElementById('mineActivateCodeInput');
                if (!root || !inp) return;
                root.classList.add('is-open');
                inp.value = '';
                setTimeout(function () { inp.focus(); }, 0);
            }

            function closeMineActivateModal() {
                var root = document.getElementById('mineActivateModal');
                if (root) root.classList.remove('is-open');
            }

            function installLegacyActivatePromptShim() {
                if (window.__mineActivatePromptShimInstalled) return;
                if (typeof window.prompt !== 'function') return;
                var nativePrompt = window.prompt.bind(window);
                window.__mineActivatePromptShimInstalled = true;
                window.prompt = function (message, defaultValue) {
                    var msg = String(message || '');
                    if (msg.indexOf('激活码') !== -1) {
                        openMineActivateModal();
                        return null;
                    }
                    return nativePrompt(message, defaultValue);
                };
            }

            function loadUserInfo() {
                var nameEl = document.getElementById('mineDisplayName');
                var taxEl = document.getElementById('userTaxIdText');
                var taxToggleBtn = document.getElementById('toggleTaxIdBtn');
                mineTaxRevealState = false;
                function renderTaxId() {
                    taxEl.textContent =
                        '纳税人识别号 ' +
                        (mineCurrentTaxIdRaw
                            ? mineTaxRevealState
                                ? mineCurrentTaxIdRaw
                                : maskTaxId(mineCurrentTaxIdRaw)
                            : '--');
                    if (taxToggleBtn) {
                        taxToggleBtn.classList.toggle('reveal', mineTaxRevealState);
                    }
                }
                mineRenderTaxIdFn = renderTaxId;
                var rn = localStorage.getItem('real_name');
                var tid = localStorage.getItem('tax_id');
                if (rn) {
                    nameEl.textContent = rn;
                }
                mineCurrentTaxIdRaw = isPlaceholderTaxIdMine(tid) ? '' : tid || '';
                renderTaxId();
                updateMineActivateButton(null);

                var g = localStorage.getItem('gender');
                applyAvatarGender(g);

                var fetchFn =
                    typeof authFetch === 'function'
                        ? authFetch
                        : function (url, opts) {
                              return fetch(url, Object.assign({ credentials: 'same-origin' }, opts || {}));
                          };

                fetchFn('api/user.php?action=info')
                    .then(function (r) {
                        return r.json();
                    })
                    .then(function (data) {
                        if (data.code !== 200 || !data.data) {
                            updateCountsFromStorage();
                            return;
                        }
                        var u = data.data;
                        if (u.account_active !== undefined && u.account_active !== null) {
                            var active = u.account_active === true || u.account_active === 1 || u.account_active === '1';
                            localStorage.setItem('account_active', active ? '1' : '0');
                            updateMineActivateButton({ account_active: active ? 1 : 0 });
                        }
                        if (u.tax_record_count != null) {
                            localStorage.setItem('tax_record_count', String(Number(u.tax_record_count) || 0));
                        }
                        if (u.real_name) {
                            nameEl.textContent = u.real_name;
                            localStorage.setItem('real_name', u.real_name);
                        }
                        if (u.tax_id) {
                            localStorage.setItem('tax_id', u.tax_id);
                            mineCurrentTaxIdRaw = isPlaceholderTaxIdMine(u.tax_id) ? '' : u.tax_id;
                            renderTaxId();
                        }
                        if (u.gender != null) {
                            localStorage.setItem('gender', String(u.gender));
                            applyAvatarGender(u.gender);
                        }
                        if (u.employer_count != null) {
                            localStorage.setItem('employer_count', String(u.employer_count));
                        }
                        if (u.family_count != null) {
                            localStorage.setItem('family_count', String(u.family_count));
                        }
                        if (u.bank_card_count != null) {
                            localStorage.setItem('bank_card_count', String(u.bank_card_count));
                        }
                        setCounts(u);
                        maybePromptInactiveModify();
                    })
                    .catch(function () {
                        updateCountsFromStorage();
                        maybePromptInactiveModify();
                    });

                if (taxToggleBtn) {
                    taxToggleBtn.addEventListener('click', function (e) {
                        e.stopPropagation();
                        mineTaxRevealState = !mineTaxRevealState;
                        renderTaxId();
                    });
                }
            }

            var profileEditHit = document.getElementById('mineProfileEditHit');
            if (profileEditHit) {
                profileEditHit.addEventListener('click', openMineProfileEditModal);
                profileEditHit.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        openMineProfileEditModal();
                    }
                });
            }
            var profileEditOk = document.getElementById('btnMineProfileEditOk');
            var profileEditCancel = document.getElementById('btnMineProfileEditCancel');
            var profileEditMask = document.getElementById('mineProfileEditModalMask');
            var profileEditNameInp = document.getElementById('mineEditRealName');
            var profileEditTaxInp = document.getElementById('mineEditTaxId');
            if (profileEditOk) {
                profileEditOk.addEventListener('click', saveMineProfileEdit);
            }
            if (profileEditCancel) {
                profileEditCancel.addEventListener('click', closeMineProfileEditModal);
            }
            if (profileEditMask) {
                profileEditMask.addEventListener('click', closeMineProfileEditModal);
            }
            if (profileEditNameInp) {
                profileEditNameInp.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (profileEditOk) profileEditOk.click();
                    }
                });
            }
            if (profileEditTaxInp) {
                profileEditTaxInp.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (profileEditOk) profileEditOk.click();
                    }
                });
            }

            loadUserInfo();
            fetchMineXianyuUrl();
            installLegacyActivatePromptShim();

            function handleConsultMenuClick(e) {
                e.preventDefault();
                if (isInactiveAccount() && !hasTaxRecords()) {
                    confirmModifyTaxData();
                    return;
                }
                goConsultPage();
            }
            document.getElementById('consultModifyLink').addEventListener('click', handleConsultMenuClick);
            var careVersionLink = document.getElementById('mineCareVersionLink');
            if (careVersionLink) {
                careVersionLink.addEventListener('click', handleConsultMenuClick);
            }

            var mineActivateBtn = document.getElementById('mineActivateBtn');
            if (mineActivateBtn) {
                mineActivateBtn.addEventListener('click', function () {
                    if (typeof window.trackUserAction === 'function') {
                        window.trackUserAction('track_activate_prompt_open', { page: 'mine' });
                    }
                    openMineActivateModal();
                });
            }

            var mineOkBtn = document.getElementById('btnMineActivateOk');
            var mineCancelBtn = document.getElementById('btnMineActivateCancel');
            var mineXyBtn = document.getElementById('btnMineActivateXianyu');
            var mineMask = document.getElementById('mineActivateModalMask');
            var mineInput = document.getElementById('mineActivateCodeInput');
            if (mineOkBtn) {
                mineOkBtn.addEventListener('click', function () {
                    if (typeof window.trackUserAction === 'function') {
                        window.trackUserAction('track_activate_prompt_confirm', { page: 'mine' });
                    }
                    closeMineActivateModal();
                    submitMineActivateWithCode(mineInput ? mineInput.value : '');
                });
            }
            if (mineCancelBtn) {
                mineCancelBtn.addEventListener('click', function () {
                    if (typeof window.trackUserAction === 'function') {
                        window.trackUserAction('track_activate_prompt_cancel', { page: 'mine' });
                    }
                    closeMineActivateModal();
                });
            }
            if (mineMask) {
                mineMask.addEventListener('click', function () {
                    if (typeof window.trackUserAction === 'function') {
                        window.trackUserAction('track_activate_prompt_cancel', { page: 'mine' });
                    }
                    closeMineActivateModal();
                });
            }
            if (mineInput) {
                mineInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (mineOkBtn) mineOkBtn.click();
                    }
                });
            }
            if (mineXyBtn) {
                mineXyBtn.addEventListener('click', openMineXianyuPurchase);
            }

            var consultModifyOk = document.getElementById('btnMineConsultModifyOk');
            var consultModifyCancel = document.getElementById('btnMineConsultModifyCancel');
            var consultModifyXy = document.getElementById('btnMineConsultModifyXianyu');
            var consultModifyMask = document.getElementById('mineConsultModifyModalMask');
            if (consultModifyOk) {
                consultModifyOk.addEventListener('click', function () {
                    closeMineConsultModifyModal();
                    goConsultPage();
                });
            }
            if (consultModifyCancel) {
                consultModifyCancel.addEventListener('click', closeMineConsultModifyModal);
            }
            if (consultModifyMask) {
                consultModifyMask.addEventListener('click', closeMineConsultModifyModal);
            }
            if (consultModifyXy) {
                consultModifyXy.addEventListener('click', openMineQqAddUrl);
            }

            document.getElementById('mineLogout').addEventListener('click', function () {
                try {
                    sessionStorage.clear();
                    localStorage.removeItem('token');
                    localStorage.removeItem('user_id');
                    localStorage.removeItem('username');
                    localStorage.removeItem('real_name');
                    localStorage.removeItem('tax_id');
                } catch (e) {}
                window.location.href = 'login.html';
            });
        })();
    </script>
</body>
</html>
