<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260516-cordova-2410-bottom"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修改密码</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 0));
        }
        .header {
            background: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        .back-btn {
            position: absolute;
            left: 12px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
        }
        .header-title { font-size: 17px; font-weight: 500; color: #333; }
        .form-wrap {
            margin-top: 12px;
            background: #fff;
        }
        .form-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            min-height: 50px;
        }
        .form-row:last-child { border-bottom: none; }
        .form-label {
            font-size: 15px;
            color: #333;
            width: 88px;
            flex-shrink: 0;
        }
        .form-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: #333;
            background: transparent;
            font-family: inherit;
            min-width: 0;
        }
        .form-input::placeholder { color: #bbb; }
        .form-hint {
            padding: 10px 16px 0;
            font-size: 12px;
            color: #999;
            line-height: 1.5;
        }
        .msg {
            margin: 12px 16px 0;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }
        .msg.err {
            display: block;
            background: #fff1f0;
            color: #cf1322;
        }
        .msg.ok {
            display: block;
            background: #f6ffed;
            color: #389e0d;
        }
        .footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
            background: #f5f6fa;
        }
        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            background: #1e6fff;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-submit:disabled {
            background: #7eb4ff;
            cursor: default;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="aqzx.html" class="back-btn">
            <img src="jt.png" alt="" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">修改密码</span>
    </div>
    <p class="form-hint">密码长度为 1～64 位，修改成功后请使用新密码登录。</p>
    <div id="pwdMsg" class="msg" role="alert"></div>
    <div class="form-wrap">
        <div class="form-row">
            <span class="form-label">原密码</span>
            <input type="password" class="form-input" id="pwdOld" placeholder="请输入原密码" autocomplete="current-password" maxlength="64">
        </div>
        <div class="form-row">
            <span class="form-label">新密码</span>
            <input type="password" class="form-input" id="pwdNew" placeholder="请输入新密码" autocomplete="new-password" maxlength="64">
        </div>
        <div class="form-row">
            <span class="form-label">确认密码</span>
            <input type="password" class="form-input" id="pwdConfirm" placeholder="请再次输入新密码" autocomplete="new-password" maxlength="64">
        </div>
    </div>
    <div class="footer">
        <button type="button" class="btn-submit" id="btnPwdSubmit">确认修改</button>
    </div>
    <script>
        (function () {
            var msgEl = document.getElementById('pwdMsg');
            var btn = document.getElementById('btnPwdSubmit');
            var oldEl = document.getElementById('pwdOld');
            var newEl = document.getElementById('pwdNew');
            var confirmEl = document.getElementById('pwdConfirm');

            function setMsg(text, isErr) {
                if (!msgEl) return;
                if (!text) {
                    msgEl.className = 'msg';
                    msgEl.textContent = '';
                    return;
                }
                msgEl.className = 'msg ' + (isErr ? 'err' : 'ok');
                msgEl.textContent = text;
            }

            function canSubmit() {
                var o = oldEl && oldEl.value;
                var n = newEl && newEl.value;
                var c = confirmEl && confirmEl.value;
                return !!(o && n && c);
            }

            function syncBtn() {
                if (!btn) return;
                btn.disabled = !canSubmit();
            }

            [oldEl, newEl, confirmEl].forEach(function (el) {
                if (el) el.addEventListener('input', syncBtn);
            });
            syncBtn();

            if (btn) {
                btn.addEventListener('click', function () {
                    setMsg('');
                    var oldPwd = String(oldEl && oldEl.value || '');
                    var newPwd = String(newEl && newEl.value || '');
                    var confirmPwd = String(confirmEl && confirmEl.value || '');
                    if (!oldPwd) {
                        setMsg('请输入原密码', true);
                        return;
                    }
                    if (!newPwd) {
                        setMsg('请输入新密码', true);
                        return;
                    }
                    if (newPwd.length > 64) {
                        setMsg('新密码不能超过 64 位', true);
                        return;
                    }
                    if (newPwd !== confirmPwd) {
                        setMsg('两次输入的新密码不一致', true);
                        return;
                    }
                    if (oldPwd === newPwd) {
                        setMsg('新密码不能与原密码相同', true);
                        return;
                    }
                    btn.disabled = true;
                    var fetchFn = typeof authFetch === 'function' ? authFetch : fetch;
                    var headers = typeof authHeaders === 'function' ? authHeaders() : { 'Content-Type': 'application/json' };
                    fetchFn('api/user.php', {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            action: 'change_password',
                            old_password: oldPwd,
                            new_password: newPwd
                        })
                    })
                        .then(function (r) {
                            return r.json().then(function (j) {
                                return { status: r.status, body: j };
                            });
                        })
                        .then(function (x) {
                            if (x.status === 200 && x.body && x.body.code === 200) {
                                setMsg('密码修改成功', false);
                                setTimeout(function () {
                                    window.location.href = 'aqzx.html';
                                }, 800);
                                return;
                            }
                            setMsg((x.body && x.body.msg) || '修改失败', true);
                        })
                        .catch(function () {
                            setMsg('网络错误，请稍后重试', true);
                        })
                        .finally(function () {
                            syncBtn();
                        });
                });
            }
        })();
    </script>
    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
</body>
</html>
