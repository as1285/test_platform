<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收入纳税明细</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 高于 watermark.js 全屏层（z-index:99999），避免「未激活」水印叠在内容上导致插画/文字发灰、不清晰 */
        .page-root {
            position: relative;
            z-index: 100000;
            min-height: 100vh;
            background: #f5f6fa;
            isolation: isolate;
        }

        .top-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: #f5f6fa;
            isolation: isolate;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .header {
            background: #fff;
            padding: calc(12px + env(safe-area-inset-top, 0px)) 16px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            color: #1e6fff;
            font-size: 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .back-btn svg {
            width: 9px;
            height: 14px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }

        .header-right {
            position: absolute;
            right: 16px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
        }

        .summary {
            background: #fff;
            position: relative;
            border-top: 10px solid #f5f6fa;
            padding: 10px 16px 2px;
            border-bottom: 10px solid #f5f6fa;
            overflow: hidden;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0 9px;
            margin-bottom: 3px;
            border-bottom: 1px solid #e5e5e5;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-label {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .summary-label .icon {
            width: 16px;
            height: 16px;
            border: 1px solid #0e60f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #0e60f1;
        }

        .summary-value {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        .list {
            padding: calc(var(--top-fixed-height, 154px) + 12px) 0 24px;
            background: #f5f6fa;
            position: relative;
            isolation: isolate;
        }

        .list-item {
            display: block;
            width: 100%;
            background: #fff;
            border-radius: 0;
            padding: 14px 16px;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            color: inherit;
            position: relative;
            z-index: 1;
            border-top: 10px solid #f5f6fa;
        }

        .list-item:first-child {
            border-top-width: 0;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }

        .list-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            letter-spacing: 0.01em;
        }

        /* 年月：与官方端一致，用系统 UI 数字（避免 tnum 导致偏窄偏高），对比度用中灰+medium */
        .list-date {
            flex-shrink: 0;
            font-family: -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: #666;
            margin-right: 8px;
            letter-spacing: 0;
        }

        .list-row {
            padding: 3px 0;
        }

        .list-label {
            font-size: 15px;
            color: #999;
        }

        .list-row-with-arrow {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 3px 0;
            gap: 8px;
        }

        .list-row-left {
            flex: 1;
            min-width: 0;
        }

        .list-company {
            font-size: 15px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            max-width: 100%;
        }

        .list-arrow {
            width: 10px;
            height: 10px;
            flex-shrink: 0;
            margin-top: 6px;
            opacity: 0.45;
        }

        .list-empty {
            text-align: center;
            padding: 40px 16px;
            color: #999;
            font-size: 14px;
        }

        /* 无纳税记录时的空状态（与产品参考一致：插画 + 文案） */
        .list-empty-state {
            text-align: center;
            padding: 36px 20px 56px;
            background: #f5f6fa;
        }

        .list-empty-illustration {
            margin: 0 auto;
            max-width: 280px;
        }

        .list-empty-illustration img {
            width: 100%;
            max-width: 260px;
            height: auto;
            display: block;
            margin: 0 auto;
            opacity: 1;
            filter: none;
            -webkit-user-select: none;
            user-select: none;
            transform: translateZ(0);
        }
    </style>
</head>
<body>
    <div class="page-root">
    <div class="top-fixed">
        <div class="header">
            <a href="shuiming.html" class="back-btn" aria-label="返回">
                <svg viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M7 1L1 7l6 6" stroke="#1e6fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>返回</span>
            </a>
            <span class="header-title">收入纳税明细</span>
            <a href="#" class="header-right" onclick="return false;">批量申诉</a>
        </div>

        <div class="summary">
            <div class="summary-item">
                <span class="summary-label">
                    收入合计
                    <span class="icon" title="说明">?</span>
                </span>
                <span class="summary-value" id="incomeTotal">0.00元</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">已申报税额合计：</span>
                <span class="summary-value" id="taxTotal">0.00元</span>
            </div>
        </div>
    </div>

    <div class="list" id="recordList">
        <div class="list-empty">加载中…</div>
    </div>
    </div>

    <script>
        function syncTopFixedHeight() {
            var topFixed = document.querySelector('.top-fixed');
            if (!topFixed) return;
            document.documentElement.style.setProperty('--top-fixed-height', topFixed.offsetHeight + 'px');
        }

        function getUrlParam(name) {
            var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        /** 无记录时的空状态（与产品图一致：shuiming_empty.png 内含插画与「页面空空如也」文案） */
        function getNoRecordsHtml() {
            return (
                '<div class="list-empty-state" role="status">' +
                '<div class="list-empty-illustration">' +
                '<img src="shuiming_empty.png" alt="页面空空如也" width="229" height="227" loading="lazy" decoding="async">' +
                '</div></div>'
            );
        }

        function renderList(records, listYear) {
            var listHtml = '';
            records.forEach(function(record) {
                var month = record.month < 10 ? '0' + record.month : record.month;
                var subtype = record.income_subtype || '正常工资薪金';
                var company = record.company_name || '';
                var id = record.id != null ? record.id : '';
                listHtml += '<a href="xiangqing.html?id=' + encodeURIComponent(id) + '&year=' + encodeURIComponent(String(listYear)) + '" class="list-item" style="text-decoration: none; display: block;">';
                listHtml += '<div class="list-header">';
                listHtml += '<span class="list-title">' + escapeHtml(record.income_type || '') + '</span>';
                listHtml += '<span class="list-date">' + record.year + '-' + month + '</span>';
                listHtml += '</div>';
                listHtml += '<div class="list-row"><span class="list-label">所得项目小类：' + escapeHtml(subtype) + '</span></div>';
                listHtml += '<div class="list-row-with-arrow">';
                listHtml += '<div class="list-row-left">';
                listHtml += '<div class="list-row"><span class="list-company">扣缴义务人：' + escapeHtml(company) + '</span></div>';
                listHtml += '<div class="list-row"><span class="list-label">收入：' + escapeHtml(String(record.income)) + '元</span></div>';
                listHtml += '</div>';
                listHtml += '<svg class="list-arrow" viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1l6 6-6 6" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
                listHtml += '</div>';
                listHtml += '<div class="list-row"><span class="list-label">已申报税额：' + escapeHtml(String(record.tax_reported)) + '元</span></div>';
                listHtml += '</a>';
            });
            document.getElementById('recordList').innerHTML = listHtml || getNoRecordsHtml();
        }

        function formatYuanField(v) {
            if (v == null || v === '') return '0.00';
            return String(v);
        }

        function applyTotals(data) {
            document.getElementById('incomeTotal').textContent = formatYuanField(data.income_total) + '元';
            document.getElementById('taxTotal').textContent = formatYuanField(data.tax_total) + '元';
        }

        function loadData() {
            var year = getUrlParam('year') || new Date().getFullYear();

            authFetch('api/tax.php?action=records&year=' + encodeURIComponent(year))
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.code === 200 && data.data) {
                        var records = data.data.records;
                        if (!Array.isArray(records)) records = [];
                        applyTotals({
                            income_total: data.data.income_total,
                            tax_total: data.data.tax_total
                        });
                        renderList(records, year);
                        return;
                    }
                    throw new Error('api_not_ok');
                })
                .catch(function() {
                    applyTotals({ income_total: '0.00', tax_total: '0.00' });
                    document.getElementById('recordList').innerHTML =
                        '<div class="list-empty">无法加载数据，请确认已登录且税务记录服务可用</div>';
                });
        }

        window.addEventListener('resize', syncTopFixedHeight);
        window.addEventListener('orientationchange', syncTopFixedHeight);

        syncTopFixedHeight();
        loadData();
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
