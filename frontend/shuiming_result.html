<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收入纳税明细</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }
        
        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 15px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        
        .back-btn {
            position: absolute;
            left: 16px;
            color: #1e6fff;
            font-size: 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }
        
        .header-right {
            position: absolute;
            right: 16px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
        }
        
        /* 汇总区域 */
        /*.summary {*/
        /*    background: #fff;*/
        /*    padding: 0 16px;*/
        /*    position: fixed;*/
        /*    top: 52px;*/
        /*    left: 0;*/
        /*    right: 0;*/
        /*    z-index: 99;*/
        /*}*/
        
        /* 汇总区域 - 增加底部蒙层效果 */
        .summary {
            background: #fff;
            position: fixed;
            top: 52px;
            left: 0;
            right: 0;
            z-index: 99;
            height: auto;
            background-color: #ffffff;
            z-index: 101;
            background-clip: border-box;
            overflow: visible;
            will-change: background;
            border-top: 10px solid #f5f6fa;
            padding-left: 16px;
            padding-right: 16px;
            padding-top: 10px;
            padding-bottom: 2px;
            border-bottom: 10px solid #f5f6fa;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            margin-bottom: 3px;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 9px;
        }
        
        .summary-item:last-child {
            border-bottom: none;
        }
        
        .summary-label {
            font-size: 15px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .summary-label .icon {
            width: 16px;
            height: 16px;
            border: 1px solid #0e60f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #0e60f1;
        }
        
        .summary-value {
            font-size: 15px;
            color: #000000;
        }
        
        /* 列表区域 */
        .list {
            /*margin-top: 115px;*/
            /*padding-bottom: 20px;*/
                /* 1. 先让列表顶部对齐summary顶部（52px） */
            margin-top: 52px;
            /* 2. 向下偏移summary的高度 + 间距 */
            padding-top: 102px;
            /* 3. 保留原有底部内边距 */
            padding-bottom: 20px;
            /* 4. 确保列表内容不会被padding-top遮挡 */
            
        }
        
        .list-item:first-child {
            margin-top: 0;
        }

        .list-item {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            margin-top: 9px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }
        
        .list-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }
        
        .list-date {
            font-size: 17px;
            color: #333;
            margin-right: 25px;
        }
        
        .list-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
        }
        
        .list-label {
            font-size: 15px;
            color: #999;
        }
        
        .list-company {
            font-size: 15px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            max-width: 12em;
        }
        
        .list-value {
            font-size: 14px;
            color: #333;
        }
        
        .list-arrow {
            width: 10px;
        }
        
        .list-row-with-arrow {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 3px 0;
        }
        
        .list-row-left {
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <a href="shuiming.html" class="back-btn">
            <img src="jt.png" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">收入纳税明细</span>
        <a href="#" class="header-right">批量申诉</a>
    </div>
    
    <!-- 汇总区域 -->
    <div class="summary">
        <div class="summary-item">
            <span class="summary-label">
                收入合计
                <span class="icon">?</span>:
            </span>
            <span class="summary-value" id="incomeTotal">0.00元</span>
        </div>
        <div class="summary-item">
            <span class="summary-label">已申报税额合计:</span>
            <span class="summary-value" id="taxTotal">0.00元</span>
        </div>
    </div>
    
    <!-- 列表区域 -->
    <div class="list" id="recordList">
        <!-- 动态加载 -->
    </div>
    
    <script>
        // 获取URL参数
        function getUrlParam(name) {
            var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }
        
        // 加载数据
        function loadData() {
            var year = getUrlParam('year') || new Date().getFullYear();
            var userId = localStorage.getItem('user_id') || '';
            
            fetch('api/tax.php?action=records&year=' + year + '&user_id=' + userId)
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    document.getElementById('incomeTotal').textContent = data.data.income_total + '元';
                    document.getElementById('taxTotal').textContent = data.data.tax_total + '元';
                    
                    var listHtml = '';
                    data.data.records.forEach(function(record) {
                        var month = record.month < 10 ? '0' + record.month : record.month;
                        listHtml += '<a href="xiangqing.html?id=' + record.id + '" class="list-item" style="text-decoration: none; display: block;">';
                        listHtml += '<div class="list-header">';
                        listHtml += '<span class="list-title">' + record.income_type + '</span>';
                        listHtml += '<span class="list-date">' + record.year + '-' + month + '</span>';
                        listHtml += '</div>';
                        listHtml += '<div class="list-row">';
                        listHtml += '<span class="list-label">所得项目小类：' + record.income_subtype + '</span>';
                        listHtml += '</div>';
                        listHtml += '<div class="list-row-with-arrow">';
                        listHtml += '<div class="list-row-left">';
                        var companyName = record.company_name.length > 12 ? record.company_name.substring(0, 12) + '...' : record.company_name;
                        listHtml += '<div class="list-row"><span class="list-label">扣缴义务人：' + companyName + '</span></div>';
                        listHtml += '<div class="list-row"><span class="list-label">收入：' + record.income + '元</span></div>';
                        listHtml += '</div>';
                        listHtml += '<img src="jt.jpg" class="list-arrow">';
                        listHtml += '</div>';
                        listHtml += '<div class="list-row">';
                        listHtml += '<span class="list-label">已申报税额：' + record.tax_reported + '元</span>';
                        listHtml += '</div>';
                        listHtml += '</a>';
                    });
                    
                    document.getElementById('recordList').innerHTML = listHtml;
                }
            })
            .catch(error => {
                console.error(error);
            });
        }
        
        loadData();
    </script>
    <script src="js/watermark.js"></script>
</body>
</html>
