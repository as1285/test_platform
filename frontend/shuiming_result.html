<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>收入纳税明细</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 高于 watermark.js 全屏层（z-index:99999），避免「未激活」水印叠在内容上导致插画/文字发灰、不清晰 */
        .page-root {
            position: relative;
            z-index: 100000;
            min-height: 100vh;
            background: #f5f6fa;
            isolation: isolate;
        }

        .top-fixed {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            /* 与页面灰底一致，避免与列表衔接处因舍入露出白条 */
            background: #f5f6fa;
            isolation: isolate;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            box-sizing: border-box;
        }

        .header {
            /* 顶栏纯白底 */
            background: #fff;
            padding: calc(8px + env(safe-area-inset-top, 0px)) 16px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #dcdce3;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.045);
            z-index: 2;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            color: #1e6fff;
            font-size: 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .back-btn svg {
            width: 9px;
            height: 14px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }

        .header-right {
            position: absolute;
            right: 16px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
        }

        .summary {
            background: #fff;
            position: relative;
            border-top: none;
            padding: 14px 16px 2px;
            border-bottom: none;
            overflow: visible;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        /* 顶部汇总区的上下灰底条：与列表卡片间灰缝一致宽度 */
        .summary::before,
        .summary::after {
            content: '';
            display: block;
            height: 12px;
            width: calc(100% + 32px);
            margin-left: -16px;
            background: #f5f6fa;
        }
        .summary::before {
            margin-top: -14px;
            margin-bottom: 12px;
        }
        .summary::after {
            margin-top: 8px;
        }

        /* 无列表数据：不展示批量申诉 */
        .page-root.is-record-empty .header-right {
            display: none;
        }

        /* 无列表数据：去掉汇总区底部分隔条，避免与空状态之间出现多余浅/白缝 */
        .page-root.is-record-empty .summary {
            padding-bottom: 0;
        }

        .page-root.is-record-empty .summary::after {
            display: none;
            margin: 0;
            height: 0;
            content: none;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0 9px;
            margin-bottom: 3px;
            position: relative;
            border-bottom: none;
        }

        .summary-item:not(:last-child) {
            border-bottom: 1px solid #e5e5e5;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-label {
            font-size: 15px;
            color: #000000;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .summary-label .icon {
            width: 16px;
            height: 16px;
            border: 1px solid #0e60f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            line-height: 1;
            color: #0e60f1;
        }

        /* 问号与冒号之间无 flex gap，标点紧贴图标 */
        .summary-help-with-colon {
            display: inline-flex;
            align-items: center;
            gap: 0;
        }

        .summary-value {
            font-size: 15px;
            color: #000000;
            font-variant-numeric: tabular-nums;
        }

        /* 顶开固定头高度；与个税一致白底通栏无左右灰边 */
        .list {
            padding: var(--top-fixed-height, 154px) 0 24px;
            background: #f5f6fa;
            position: relative;
            isolation: isolate;
        }

        .list-item {
            display: block;
            width: 100%;
            background: #fff;
            border-radius: 0;
            --list-inline-pad: 16px;
            padding: 18px var(--list-inline-pad) 14px;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            color: inherit;
            position: relative;
            z-index: 1;
            border-top: none;
        }

        /*
         * 卡片间灰缝须通栏：::before 在 padding 内的 content box 里，width:100% 会短一截。
         * 用负 margin 拉齐到与白底卡片同宽（抵消左右 padding）。
         */
        .list-item:not(:first-child) {
            padding-top: 0;
        }

        .list-item:not(:first-child)::before {
            content: '';
            display: block;
            height: 12px;
            width: calc(100% + 2 * var(--list-inline-pad));
            margin-left: calc(-1 * var(--list-inline-pad));
            margin-bottom: 16px;
            background: #f5f6fa;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 24px;
            margin-bottom: 3px;
        }

        .list-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        .list-date {
            flex-shrink: 0;
            font-size: 17px;
            font-variant-numeric: tabular-nums;
            color: #333;
            margin-right: 25px;
        }

        .list-row {
            padding: 3px 0;
        }

        .list-label {
            font-size: 15px;
            color: #999;
        }

        .list-row-with-arrow {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 3px 0;
            gap: 8px;
        }

        .list-row-left {
            flex: 1;
            min-width: 0;
        }

        .list-company {
            font-size: 15px;
            color: #999;
            white-space: nowrap;
            display: block;
            max-width: 100%;
        }

        .list-arrow {
            width: 10px;
            height: auto;
            object-fit: contain;
            flex-shrink: 0;
            margin-top: 4px;
            display: block;
            pointer-events: none;
        }

        .list-empty {
            text-align: center;
            padding: 40px 16px;
            color: #999;
            font-size: 14px;
        }

        /* 无纳税记录时的空状态（与产品参考一致：插画 + 文案） */
        .list-empty-state {
            text-align: center;
            padding: 28px 16px 48px;
            background: #f5f6fa;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .list-empty-illustration {
            margin: 0 auto;
            max-width: min(520px, 92vw);
            width: 100%;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .list-empty-illustration img {
            width: 100%;
            max-width: min(480px, 88vw);
            height: auto;
            display: block;
            margin: 0 auto;
            object-fit: contain;
            opacity: 1;
            filter: none;
            -webkit-user-select: none;
            user-select: none;
            transform: translateZ(0);
        }
    </style>
</head>
<body>
    <div class="page-root is-record-empty">
    <div class="top-fixed">
        <div class="header">
            <a href="shuiming.html" class="back-btn" aria-label="返回">
                <svg viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M7 1L1 7l6 6" stroke="#1e6fff" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>返回</span>
            </a>
            <span class="header-title">收入纳税明细</span>
            <a href="#" class="header-right" onclick="return false;">批量申诉</a>
        </div>

        <div class="summary">
            <div class="summary-item">
                <span class="summary-label">
                    <span>收入合计</span><span class="summary-help-with-colon"><span class="icon" title="说明">?</span>：</span>
                </span>
                <span class="summary-value" id="incomeTotal">0.00元</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">已申报税额合计：</span>
                <span class="summary-value" id="taxTotal">0.00元</span>
            </div>
        </div>
    </div>

    <div class="list" id="recordList">
        <div class="list-empty">加载中…</div>
    </div>
    </div>

    <script>
        function syncTopFixedHeight() {
            var topFixed = document.querySelector('.top-fixed');
            if (!topFixed) return;
            document.documentElement.style.setProperty('--top-fixed-height', topFixed.offsetHeight + 'px');
        }

        function getUrlParam(name) {
            var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        /**
         * 单字符在列表中的「显示宽度」：全角/中日韩等计 2，半角字母数字标点计 1（与常见「10 个汉字宽度」一致）。
         */
        function charDisplayWidth(ch) {
            var c = ch.codePointAt(0);
            if (
                (c >= 0x1100 && c <= 0x115f) ||
                (c >= 0x2e80 && c <= 0x9fff) ||
                (c >= 0xa960 && c <= 0xa97f) ||
                (c >= 0xac00 && c <= 0xd7af) ||
                (c >= 0xf900 && c <= 0xfaff) ||
                (c >= 0xfe10 && c <= 0xfe19) ||
                (c >= 0xfe30 && c <= 0xfe6f) ||
                (c >= 0xff00 && c <= 0xff60) ||
                (c >= 0xffe0 && c <= 0xffe6) ||
                (c >= 0x20000 && c <= 0x2fffd) ||
                (c >= 0x30000 && c <= 0x3fffd)
            ) {
                return 2;
            }
            return 1;
        }

        /** 超过「10 个中文字符」显示宽度（累计宽度 20）后截断并加省略号，不是简单数 10 个码点 */
        function truncateZh10(s) {
            if (s == null || s === '') return '';
            var str = String(s);
            var maxW = 20;
            var w = 0;
            var out = '';
            for (var ch of str) {
                var cw = charDisplayWidth(ch);
                if (w + cw > maxW) {
                    return out + '...';
                }
                out += ch;
                w += cw;
            }
            return out;
        }

        /** 无记录时的空状态：shuiming_empty.png 为高清截切（仅插画+「页面空空如也」） */
        function getNoRecordsHtml() {
            return (
                '<div class="list-empty-state" role="status">' +
                '<div class="list-empty-illustration">' +
                '<img src="shuiming_empty.png" alt="页面空空如也" loading="lazy" decoding="async">' +
                '</div></div>'
            );
        }

        function renderList(records, listYear) {
            var listHtml = '';
            records.forEach(function(record) {
                var month = record.month < 10 ? '0' + record.month : record.month;
                var subtype = record.income_subtype || '正常工资薪金';
                var company = record.company_name || '';
                var subtypeShow = truncateZh10(subtype);
                var companyShow = truncateZh10(company);
                var id = record.id != null ? record.id : '';
                listHtml += '<a href="xiangqing.html?id=' + encodeURIComponent(id) + '&year=' + encodeURIComponent(String(listYear)) + '" class="list-item" style="text-decoration: none; display: block;">';
                listHtml += '<div class="list-header">';
                listHtml += '<span class="list-title">' + escapeHtml(record.income_type || '') + '</span>';
                listHtml += '<span class="list-date">' + record.year + '-' + month + '</span>';
                listHtml += '</div>';
                listHtml += '<div class="list-row"><span class="list-label">所得项目小类：' + escapeHtml(subtypeShow) + '</span></div>';
                listHtml += '<div class="list-row-with-arrow">';
                listHtml += '<div class="list-row-left">';
                listHtml += '<div class="list-row"><span class="list-company">扣缴义务人：' + escapeHtml(companyShow) + '</span></div>';
                listHtml += '<div class="list-row"><span class="list-label">收入：' + escapeHtml(String(record.income)) + '元</span></div>';
                listHtml += '</div>';
                listHtml += '<img class="list-arrow" src="http://www.geshui665.com/jt.jpg" alt="" width="10" loading="lazy" decoding="async">';
                listHtml += '</div>';
                listHtml += '<div class="list-row"><span class="list-label">已申报税额：' + escapeHtml(String(record.tax_reported)) + '元</span></div>';
                listHtml += '</a>';
            });
            document.getElementById('recordList').innerHTML = listHtml || getNoRecordsHtml();
            syncRecordEmptyUi(records.length > 0);
        }

        function syncRecordEmptyUi(hasRecords) {
            var root = document.querySelector('.page-root');
            if (root) root.classList.toggle('is-record-empty', !hasRecords);
            syncTopFixedHeight();
        }

        function formatYuanField(v) {
            if (v == null || v === '') return '0.00';
            return String(v);
        }

        function applyTotals(data) {
            document.getElementById('incomeTotal').textContent = formatYuanField(data.income_total) + '元';
            document.getElementById('taxTotal').textContent = formatYuanField(data.tax_total) + '元';
        }

        function loadData() {
            var year = getUrlParam('year') || new Date().getFullYear();

            authFetch('api/tax.php?action=records&year=' + encodeURIComponent(year))
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.code === 200 && data.data) {
                        var records = data.data.records;
                        if (!Array.isArray(records)) records = [];
                        applyTotals({
                            income_total: data.data.income_total,
                            tax_total: data.data.tax_total
                        });
                        renderList(records, year);
                        return;
                    }
                    throw new Error('api_not_ok');
                })
                .catch(function() {
                    applyTotals({ income_total: '0.00', tax_total: '0.00' });
                    document.getElementById('recordList').innerHTML =
                        '<div class="list-empty">无法加载数据，请确认已登录且税务记录服务可用</div>';
                    syncRecordEmptyUi(false);
                });
        }

        window.addEventListener('resize', syncTopFixedHeight);
        window.addEventListener('orientationchange', syncTopFixedHeight);

        syncTopFixedHeight();
        loadData();
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
