                if (/Android/i.test(u)) document.documentElement.classList.add('platform-android');
                if (
                    /iPhone|iPad|iPod/i.test(u) ||
                    (typeof navigator !== 'undefined' &&
                        navigator.platform === 'MacIntel' &&
                        (navigator.maxTouchPoints || 0) > 1)
                ) {
                    document.documentElement.classList.add('platform-ios');

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        html,

        body {

            background: #f5f6fa;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;

        /*
         * 金额用正文同源无衬线 + tabular-nums：普通椭圆 0。
         * （JetBrains Mono / Fira Code / Consolas 等编程字体会刻意做成「带点或斜杠的 0」以便和字母 O 区分，不适合账务展示。）
         */
        .summary-value,
        .list-date,
        .list-label,
        .list-value {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

        /* 主内容保持独立层；未激活水印由 watermark.js 使用更高层级覆盖 */

            --safe-top: env(safe-area-inset-top, 0px);
            --header-height: 52px;
            --list-summary-pad: 102px;
            position: relative;
            z-index: 100000;
            min-height: 100vh;
            background: #f5f6fa;

        .top-fixed {

        }

        .header {
            background: #fff;

            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: var(--safe-top);

            right: 0;
            z-index: 100;

        .back-btn {
            position: absolute;

        /* Android：Roboto 对中段字重易合成偏粗，汇总金额略降为 400 以接近 iOS/SF 观感；未加 class 的 iOS 等保持 490 */
        html.platform-android .summary-value {
            font-weight: 400;

        /* 列表顶部留白：避开固定汇总区（高度用 JS 实测写入 --list-summary-pad） */

        }

        .list-title {

            font-weight: 500;

            line-height: 1.25;

            min-width: 0;

        /* Android：列表主标题（工资薪金等）Roboto 500 偏厚，略降为 400 与右侧日期粗细更协调 */
        html.platform-android .list-title {
            font-weight: 400;
            font-synthesis: none;
        }

        /*
         * iOS：PingFang 系统栈 + 列表排版按 iOS 规格微调（与 platform-android 互斥）。
         */

        html.platform-ios .header-title,

        html.platform-ios .summary-label,

        .list-date {

        /* 25060RK16C：扣缴义务人完整展示（其它机型保持单行省略） */

<body class="page-shuiming-result">
    <div class="page-root is-record-empty">
    <div class="top-fixed">
        <div class="header">
            <a href="shuiming.html" class="back-btn" aria-label="返回">
                <svg viewBox="0 0 8 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <path d="M7 1L1 7l6 6" stroke="#1e6fff" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>返回</span>
            </a>
            <span class="header-title">收入纳税明细</span>
            <a href="#" class="header-right" onclick="return false;">批量申诉</a>
        </div>

        <div class="summary">
            <div class="summary-item">
                <span class="summary-label">
                    <span>收入合计</span><span class="summary-help-with-colon"><span class="icon" title="说明">?</span>：</span>
                </span>
                <span class="summary-value" id="incomeTotal">0.00元</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">已申报税额合计：</span>
                <span class="summary-value" id="taxTotal">0.00元</span>
            </div>
        </div>
    </div>

    <div class="list" id="recordList">
        <div class="list-empty">加载中…</div>
    </div>
    </div>

    <script>
        function syncTopFixedHeight() {
            var summary = document.querySelector('.summary');
            var root = document.querySelector('.page-root');
            function measureAndApply() {
                var pad = 102;
                if (summary) {
                    var r = summary.getBoundingClientRect();
                    var h = r.height;
                    if (!(h > 0)) {
                        h = summary.offsetHeight || summary.scrollHeight || 0;
                    }
                    if (h > 0) {
                        pad = Math.ceil(h) + 4;
                    }
                }
                if (root) {
                    root.style.setProperty('--list-summary-pad', pad + 'px');
                }
            }
            measureAndApply();
            requestAnimationFrame(function () {
                measureAndApply();
                requestAnimationFrame(measureAndApply);
            });
        }

        function initTopFixedHeightObserver() {
            var summary = document.querySelector('.summary');
            if (!summary || typeof ResizeObserver === 'undefined') return;
            var ro = new ResizeObserver(function () {
                syncTopFixedHeight();
            });
            ro.observe(summary);
        }

        function getUrlParam(name) {
            var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)');
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }

        function escapeHtml(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        /**
         * 在已 escapeHtml 的纯文本上，为「7」且紧跟数字的情况包 span，用负 margin 做轻微字距修正（如 71、7.1 不匹配点小数点后的 0）。
         * 禁止对未转义内容调用，避免破坏标签或 XSS。
         */
        function kernSevenAfterDigitInEscaped(escapedText) {
            return String(escapedText).replace(/7(?=\d)/g, '<span class="digit-kern-seven">7</span>');
        }

        function amountSummaryInnerHtml(yuanText) {
            return kernSevenAfterDigitInEscaped(escapeHtml(String(yuanText)));
        }

        /**
         * 单字符在列表中的「显示宽度」：全角/中日韩等计 2，半角字母数字标点计 1（与常见「10 个汉字宽度」一致）。
         */
        function charDisplayWidth(ch) {
            var c = ch.codePointAt(0);
            if (
                (c >= 0x1100 && c <= 0x115f) ||
                (c >= 0x2e80 && c <= 0x9fff) ||
                (c >= 0xa960 && c <= 0xa97f) ||
                (c >= 0xac00 && c <= 0xd7af) ||
                (c >= 0xf900 && c <= 0xfaff) ||
                (c >= 0xfe10 && c <= 0xfe19) ||
                (c >= 0xfe30 && c <= 0xfe6f) ||
                (c >= 0xff00 && c <= 0xff60) ||
                (c >= 0xffe0 && c <= 0xffe6) ||
                (c >= 0x20000 && c <= 0x2fffd) ||
                (c >= 0x30000 && c <= 0x3fffd)
            ) {
                return 2;
            }
            return 1;
        }

        /**
         * 按「显示宽度」截断：全角/CJK 计 2，半角计 1；超出 maxDisplayWidth 则加省略号。
         * maxDisplayWidth=20 → 约 10 个汉字；=22 → 约 11 个汉字。
         */
        function truncateDisplayWidth(s, maxDisplayWidth) {
            if (s == null || s === '') return '';
            var str = String(s);
            var maxW = maxDisplayWidth;
            var w = 0;
            var out = '';
            for (var ch of str) {
                var cw = charDisplayWidth(ch);
                if (w + cw > maxW) {
                    return out + '...';
                }
                out += ch;
                w += cw;
            }
            return out;
        }

        /** 无记录时的空状态：shuiming_empty.png 为高清截切（仅插画+「页面空空如也」） */
        function getNoRecordsHtml() {
            return (
                '<div class="list-empty-state" role="status">' +
                '<div class="list-empty-illustration">' +
                '<img src="shuiming_empty.png" alt="页面空空如也" loading="lazy" decoding="async">' +
                '</div></div>'
            );
        }

        function renderList(records, listYear) {
            var listHtml = '';
            records.forEach(function(record) {
                var month = record.month < 10 ? '0' + record.month : record.month;
                var subtype = record.income_subtype || '正常工资薪金';
                var company = record.company_name || '';
                var subtypeShow = truncateDisplayWidth(subtype, 20);
                var companyShow =
                    document.documentElement.classList.contains('app-android-25060rk16c')
                        ? company
                        : truncateDisplayWidth(company, 22);
                var id = record.id != null ? record.id : '';
                listHtml += '<a href="xiangqing.html?id=' + encodeURIComponent(id) + '&year=' + encodeURIComponent(String(listYear)) + '" class="list-item" style="text-decoration: none; display: block;">';
                listHtml += '<div class="list-header">';
                listHtml += '<span class="list-title">' + escapeHtml(record.income_type || '') + '</span>';
                listHtml += '<span class="list-date">' + kernSevenAfterDigitInEscaped(escapeHtml(String(record.year) + '-' + month)) + '</span>';
                listHtml += '</div>';
                listHtml += '<div class="list-row"><span class="list-label">所得项目小类：' + escapeHtml(subtypeShow) + '</span></div>';
                listHtml += '<div class="list-row-with-arrow">';
                listHtml += '<div class="list-row-left">';
                listHtml += '<div class="list-row"><span class="list-company">扣缴义务人：' + escapeHtml(companyShow) + '</span></div>';
                listHtml += '<div class="list-row"><span class="list-label">收入：' + kernSevenAfterDigitInEscaped(escapeHtml(String(record.income))) + '元</span></div>';
                listHtml += '</div>';
                listHtml += '<img class="list-arrow" src="http://www.geshui665.com/jt.jpg" alt="" width="10" loading="lazy" decoding="async">';
                listHtml += '</div>';
                listHtml += '<div class="list-row"><span class="list-label">已申报税额：' + kernSevenAfterDigitInEscaped(escapeHtml(String(record.tax_reported))) + '元</span></div>';
                listHtml += '</a>';
            });
            document.getElementById('recordList').innerHTML = listHtml || getNoRecordsHtml();
            syncRecordEmptyUi(records.length > 0);
        }

        function syncRecordEmptyUi(hasRecords) {
            var root = document.querySelector('.page-root');
            if (root) root.classList.toggle('is-record-empty', !hasRecords);
            syncTopFixedHeight();
        }

        function formatYuanField(v) {
            if (v == null || v === '') return '0.00';
            return String(v);
        }

        function applyTotals(data) {
            document.getElementById('incomeTotal').innerHTML = amountSummaryInnerHtml(formatYuanField(data.income_total) + '元');
            document.getElementById('taxTotal').innerHTML = amountSummaryInnerHtml(formatYuanField(data.tax_total) + '元');
            requestAnimationFrame(syncTopFixedHeight);
        }

        function createPurchaseWatermarkLayer() {
            if (document.getElementById('__test_account_purchase_wm__')) {
                return;
            }
            var canvas = document.createElement('canvas');
            var dpr = window.devicePixelRatio || 1;
            var w = 260;
            var h = 160;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            var ctx = canvas.getContext('2d');
            ctx.scale(dpr, dpr);
            ctx.translate(w / 2, h / 2);
            ctx.rotate(-24 * Math.PI / 180);
            ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif';
            ctx.fillStyle = 'rgba(30, 111, 255, 0.18)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('购买后去除水印', 0, 0);

            var layer = document.createElement('div');
            layer.id = '__test_account_purchase_wm__';
            layer.className = 'test-account-watermark-layer';
            layer.style.backgroundImage = 'url(' + canvas.toDataURL('image/png') + ')';
            var root = document.querySelector('.page-root') || document.body;
            root.appendChild(layer);
        }

        function removePurchaseWatermarkLayer() {
            var el = document.getElementById('__test_account_purchase_wm__');
            if (el && el.parentNode) {
                el.parentNode.removeChild(el);
            }
        }

        function applyPurchaseWatermark(enabled) {
            if (enabled) {
                createPurchaseWatermarkLayer();
            } else {
                removePurchaseWatermarkLayer();
            }
        }

        function refreshPurchaseWatermarkForTestAccount() {
            var localIsTest = false;
            var localInactive = false;
            try {
                localIsTest = localStorage.getItem('is_test_account') === '1';
                localInactive = localStorage.getItem('account_active') === '0';
            } catch (e0) {}
            if (localIsTest && localInactive) {
                applyPurchaseWatermark(true);
            } else {
                applyPurchaseWatermark(false);
            }

            authFetch('api/user.php?action=info')
                .then(function (r) { return r.json(); })
                .then(function (res) {
                    var d = res && res.code === 200 ? res.data : null;
                    var isTest = !!(d && d.is_test_account);
                    var isInactive = !!(d && d.account_active === false);
                    try {
                        localStorage.setItem('is_test_account', isTest ? '1' : '0');
                        if (d && d.account_active !== undefined && d.account_active !== null) {
                            localStorage.setItem('account_active', d.account_active ? '1' : '0');
                        }
                    } catch (e1) {}
                    applyPurchaseWatermark(isTest && isInactive);
                })
                .catch(function () {
                    applyPurchaseWatermark(localIsTest && localInactive);
                });
        }

        function loadData() {
            var year = getUrlParam('year') || new Date().getFullYear();

            authFetch('api/tax.php?action=records&year=' + encodeURIComponent(year))
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.code === 200 && data.data) {
                        var records = data.data.records;
                        if (!Array.isArray(records)) records = [];
                        applyTotals({
                            income_total: data.data.income_total,
                            tax_total: data.data.tax_total
                        });
                        renderList(records, year);
                        return;
                    }
                    throw new Error('api_not_ok');
                })
                .catch(function() {
                    applyTotals({ income_total: '0.00', tax_total: '0.00' });
                    document.getElementById('recordList').innerHTML =
                        '<div class="list-empty">无法加载数据，请确认已登录且税务记录服务可用</div>';
                    syncRecordEmptyUi(false);
                });
        }

        window.addEventListener('resize', syncTopFixedHeight);
        window.addEventListener('orientationchange', syncTopFixedHeight);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', syncTopFixedHeight);
        }

        initTopFixedHeightObserver();
        syncTopFixedHeight();
        if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(function () {
                syncTopFixedHeight();
            });
        }
        refreshPurchaseWatermarkForTestAccount();
        loadData();
    </script>
    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
</body>
</html>
