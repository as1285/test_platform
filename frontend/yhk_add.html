<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260513-jump-aggregate"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添加银行卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 0));
        }
        .header {
            background: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        .back-btn {
            position: absolute;
            left: 12px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .header-title { font-size: 17px; font-weight: 500; color: #333; }
        .notice {
            margin: 12px 16px 0;
            padding: 12px 14px;
            background: #fff8e6;
            border-radius: 6px;
            font-size: 13px;
            color: #c65a00;
            line-height: 1.55;
        }
        .notice p { margin-bottom: 8px; }
        .notice p:last-child { margin-bottom: 0; }
        .notice .help-i {
            display: inline-flex;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            border: 1px solid #1e6fff;
            color: #1e6fff;
            font-size: 11px;
            align-items: center;
            justify-content: center;
            margin-left: 2px;
            vertical-align: middle;
        }
        .notice a {
            color: #1e6fff;
            text-decoration: none;
        }
        .form-wrap {
            margin-top: 12px;
            background: #fff;
        }
        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            min-height: 48px;
        }
        .form-row:last-of-type { border-bottom: none; }
        .form-label {
            font-size: 15px;
            color: #333;
            flex-shrink: 0;
            max-width: 52%;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .form-value {
            flex: 1;
            text-align: right;
            font-size: 15px;
            color: #999;
            border: none;
            outline: none;
            background: transparent;
            font-family: inherit;
        }
        .form-value.dark { color: #333; }
        .form-row-link {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            color: #999;
            font-size: 15px;
            text-decoration: none;
        }
        .form-row-link.dark { color: #333; }
        .hint-icon {
            display: inline-flex;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid #1e6fff;
            color: #1e6fff;
            font-size: 11px;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .footer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
            background: #f5f6fa;
        }
        .btn-next {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            background: #7eb4ff;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-next:disabled {
            opacity: 1;
            cursor: default;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="yhk.html" class="back-btn">
            <img src="jt.png" alt="" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">添加银行卡</span>
    </div>
    <div class="notice">
        <p>建议使用本人在境内开立的<strong>I类银行账户</strong><span class="help-i" title="一类户说明">?</span>。</p>
        <p>银行卡认证每日限 5 次。</p>
        <p>可使用已登记的身份证件或其他已添加证件。<a href="other_id.html" onclick="return true;">去添加其他身份证件</a></p>
    </div>
    <div class="form-wrap">
        <div class="form-row">
            <span class="form-label">姓名</span>
            <span class="form-value dark" id="yhkHolderName" style="pointer-events:none;">—</span>
        </div>
        <div class="form-row">
            <span class="form-label">证件类型</span>
            <span class="form-value dark" style="pointer-events:none;">居民身份证</span>
        </div>
        <div class="form-row">
            <span class="form-label">证件号码</span>
            <span class="form-value dark" style="pointer-events:none;">4*****************3</span>
        </div>
        <div class="form-row">
            <span class="form-label">银行卡号</span>
            <input type="text" class="form-value" id="yhkCardNo" placeholder="请输入您的银行卡号" inputmode="numeric" autocomplete="off" maxlength="23">
        </div>
        <div class="form-row">
            <span class="form-label">所属银行<span class="hint-icon" title="将根据卡号识别">?</span></span>
            <span class="form-value" id="yhkBankName" style="pointer-events:none;">—</span>
        </div>
        <div class="form-row">
            <span class="form-label">开户银行所在省份</span>
            <a href="#" class="form-row-link" id="yhkProvinceLink" onclick="return false;">请选择 <span style="color:#ccc;">›</span></a>
        </div>
        <div class="form-row">
            <span class="form-label">银行预留手机号码</span>
            <input type="tel" class="form-value" id="yhkPhone" placeholder="请输入您的手机号码" inputmode="numeric" autocomplete="tel" maxlength="11">
        </div>
    </div>
    <div class="footer">
        <button type="button" class="btn-next" id="yhkNextBtn" disabled>下一步</button>
    </div>
    <script>
        (function () {
            var card = document.getElementById('yhkCardNo');
            var phone = document.getElementById('yhkPhone');
            var btn = document.getElementById('yhkNextBtn');
            var bankNameEl = document.getElementById('yhkBankName');
            var holderNameEl = document.getElementById('yhkHolderName');
            var provinceLink = document.getElementById('yhkProvinceLink');
            var provinceValue = '';

            function digitsOnly(s) {
                return String(s || '').replace(/\D/g, '');
            }

            function maskTaxId(tid) {
                var s = String(tid || '').trim();
                if (!s || s.length < 2) return '—';
                return s.charAt(0) + '*'.repeat(Math.max(1, s.length - 2)) + s.charAt(s.length - 1);
            }

            function inferBankName(cardNo) {
                var s = digitsOnly(cardNo);
                if (!s) return '—';
                if (/^622260|^622261|^622262|^622258|^521899|^434910|^458123/.test(s)) return '交通银行';
                if (/^622202|^622203|^955880|^621226|^621225/.test(s)) return '中国工商银行';
                if (/^622700|^621700|^436742|^552245/.test(s)) return '中国建设银行';
                if (/^622848|^622845|^95599|^103/.test(s)) return '中国农业银行';
                if (/^621660|^621661|^621662|^456351/.test(s)) return '中国银行';
                if (/^622588|^622575|^622576/.test(s)) return '招商银行';
                if (/^622155|^622156|^622157/.test(s)) return '平安银行';
                return '银行卡';
            }

            function syncBankName() {
                if (!bankNameEl) return;
                var name = inferBankName(card && card.value);
                bankNameEl.textContent = name;
                bankNameEl.classList.toggle('dark', name !== '—');
            }

            function syncNext() {
                if (!btn) return;
                var cn = digitsOnly(card && card.value);
                var pn = digitsOnly(phone && phone.value);
                var ok = cn.length >= 16 && pn.length === 11;
                btn.disabled = !ok;
                btn.style.background = ok ? '#1e6fff' : '#7eb4ff';
            }

            function loadHolderProfile() {
                try {
                    var rn = localStorage.getItem('real_name');
                    if (rn && holderNameEl) holderNameEl.textContent = rn;
                } catch (e) {}
                var fetchFn = typeof authFetch === 'function' ? authFetch : fetch;
                fetchFn('api/user.php?action=info', { credentials: 'same-origin' })
                    .then(function (r) {
                        return r.json();
                    })
                    .then(function (data) {
                        if (data.code !== 200 || !data.data) return;
                        if (data.data.real_name && holderNameEl) {
                            holderNameEl.textContent = data.data.real_name;
                            try {
                                localStorage.setItem('real_name', data.data.real_name);
                            } catch (e2) {}
                        }
                        var taxRow = document.querySelector('.form-row:nth-child(3) .form-value');
                        if (taxRow && data.data.tax_id) {
                            taxRow.textContent = maskTaxId(data.data.tax_id);
                        }
                    })
                    .catch(function () {});
            }

            if (provinceLink) {
                provinceLink.addEventListener('click', function (e) {
                    e.preventDefault();
                    var p = window.prompt('请输入开户银行所在省份', provinceValue || '');
                    if (p == null) return;
                    provinceValue = String(p).trim();
                    if (provinceValue) {
                        provinceLink.textContent = provinceValue + ' ';
                        provinceLink.classList.add('dark');
                        provinceLink.innerHTML =
                            escHtml(provinceValue) + ' <span style="color:#ccc;">›</span>';
                    } else {
                        provinceLink.classList.remove('dark');
                        provinceLink.innerHTML = '请选择 <span style="color:#ccc;">›</span>';
                    }
                });
            }

            function escHtml(s) {
                return String(s || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
            }

            if (card) {
                card.addEventListener('input', function () {
                    syncBankName();
                    syncNext();
                });
            }
            if (phone) phone.addEventListener('input', syncNext);

            if (btn) {
                btn.addEventListener('click', function () {
                    if (btn.disabled) return;
                    var cardNo = digitsOnly(card && card.value);
                    var phoneNo = digitsOnly(phone && phone.value);
                    if (cardNo.length < 16 || phoneNo.length !== 11) {
                        alert('请完整填写银行卡号与预留手机号');
                        return;
                    }
                    btn.disabled = true;
                    btn.textContent = '提交中…';
                    var bankName = inferBankName(cardNo);
                    if (bankName === '—') bankName = '银行卡';
                    var fetchFn = typeof authFetch === 'function' ? authFetch : fetch;
                    var headers = typeof authHeaders === 'function' ? authHeaders() : { 'Content-Type': 'application/json' };
                    fetchFn('api/user.php', {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify({
                            action: 'add_bank_card',
                            card_no: cardNo,
                            phone: phoneNo,
                            bank_name: bankName,
                            province: provinceValue
                        })
                    })
                        .then(function (r) {
                            return r.json().then(function (j) {
                                return { status: r.status, body: j };
                            });
                        })
                        .then(function (x) {
                            if (x.status === 200 && x.body && x.body.code === 200) {
                                var cnt =
                                    x.body.data && x.body.data.bank_card_count != null
                                        ? Number(x.body.data.bank_card_count)
                                        : null;
                                try {
                                    if (cnt != null && !isNaN(cnt)) {
                                        localStorage.setItem('bank_card_count', String(cnt));
                                    }
                                } catch (e) {}
                                window.location.href = 'yhk.html';
                                return;
                            }
                            alert((x.body && x.body.msg) || '添加失败');
                        })
                        .catch(function () {
                            alert('网络错误，请稍后重试');
                        })
                        .finally(function () {
                            btn.textContent = '下一步';
                            syncNext();
                        });
                });
            }

            loadHolderProfile();
            syncBankName();
            syncNext();
        })();
    </script>
    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
</body>
</html>
