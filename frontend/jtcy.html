<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script>
        (function () {
            try {
                var u = typeof navigator !== 'undefined' ? (navigator.userAgent || '') : '';
                if (/Android/i.test(u)) document.documentElement.classList.add('platform-android');
            } catch (e) {}
        })();
    </script>
    <script src="/js/auth.js?v=20260513-jump-aggregate"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭成员</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; scrollbar-width: none; -ms-overflow-style: none; }
        html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .header {
            flex-shrink: 0;
            background: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #eee;
        }
        .back-btn {
            position: absolute;
            left: 12px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .header-title { font-size: 17px; font-weight: 500; color: #333; }
        .main {
            flex: 1;
            padding: 12px 16px 100px;
        }
        .member-card {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .member-name {
            font-size: 17px;
            font-weight: 600;
            color: #111;
            margin-bottom: 10px;
        }
        html.platform-android .member-name {
            font-weight: 500;
            font-synthesis: none;
        }
        .member-line {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
            margin-bottom: 4px;
        }
        .member-line:last-child { margin-bottom: 0; }
        .footer {
            flex-shrink: 0;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0));
            background: #f5f6fa;
        }
        .btn-add {
            display: block;
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            background: #1e6fff;
            color: #fff;
            font-size: 17px;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-add:active { opacity: 0.92; }
        .empty-tip {
            text-align: center;
            color: #999;
            font-size: 14px;
            padding: 40px 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="mine.html" class="back-btn">
            <img src="jt.png" alt="" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">家庭成员</span>
    </div>
    <div class="main" id="memberListMount">
        <div class="member-card" id="memberDemoCard">
            <div class="member-name">唐和平</div>
            <div class="member-line">他(她)是我的：父母</div>
            <div class="member-line">证件号：4****************2</div>
        </div>
    </div>
    <div class="footer">
        <a href="jtcy_add.html" class="btn-add">添加</a>
    </div>
    <script>
        (function () {
            try {
                var n = parseInt(localStorage.getItem('family_count'), 10);
                if (!isNaN(n) && n <= 0) {
                    var card = document.getElementById('memberDemoCard');
                    var mount = document.getElementById('memberListMount');
                    if (card) card.remove();
                    if (mount && !mount.querySelector('.member-card')) {
                        mount.innerHTML = '<p class="empty-tip">暂无家庭成员，请点击下方添加</p>';
                    }
                }
            } catch (e) {}
        })();
    </script>
    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
</body>
</html>
