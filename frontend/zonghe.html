<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>综合所得</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }

        .header {
            background: #fff;
            padding: 15px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid #eee;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            color: #1e6fff;
            font-size: 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }

        .content {
            width: 100%;
        }

        .content img {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div class="content" style="position: relative;">
        <img src="erji.jpg" alt="综合所得">
        <a onclick="history.back()" style="position: absolute; top: 0; left: 0; width: 80px; height: 80px; background: transparent; display: block; -webkit-tap-highlight-color: transparent; outline: none;"></a>
    </div>
    <script src="/js/watermark.js"></script>
</body>
</html>
