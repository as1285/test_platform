<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260510-ios-safe-top"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        html {
            overflow-x: hidden;
        }
        
        .message-page {
            min-height: 100vh;
            background: #f5f6fa;
        }
        
        .message-header-wrap {
            position: relative;
            z-index: 10;
        }

        .message-header-builtin {
            padding: 18px 16px 22px;
            padding-top: calc(14px + env(safe-area-inset-top, 0px));
            background: linear-gradient(
                125deg,
                var(--app-accent-mid, #008afd) 0%,
                var(--app-accent, #1e6fff) 38%,
                var(--app-accent-soft, #5aa3ff) 72%,
                #9dc8ff 100%
            );
            border-radius: 0 0 22px 22px;
            box-shadow: 0 8px 24px rgba(30, 111, 255, 0.22);
        }

        .message-header-title {
            margin: 0 0 14px;
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .message-header-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .msg-filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border: none;
            border-radius: 999px;
            font-size: 13px;
            color: #fff;
            background: rgba(255, 255, 255, 0.28);
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .msg-filter-chip:active {
            opacity: 0.92;
        }

        .msg-filter-chip.active {
            background: rgba(255, 255, 255, 0.42);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.35);
        }

        .msg-filter-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            opacity: 0.95;
        }

        .msg-clear-unread {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 4px;
            border: none;
            background: transparent;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.96);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .msg-clear-unread:active {
            opacity: 0.85;
        }

        .msg-clear-icon {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            opacity: 0.95;
        }

        .message-header-custom-img {
            width: 100%;
            display: none;
            vertical-align: top;
        }
        
        .message-list {
            background: #fff;
            border-radius: 16px 16px 0 0;
            margin-top: -10px;
            position: relative;
            z-index: 5;
            padding-bottom: var(--bottom-nav-clearance);
            min-height: calc(100vh - 150px);
        }
        
        .message-item {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        
        .msg-item-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: transparent;
        }
        
        .msg-item-icon img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            display: block;
        }
        
        .message-content {
            flex: 1;
            min-width: 0;
        }
        
        .message-content-title {
            font-size: 15px;
            color: #333;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .message-content-desc {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .message-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .message-date {
            font-size: 12px;
            color: #999;
        }
        
        .message-dot {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
        }
        
        </style>
    <link rel="stylesheet" href="css/nav.css">
    <script src="/js/theme-loader.js" defer></script>
</head>
<body>
    <div class="message-page">
        <div class="message-header-wrap">
            <div id="messageHeaderBuiltin" class="message-header-builtin">
                <h1 class="message-header-title">消息</h1>
                <div class="message-header-toolbar">
                    <button type="button" id="btnMsgFilter" class="msg-filter-chip" aria-label="筛选">
                        <span>筛选</span>
                        <svg class="msg-filter-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M4 5h16v2.5l-6 7v6l-4 2v-8L4 7.5V5z" stroke="currentColor" stroke-width="1.75" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <button type="button" id="btnMsgClearUnread" class="msg-clear-unread" aria-label="清除未读">
                        <svg class="msg-clear-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M8 8l8 8M16 8l-8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M6 5h12v14H6V5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" opacity="0.85"/>
                        </svg>
                        <span>清除未读</span>
                    </button>
                </div>
            </div>
            <img id="assetMessageHeader" class="message-header-custom-img" alt="">
        </div>
        <div class="message-list" id="messageList">
            <!-- 动态加载 -->
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a href="shouye.html" class="nav-item" data-icon="sy">
            <div class="nav-icon">
                <img src="caidan/sy2.png" width="19" height="19" alt="首页">
            </div>
            <span class="nav-text">首页</span>
        </a>
        <a href="daiban.html" class="nav-item" data-icon="db">
            <div class="nav-icon">
                <img src="caidan/db2.png" width="19" height="19" alt="待办">
            </div>
            <span class="nav-text">待办</span>
        </a>
        <a href="bancha.html" class="nav-item" data-icon="bc">
            <div class="nav-icon">
                <img src="caidan/bc2.png" width="19" height="19" alt="办查">
            </div>
            <span class="nav-text">办&查</span>
        </a>
        <a href="message.html" class="nav-item active" data-icon="xx">
            <div class="nav-icon">
                <img src="caidan/xx1.png" width="19" height="19" alt="消息">
            </div>
            <span class="nav-text">消息</span>
        </a>
        <a href="mine.html" class="nav-item" data-icon="w">
            <div class="nav-icon">
                <img src="caidan/w2.png" width="19" height="19" alt="我的">
            </div>
            <span class="nav-text">我的</span>
        </a>
    </div>
    
    <script>
        // 更新底部导航图标状态
        function updateNavIcons() {
            var navItems = document.querySelectorAll('.bottom-nav .nav-item');
            navItems.forEach(function(item) {
                var icon = item.getAttribute('data-icon');
                var img = item.querySelector('.nav-icon img');
                if (item.classList.contains('active')) {
                    img.src = 'caidan/' + icon + '1.png';
                } else {
                    img.src = 'caidan/' + icon + '2.png';
                }
            });
            if (window.__refreshNavFromMineUi) {
                window.__refreshNavFromMineUi();
            }
        }
        
        // 初始化时更新图标
        updateNavIcons();
        
        var allMessages = [];
        var filterUnreadOnly = false;

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function renderMessageList() {
            var list = allMessages.filter(function (msg) {
                return !filterUnreadOnly || Number(msg.is_read) === 0;
            });
            var html = '';
            list.forEach(function (msg) {
                html += '<div class="message-item">';
                html += '<div class="msg-item-icon">';
                html += '<img src="message_item_icon.png" width="44" height="44" alt="">';
                html += '</div>';
                html += '<div class="message-content">';
                html += '<div class="message-content-title">' + escapeHtml(msg.title) + '</div>';
                html += '<div class="message-content-desc">' + escapeHtml(msg.content) + '</div>';
                html += '</div>';
                html += '<div class="message-meta">';
                html += '<span class="message-date">' + escapeHtml(msg.msg_date) + '</span>';
                if (Number(msg.is_read) === 0) {
                    html += '<span class="message-dot"></span>';
                }
                html += '</div>';
                html += '</div>';
            });
            var emptyHint = filterUnreadOnly ? '暂无未读消息' : '暂无消息';
            document.getElementById('messageList').innerHTML =
                html || '<div style="text-align:center;padding:50px;color:#999;">' + emptyHint + '</div>';
        }

        function loadMessages() {
            authFetch('api/message.php?action=list')
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    if (data.code === 200) {
                        allMessages = data.data || [];
                        renderMessageList();
                    } else {
                        allMessages = [];
                        document.getElementById('messageList').innerHTML =
                            '<div style="text-align:center;padding:50px 16px;color:#999;">暂无消息</div>';
                    }
                })
                .catch(function (error) {
                    console.error(error);
                    document.getElementById('messageList').innerHTML =
                        '<div style="text-align:center;padding:50px 16px;color:#999;">暂无消息</div>';
                });
        }

        document.getElementById('btnMsgFilter').addEventListener('click', function () {
            filterUnreadOnly = !filterUnreadOnly;
            this.classList.toggle('active', filterUnreadOnly);
            renderMessageList();
        });

        document.getElementById('btnMsgClearUnread').addEventListener('click', function () {
            var btn = this;
            btn.disabled = true;
            authFetch('api/message.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'mark_all_read' })
            })
                .then(function (r) {
                    return r.json();
                })
                .then(function (data) {
                    if (data.code === 200) {
                        loadMessages();
                    }
                })
                .catch(function () {})
                .finally(function () {
                    btn.disabled = false;
                });
        });

        loadMessages();
        
        // iOS设备检测，底部导航上移
        (function() {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) {
                var bottomNav = document.querySelector('.bottom-nav');
                if (bottomNav) {
                    bottomNav.classList.add('ios-device');
                }
            }
        })();
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
