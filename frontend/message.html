<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        html {
            overflow-x: hidden;
        }
        
        .message-page {
            min-height: 100vh;
            background: #f5f6fa;
        }
        
        .message-header-wrap {
            position: relative;
            z-index: 10;
        }
        
        .message-header-wrap .message-header-bg {
            width: 100%;
            display: block;
            vertical-align: top;
        }
        
        .message-header-overlay {
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            padding: 48px 16px 18px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 14px;
        }
        
        .message-title {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0,0,0,0.12);
        }
        
        .message-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.32);
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 16px;
            padding: 6px 14px;
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        
        .clear-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            text-shadow: 0 1px 2px rgba(0,0,0,0.12);
            -webkit-tap-highlight-color: transparent;
        }
        
        .message-list {
            background: #fff;
            border-radius: 16px 16px 0 0;
            margin-top: -10px;
            position: relative;
            z-index: 5;
            padding-bottom: 118px;
            min-height: calc(100vh - 150px);
        }
        
        .message-item {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        
        .msg-item-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: transparent;
        }
        
        .msg-item-icon img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            display: block;
        }
        
        .message-content {
            flex: 1;
            min-width: 0;
        }
        
        .message-content-title {
            font-size: 15px;
            color: #333;
            font-weight: 500;
            margin-bottom: 6px;
        }
        
        .message-content-desc {
            font-size: 13px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .message-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .message-date {
            font-size: 12px;
            color: #999;
        }
        
        .message-dot {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
        }
        
        </style>
    <link rel="stylesheet" href="css/nav.css">
    <script src="/js/theme-loader.js" defer></script>
</head>
<body>
    <div class="message-page">
        <div class="message-header-wrap">
            <img id="assetMessageHeader" class="message-header-bg" src="message_header.jpg" alt="">
            <div class="message-header-overlay">
                <div class="message-title">消息</div>
                <div class="message-toolbar">
                    <button type="button" class="filter-btn">
                        <span>筛选</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
                            <path d="M3 4h18M6 9h12M9 14h6M11 19h2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    <button type="button" class="clear-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                            <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span>清除未读</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="message-list" id="messageList">
            <!-- 动态加载 -->
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a href="shouye.html" class="nav-item" data-icon="sy">
            <div class="nav-icon">
                <img src="caidan/sy2.png" width="19" height="19" alt="首页">
            </div>
            <span class="nav-text">首页</span>
        </a>
        <a href="daiban.html" class="nav-item" data-icon="db">
            <div class="nav-icon">
                <img src="caidan/db2.png" width="19" height="19" alt="待办">
            </div>
            <span class="nav-text">待办</span>
        </a>
        <a href="bancha.html" class="nav-item" data-icon="bc">
            <div class="nav-icon">
                <img src="caidan/bc2.png" width="19" height="19" alt="办查">
            </div>
            <span class="nav-text">办&查</span>
        </a>
        <a href="message.html" class="nav-item active" data-icon="xx">
            <div class="nav-icon">
                <img src="caidan/xx1.png" width="19" height="19" alt="消息">
            </div>
            <span class="nav-text">消息</span>
        </a>
        <a href="mine.html" class="nav-item" data-icon="w">
            <div class="nav-icon">
                <img src="caidan/w2.png" width="19" height="19" alt="我的">
            </div>
            <span class="nav-text">我的</span>
        </a>
    </div>
    
    <script>
        // 更新底部导航图标状态
        function updateNavIcons() {
            var navItems = document.querySelectorAll('.bottom-nav .nav-item');
            navItems.forEach(function(item) {
                var icon = item.getAttribute('data-icon');
                var img = item.querySelector('.nav-icon img');
                if (item.classList.contains('active')) {
                    img.src = 'caidan/' + icon + '1.png';
                } else {
                    img.src = 'caidan/' + icon + '2.png';
                }
            });
            if (window.__refreshNavFromMineUi) {
                window.__refreshNavFromMineUi();
            }
        }
        
        // 初始化时更新图标
        updateNavIcons();
        
        // 加载消息列表（需登录，由 auth.js 保证）
        function loadMessages() {
            authFetch('api/message.php?action=list')
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    var html = '';
                    var unreadCount = 0;
                    data.data.forEach(function(msg) {
                        if (msg.is_read == 0) unreadCount++;
                        html += '<div class="message-item">';
                        html += '<div class="msg-item-icon">';
                        html += '<img src="message_item_icon.png" width="44" height="44" alt="">';
                        html += '</div>';
                        html += '<div class="message-content">';
                        html += '<div class="message-content-title">' + msg.title + '</div>';
                        html += '<div class="message-content-desc">' + msg.content + '</div>';
                        html += '</div>';
                        html += '<div class="message-meta">';
                        html += '<span class="message-date">' + msg.msg_date + '</span>';
                        if (msg.is_read == 0) {
                            html += '<span class="message-dot"></span>';
                        }
                        html += '</div>';
                        html += '</div>';
                    });
                    document.getElementById('messageList').innerHTML = html || '<div style="text-align:center;padding:50px;color:#999;">暂无消息</div>';
                } else {
                    document.getElementById('messageList').innerHTML =
                        '<div style="text-align:center;padding:50px 16px;color:#999;">暂无消息</div>';
                }
            })
            .catch(function(error) {
                console.error(error);
                document.getElementById('messageList').innerHTML =
                    '<div style="text-align:center;padding:50px 16px;color:#999;">暂无消息</div>';
            });
        }
        
        loadMessages();
        
        // iOS设备检测，底部导航上移
        (function() {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) {
                var bottomNav = document.querySelector('.bottom-nav');
                if (bottomNav) {
                    bottomNav.classList.add('ios-device');
                }
            }
        })();
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
