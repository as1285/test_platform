<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>任职受雇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f5f6fa;
            min-height: 100vh;
        }

        .header {
            background: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f0f0f0;
        }

        .back-btn {
            position: absolute;
            left: 12px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .back-btn span:first-child {
            font-size: 15px;
            margin-right: 2px;
        }

        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }

        .list-container {
            padding: 12px;
        }

        .company-card {
            background: #fff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .company-name {
            font-size: 17px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .info-item {
            display: flex;
            margin-bottom: 8px;
            font-size: 15px;
            line-height: 1.6;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            color: #999;
            flex-shrink: 0;
        }

        .info-value {
            color: #333;
            word-break: break-all;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="mine.html" class="back-btn">
            <img src="jt.png" alt="" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">任职受雇</span>
    </div>

    <div class="list-container" id="listContainer"></div>

    <script>
        function escAttr(s) {
            return String(s == null ? '' : s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
        }

        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function loadEmployerList() {
            var userId = localStorage.getItem('user_id');
            if (!userId) {
                window.location.href = 'index.html';
                return;
            }

            authFetch('api/user.php?action=employers')
                .then(function (response) { return response.json(); })
                .then(function (data) {
                    if (data.code === 200 && data.data && data.data.employers) {
                        renderList(data.data.employers);
                    } else {
                        showEmpty();
                    }
                })
                .catch(function (error) {
                    console.error('加载失败:', error);
                    showEmpty();
                });
        }

        function renderList(list) {
            var container = document.getElementById('listContainer');

            if (!list || list.length === 0) {
                showEmpty();
                return;
            }

            var html = '';
            for (var i = 0; i < list.length; i++) {
                var item = list[i];
                var idAttr = escAttr(item.id);
                var leaveVal = item.leave_date;
                if (!leaveVal && (item.status === '1' || item.status === 1)) {
                    leaveVal = '在职';
                }
                html += '<div class="company-card" onclick="goDetail(\'' + idAttr + '\')" style="cursor:pointer;">';
                html += '<div class="company-name">' + escapeHtml(item.company_name || '-') + '</div>';
                html += '<div class="info-item"><span class="info-label">统一社会信用代码：</span><span class="info-value">' + escapeHtml(item.credit_code || '-') + '</span></div>';
                html += '<div class="info-item"><span class="info-label">职务：</span><span class="info-value">' + escapeHtml(item.position || '-') + '</span></div>';
                html += '<div class="info-item"><span class="info-label">任职受雇日期：</span><span class="info-value">' + escapeHtml(item.hire_date || '-') + '</span></div>';
                html += '<div class="info-item"><span class="info-label">离职日期：</span><span class="info-value">' + escapeHtml(leaveVal || '-') + '</span></div>';
                html += '</div>';
            }

            container.innerHTML = html;
        }

        function goDetail(id) {
            window.location.href = 'renzhi_detail.html?id=' + encodeURIComponent(id);
        }

        function showEmpty() {
            var container = document.getElementById('listContainer');
            container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div>暂无任职受雇信息</div></div>';
        }

        loadEmployerList();
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
