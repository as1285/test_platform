<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/admin_auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            color: #333;
            padding-bottom: 40px;
        }
        .top {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            color: #fff;
            padding: 20px 20px 28px;
        }
        .top-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .top h1 { font-size: 20px; font-weight: 600; }
        .top .btn-logout {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.35);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .wrap { max-width: 1100px; margin: -16px auto 0; padding: 0 16px; position: relative; z-index: 1; }
        section {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        section h2 { font-size: 16px; margin-bottom: 14px; color: #1e3a5f; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .form-row label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
        .form-row input, .form-row textarea {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 14px;
            min-width: 120px;
        }
        .form-row textarea { min-height: 36px; resize: vertical; min-width: 200px; }
        .btn-primary {
            background: #1e6fff;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary:disabled { opacity: 0.6; }
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .btn-ban { background: #e53935; color: #fff; }
        .btn-unban { background: #43a047; color: #fff; }
        .btn-copy { background: #5c6bc0; color: #fff; white-space: nowrap; }
        .hint { font-size: 12px; color: #888; margin-top: 8px; }
        .code-result {
            margin-top: 12px;
            padding: 12px;
            background: #e8f4ff;
            border-radius: 8px;
            font-family: ui-monospace, monospace;
            font-size: 14px;
            word-break: break-all;
            display: none;
        }
        .code-result.show { display: block; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 8px 10px; text-align: left; }
        th { background: #f8f9fa; font-weight: 600; }
        tr:nth-child(even) { background: #fafafa; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .badge-yes { background: #e8f5e9; color: #2e7d32; }
        .badge-no { background: #fce4ec; color: #c62828; }
        .badge-type-test { background: #fff3e0; color: #e65100; }
        .scroll-x { overflow-x: auto; }
        .stat { font-size: 14px; color: #666; margin-bottom: 10px; }
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }
        .pagination span { font-size: 14px; color: #666; }
        .btn-page {
            padding: 5px 12px;
            font-size: 13px;
            border-radius: 6px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
        }
        .btn-page:disabled { background: #f5f5f5; color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="top">
        <div class="top-inner">
            <h1>管理控制台</h1>
            <button type="button" class="btn-logout" onclick="adminLogout()">退出管理</button>
        </div>
    </div>
    <div class="wrap">
        <section>
            <h2>生成激活码</h2>
            <div class="form-row">
                <div>
                    <label>可激活次数</label>
                    <input type="number" id="issueMax" value="1" min="1" max="99999">
                </div>
                <div>
                    <label>过期时间（可选，如 2027-12-31 23:59:59）</label>
                    <input type="text" id="issueExp" placeholder="留空表示不过期">
                </div>
                <div style="flex:1; min-width:200px;">
                    <label>备注</label>
                    <input type="text" id="issueNote" placeholder="用途说明">
                </div>
                <button type="button" class="btn-primary" id="btnIssue">生成</button>
            </div>
            <div class="code-result" id="issueOut"></div>
            <p class="hint">生成后请复制保存；同一码可多次使用直至次数用尽（按 max_uses）。</p>
        </section>

        <section>
            <h2>注册用户</h2>
            <div class="form-row" style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee;">
                <div>
                    <label>账号</label>
                    <input type="text" id="filterUsername" placeholder="搜索账号" style="width: 140px;">
                </div>
                <div>
                    <label>姓名</label>
                    <input type="text" id="filterRealName" placeholder="搜索姓名" style="width: 140px;">
                </div>
                <div>
                    <label>激活状态</label>
                    <select id="filterActive" style="border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 14px; background: white;">
                        <option value="">全部</option>
                        <option value="1">已激活</option>
                        <option value="0">未激活</option>
                    </select>
                </div>
                <div>
                    <label>封禁状态</label>
                    <select id="filterBanned" style="border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 14px; background: white;">
                        <option value="">全部</option>
                        <option value="1">已封禁</option>
                        <option value="0">正常</option>
                    </select>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button type="button" class="btn-primary" id="btnSearchUsers">查询</button>
                    <button type="button" class="btn-page" id="btnResetUsers">重置</button>
                </div>
            </div>
            <p class="stat" id="userStat">加载中…</p>
            <div class="scroll-x">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>账号</th>
                            <th>姓名</th>
                            <th>密码</th>
                            <th>用户类型</th>
                            <th>激活</th>
                            <th>封禁</th>
                            <th>任职/家庭/卡</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTbody"></tbody>
                </table>
            </div>
            <div class="pagination" id="userPagination">
                <button type="button" class="btn-page" id="userPrev">上一页</button>
                <span id="userPageInfo">第 1 页</span>
                <button type="button" class="btn-page" id="userNext">下一页</button>
            </div>
        </section>

        <section>
            <h2>激活码列表</h2>
            <button type="button" class="btn-primary" id="btnRefreshCodes" style="margin-bottom:12px;">刷新列表</button>
            <div class="scroll-x">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>激活码</th>
                            <th>复制</th>
                            <th>次数</th>
                            <th>已用</th>
                            <th>使用时间</th>
                            <th>过期</th>
                            <th>备注</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody id="codeTbody"></tbody>
                </table>
            </div>
            <div class="pagination" id="codePagination">
                <button type="button" class="btn-page" id="codePrev">上一页</button>
                <span id="codePageInfo">第 1 页</span>
                <button type="button" class="btn-page" id="codeNext">下一页</button>
            </div>
        </section>
    </div>
    <script>
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function formatDt(iso) {
            if (iso == null || String(iso).trim() === '') return '—';
            try {
                var d = new Date(iso);
                if (isNaN(d.getTime())) return esc(iso);
                // 转换为 UTC+8
                var utc = d.getTime() + (d.getTimezoneOffset() * 60000);
                var nd = new Date(utc + (3600000 * 8));
                
                var Y = nd.getFullYear();
                var M = String(nd.getMonth() + 1).padStart(2, '0');
                var D = String(nd.getDate()).padStart(2, '0');
                var h = String(nd.getHours()).padStart(2, '0');
                var m = String(nd.getMinutes()).padStart(2, '0');
                var s = String(nd.getSeconds()).padStart(2, '0');
                return Y + '-' + M + '-' + D + ' ' + h + ':' + m + ':' + s;
            } catch (e) {
                return esc(iso);
            }
        }

        function copyCode(text) {
            var t = String(text || '');
            if (!t) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(t).then(function () {
                    alert('已复制到剪贴板');
                }).catch(function () {
                    copyFallback(t);
                });
            } else {
                copyFallback(t);
            }
        }
        function copyFallback(t) {
            var ta = document.createElement('textarea');
            ta.value = t;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            try {
                document.execCommand('copy');
                alert('已复制到剪贴板');
            } catch (e) {
                alert('复制失败，请手动复制');
            }
            document.body.removeChild(ta);
        }

        var userPage = 1;
        var userLimit = 10;
        var codePage = 1;
        var codeLimit = 10;

        function loadUsers(p) {
            if (p != null) userPage = p;
            
            var username = document.getElementById('filterUsername').value.trim();
            var realName = document.getElementById('filterRealName').value.trim();
            var active = document.getElementById('filterActive').value;
            var banned = document.getElementById('filterBanned').value;

            var url = 'api/admin/users?page=' + userPage + '&limit=' + userLimit;
            if (username) url += '&username=' + encodeURIComponent(username);
            if (realName) url += '&real_name=' + encodeURIComponent(realName);
            if (active !== '') url += '&active=' + active;
            if (banned !== '') url += '&banned=' + banned;

            adminFetch(url)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.code !== 200 || !data.data) return;
                    var list = data.data.users || [];
                    var total = data.data.total || 0;
                    document.getElementById('userStat').textContent = '共 ' + total + ' 个账号';
                    
                    var totalPages = Math.ceil(total / userLimit) || 1;
                    document.getElementById('userPageInfo').textContent = '第 ' + userPage + ' 页 / 共 ' + totalPages + ' 页';
                    document.getElementById('userPrev').disabled = userPage <= 1;
                    document.getElementById('userNext').disabled = userPage >= totalPages;

                    var html = '';
                    list.forEach(function (u) {
                        var act = u.account_active ? '<span class="badge badge-yes">已激活</span>' : '<span class="badge badge-no">未激活</span>';
                        var ban = u.banned ? '<span class="badge badge-no">已封禁</span>' : '<span class="badge badge-yes">正常</span>';
                        var typeBadge = u.is_test_account
                            ? '<span class="badge badge-type-test">测试账号</span>'
                            : '<span class="badge badge-yes">普通账号</span>';
                        var typeBtn = u.is_test_account
                            ? '<button type="button" class="btn-sm btn-unban btn-user-type" data-u="' + esc(u.username) + '" data-t="0">设为普通</button>'
                            : '<button type="button" class="btn-sm btn-copy btn-user-type" data-u="' + esc(u.username) + '" data-t="1">设为测试</button>';
                        var ops = (u.banned
                            ? '<button type="button" class="btn-sm btn-unban btn-ban-act" data-u="' + esc(u.username) + '" data-b="0">解封</button>'
                            : '<button type="button" class="btn-sm btn-ban btn-ban-act" data-u="' + esc(u.username) + '" data-b="1">封禁</button>') + ' ' + typeBtn;
                        
                        html += '<tr>';
                        html += '<td>' + esc(u.id) + '</td>';
                        html += '<td>' + esc(u.username) + '</td>';
                        html += '<td>' + esc(u.real_name) + '</td>';
                        html += '<td><code>' + esc(u.password) + '</code></td>';
                        html += '<td>' + typeBadge + '</td>';
                        html += '<td>' + act + '</td>';
                        html += '<td>' + esc(u.banned ? '已封禁' : '正常') + '</td>';
                        html += '<td>' + esc(u.employer_count) + ' / ' + esc(u.family_count) + ' / ' + esc(u.bank_card_count) + '</td>';
                        html += '<td>' + formatDt(u.created_at) + '</td>';
                        html += '<td>' + ops + '</td>';
                        html += '</tr>';
                    });
                    document.getElementById('userTbody').innerHTML = html || '<tr><td colspan="10">暂无数据</td></tr>';
                    
                    // 重新绑定事件
                    document.getElementById('userTbody').querySelectorAll('.btn-ban-act').forEach(function (btn) {
                        btn.onclick = function () {
                            var name = btn.getAttribute('data-u');
                            var b = btn.getAttribute('data-b') === '1';
                            var tip = b ? '确定封禁「' + name + '」？' : '确定解封「' + name + '」？';
                            if (!confirm(tip)) return;
                            adminFetch('api/admin/ban', {
                                method: 'POST',
                                body: JSON.stringify({ username: name, banned: b ? 1 : 0 })
                            })
                                .then(function (r) { return r.json(); })
                                .then(function (d) {
                                    if (d.code === 200) {
                                        loadUsers();
                                    } else {
                                        alert(d.msg || '操作失败');
                                    }
                                })
                                .catch(function () { alert('网络错误'); });
                        };
                    });
                    document.getElementById('userTbody').querySelectorAll('.btn-user-type').forEach(function (btn) {
                        btn.onclick = function () {
                            var name = btn.getAttribute('data-u');
                            var t = parseInt(btn.getAttribute('data-t'), 10);
                            var tip = t === 1
                                ? '将「' + name + '」设为测试账号？任职受雇中的公司名称将统一为固定文案。'
                                : '将「' + name + '」设为普通账号？';
                            if (!confirm(tip)) return;
                            adminFetch('api/admin/user-type', {
                                method: 'POST',
                                body: JSON.stringify({ username: name, user_type: t })
                            })
                                .then(function (r) { return r.json(); })
                                .then(function (d) {
                                    if (d.code === 200) {
                                        loadUsers();
                                    } else {
                                        alert(d.msg || '操作失败');
                                    }
                                })
                                .catch(function () { alert('网络错误'); });
                        };
                    });
                })
                .catch(function () {
                    document.getElementById('userStat').textContent = '加载失败';
                });
        }

        function loadCodes(p) {
            if (p != null) codePage = p;
            adminFetch('api/admin/codes?page=' + codePage + '&limit=' + codeLimit)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.code !== 200 || !data.data) return;
                    var list = data.data.codes || [];
                    var total = data.data.total || 0;
                    
                    var totalPages = Math.ceil(total / codeLimit) || 1;
                    document.getElementById('codePageInfo').textContent = '第 ' + codePage + ' 页 / 共 ' + totalPages + ' 页';
                    document.getElementById('codePrev').disabled = codePage <= 1;
                    document.getElementById('codeNext').disabled = codePage >= totalPages;

                    var html = '';
                    list.forEach(function (c) {
                        var exp = c.expires_at ? formatDt(c.expires_at) : '—';
                        var usedAt =
                            c.last_used_at && (Number(c.used_count) > 0)
                                ? formatDt(c.last_used_at)
                                : '—';
                        html += '<tr>';
                        html += '<td>' + esc(c.id) + '</td>';
                        html += '<td>' + esc(c.code) + '</td>';
                        html += '<td><button type="button" class="btn-sm btn-copy btn-copy-code" data-code="' + esc(c.code) + '">复制</button></td>';
                        html += '<td>' + esc(c.max_uses) + '</td>';
                        html += '<td>' + esc(c.used_count) + '</td>';
                        html += '<td>' + usedAt + '</td>';
                        html += '<td>' + exp + '</td>';
                        html += '<td>' + esc(c.note) + '</td>';
                        html += '<td>' + formatDt(c.created_at) + '</td>';
                        html += '</tr>';
                    });
                    document.getElementById('codeTbody').innerHTML = html || '<tr><td colspan="9">暂无激活码</td></tr>';
                })
                .catch(function () {});
        }

        document.getElementById('userPrev').onclick = function() { if (userPage > 1) loadUsers(userPage - 1); };
        document.getElementById('userNext').onclick = function() { loadUsers(userPage + 1); };
        
        document.getElementById('btnSearchUsers').onclick = function() { loadUsers(1); };
        document.getElementById('btnResetUsers').onclick = function() {
            document.getElementById('filterUsername').value = '';
            document.getElementById('filterRealName').value = '';
            document.getElementById('filterActive').value = '';
            document.getElementById('filterBanned').value = '';
            loadUsers(1);
        };

        document.getElementById('codePrev').onclick = function() { if (codePage > 1) loadCodes(codePage - 1); };
        document.getElementById('codeNext').onclick = function() { loadCodes(codePage + 1); };

        document.getElementById('codeTbody').addEventListener('click', function (e) {
            var btn = e.target.closest('.btn-copy-code');
            if (!btn) return;
            var code = btn.getAttribute('data-code');
            if (code) copyCode(code);
        });

        document.getElementById('btnIssue').addEventListener('click', function () {
            var maxUses = parseInt(document.getElementById('issueMax').value, 10) || 1;
            var exp = document.getElementById('issueExp').value.trim();
            var note = document.getElementById('issueNote').value.trim();
            var btn = document.getElementById('btnIssue');
            btn.disabled = true;
            adminFetch('api/admin/issue-code', {
                method: 'POST',
                body: JSON.stringify({
                    max_uses: maxUses,
                    expires_at: exp || null,
                    note: note || null
                })
            })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.code === 200 && data.data && data.data.code) {
                        var el = document.getElementById('issueOut');
                        el.textContent = '激活码：' + data.data.code + '（max_uses=' + data.data.max_uses + '）';
                        el.classList.add('show');
                        loadCodes(1);
                    } else {
                        alert(data.msg || '生成失败');
                    }
                })
                .catch(function () { alert('网络错误'); })
                .finally(function () { btn.disabled = false; });
        });

        document.getElementById('btnRefreshCodes').addEventListener('click', function() { loadCodes(1); });

        loadUsers(1);
        loadCodes(1);
    </script>
</body>
</html>
