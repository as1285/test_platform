<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js?v=20260516-cordova-2410-bottom"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>待办</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f6f7fb;
            min-height: 100vh;
        }

        .daiban-page {
            min-height: 100vh;
            background: #f6f7fb;
            padding-bottom: var(--bottom-nav-clearance, 72px);
        }

        .daiban-header {
            position: relative;
            z-index: 1;
        }

        .daiban-header img {
            width: 100%;
            display: block;
        }

        .daiban-panel {
            position: relative;
            z-index: 2;
            margin: -14px 0 0;
            background: #fff;
            border-radius: 16px 16px 0 0;
            min-height: calc(100vh - 200px);
        }

        .daiban-tabs {
            display: flex;
            border-bottom: 1px solid #eee;
        }

        .daiban-tab {
            flex: 1;
            border: none;
            background: none;
            padding: 14px 8px 12px;
            font-size: 16px;
            color: #666;
            font-family: inherit;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .daiban-tab.active {
            color: #333;
            font-weight: 600;
        }

        .daiban-tab.active::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            width: 32px;
            height: 3px;
            background: #1e6fff;
            border-radius: 2px;
        }

        .daiban-empty {
            text-align: center;
            padding: 36px 24px 48px;
            background: #fff;
        }

        .daiban-empty-illustration {
            max-width: min(320px, 78vw);
            margin: 0 auto 16px;
        }

        .daiban-empty-illustration img {
            width: 100%;
            height: auto;
            display: block;
        }

        .daiban-empty-text {
            font-size: 15px;
            color: #999;
            line-height: 1.5;
        }
    </style>
    <link rel="stylesheet" href="css/nav.css">
    <script src="/js/theme-loader.js" defer></script>
</head>
<body>
    <div class="daiban-page">
        <div class="daiban-header">
            <img id="assetDaibanHeader" src="daiban.jpg" alt="待办">
        </div>
        <div class="daiban-panel">
            <div class="daiban-tabs" role="tablist">
                <button type="button" class="daiban-tab active" data-tab="pending" role="tab" aria-selected="true">未办结</button>
                <button type="button" class="daiban-tab" data-tab="done" role="tab" aria-selected="false">已办结</button>
            </div>
            <div class="daiban-empty" id="daibanEmptyPanel" role="tabpanel">
                <div class="daiban-empty-illustration">
                    <img src="shuiming_empty.png" alt="" loading="lazy" decoding="async">
                </div>
                <p class="daiban-empty-text" id="daibanEmptyText">暂无未办结事项</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="shouye.html" class="nav-item" data-icon="sy">
            <div class="nav-icon">
                <img src="caidan/sy2.png" width="19" height="19" alt="首页">
            </div>
            <span class="nav-text">首页</span>
        </a>
        <a href="daiban.html" class="nav-item active" data-icon="db">
            <div class="nav-icon">
                <img src="caidan/db1.png" width="19" height="19" alt="待办">
            </div>
            <span class="nav-text">待办</span>
        </a>
        <a href="bancha.html" class="nav-item" data-icon="bc">
            <div class="nav-icon">
                <img src="caidan/bc2.png" width="19" height="19" alt="办查">
            </div>
            <span class="nav-text">办&查</span>
        </a>
        <a href="message.html" class="nav-item" data-icon="xx">
            <div class="nav-icon">
                <img src="caidan/xx2.png" width="19" height="19" alt="消息">
            </div>
            <span class="nav-text">消息</span>
        </a>
        <a href="mine.html" class="nav-item" data-icon="w">
            <div class="nav-icon">
                <img src="caidan/w2.png" width="19" height="19" alt="我的">
            </div>
            <span class="nav-text">我的</span>
        </a>
    </div>
    <script>
        (function () {
            var tabs = document.querySelectorAll('.daiban-tab');
            var emptyText = document.getElementById('daibanEmptyText');
            var labels = {
                pending: '暂无未办结事项',
                done: '暂无已办结事项'
            };

            function setTab(name) {
                tabs.forEach(function (btn) {
                    var on = btn.getAttribute('data-tab') === name;
                    btn.classList.toggle('active', on);
                    btn.setAttribute('aria-selected', on ? 'true' : 'false');
                });
                if (emptyText && labels[name]) {
                    emptyText.textContent = labels[name];
                }
            }

            var tabFromUrl = '';
            try {
                tabFromUrl = new URLSearchParams(window.location.search).get('tab') || '';
            } catch (e) {}
            if (tabFromUrl === 'done' || tabFromUrl === 'pending') {
                setTab(tabFromUrl);
            }

            tabs.forEach(function (btn) {
                btn.addEventListener('click', function () {
                    setTab(btn.getAttribute('data-tab'));
                });
            });
        })();

        function updateNavIcons() {
            var navItems = document.querySelectorAll('.bottom-nav .nav-item');
            navItems.forEach(function (item) {
                var icon = item.getAttribute('data-icon');
                var img = item.querySelector('.nav-icon img');
                if (item.classList.contains('active')) {
                    img.src = 'caidan/' + icon + '1.png';
                } else {
                    img.src = 'caidan/' + icon + '2.png';
                }
            });
            if (window.__refreshNavFromMineUi) {
                window.__refreshNavFromMineUi();
            }
        }

        updateNavIcons();

        (function () {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) {
                var bottomNav = document.querySelector('.bottom-nav');
                if (bottomNav) {
                    bottomNav.classList.add('ios-device');
                }
            }
        })();
    </script>
    <script src="/js/watermark.js?v=20260511-mine-wm"></script>
</body>
</html>
