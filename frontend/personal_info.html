<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background-color: #f5f6fa;
            min-height: 100vh;
        }

        .header {
            background: #fff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #f0f0f0;
        }

        .back-btn {
            position: absolute;
            left: 12px;
            color: #1e6fff;
            font-size: 15px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 2px;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .back-btn span:first-child {
            font-size: 23px;
            margin-right: 2px;
        }

        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #333;
        }

        .menu-container {
            background: #fff;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .menu-item:active {
            background: #f5f5f5;
        }

        .menu-text {
            font-size: 16px;
            color: #333;
        }

        .menu-arrow {
            font-size: 18px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="mine.html" class="back-btn">
            <img src="jt.png" alt="" style="width: 9px; vertical-align: middle;">
            <span>返回</span>
        </a>
        <span class="header-title">个人信息</span>
    </div>

    <div class="menu-container">
        <div class="menu-item" onclick="goBasicInfo()">
            <span class="menu-text">基本信息</span>
            <span class="menu-arrow">&gt;</span>
        </div>
        <div class="menu-item" onclick="goTaxBenefit()">
            <span class="menu-text">可享税收优惠</span>
            <span class="menu-arrow">&gt;</span>
        </div>
        <div class="menu-item" onclick="goOtherID()">
            <span class="menu-text">其他身份证件</span>
            <span class="menu-arrow">&gt;</span>
        </div>
    </div>

    <script>
        function goBasicInfo() {
            window.location.href = 'gerenxinxi.html';
        }

        function goTaxBenefit() {
            window.location.href = 'tax_benefit.html';
        }

        function goOtherID() {
            window.location.href = 'other_id.html';
        }
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
