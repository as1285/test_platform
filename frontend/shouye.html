<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f6f7fb;
            min-height: 100vh;
        }
        
        .shouye-page {
            min-height: 100vh;
            background: #f6f7fb;
        }
        
        .shouye-header {
            background: rgb(var(--shouye-top-bar-rgb));
        }
        
        /* 搜索框容器 */
        .search-bar-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 14px;
            background: transparent;
            transition: background 0.3s ease;
        }
        
        .search-bar-wrapper.scrolled {
            background: rgb(var(--shouye-top-bar-rgb));
        }
        
        .search-bar {
            flex: 1;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 8px;
            padding: 9px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .search-bar .search-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        
        .search-bar .search-icon svg {
            width: 18px;
            height: 18px;
        }
        
        .search-bar .search-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: 0.5px;
        }
        
        .scan-btn {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .scan-btn svg {
            width: 26px;
            height: 26px;
        }
        
        .shouye-header img {
            width: 100%;
            display: block;
        }
        
        .shouye-content {
            background: #f6f7fb;
            position: relative;
            z-index: 5;
            min-height: calc(100vh - 120px);
            padding-bottom: 118px;
        }
        
        /* 消息滚动条 */
        .notice-bar {
            position: absolute;
            top: 57px;
            left: 12px;
            right: 12px;
            background: linear-gradient(135deg, #fff9e6 0%, #fff5d6 100%);
            border-radius: 10px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            z-index: 999;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        .notice-icon {
            width: 21px;
            height: 21px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 8px;
        }
        
        .notice-icon svg {
            width: 16px;
            height: 16px;
        }
        
        .notice-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            height: 20px;
        }
        
        .notice-text {
            white-space: nowrap;
            font-size: 14px;
            color: #d48806;
            font-weight: 500;
            display: inline-block;
        }
        
        
        .notice-slider {
            flex: 1;
            overflow: hidden;
            position: relative;
            height: 20px;
        }

        .notice-row {
            display: flex;
            align-items: center;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transition: transform 0.4s ease;
        }

        .notice-row.current {
            transform: translateY(0);
        }

        .notice-row.next-below {
            transform: translateY(100%);
        }

        .notice-row.exit-up {
            transform: translateY(-100%);
        }

        /* 置顶服务三卡片：与 zdfwdb 图、下方 lb 轮播一致 — 左收入纳税明细 | 中纳税记录开具 | 右异议申诉 */
        .svc-cards-wrap {
            position: relative;
            display: block;
        }
        .svc-cards-wrap > img {
            width: 100%;
            display: block;
            vertical-align: top;
        }
        .svc-hot {
            position: absolute;
            z-index: 4;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
            background: transparent;
            top: 40%;
            bottom: 1%;
        }
        .svc-hot-left { left: 0; width: 33.33%; }
        .svc-hot-mid { left: 33.33%; width: 33.33%; }
        .svc-hot-right { left: 66.66%; width: 33.34%; }

        /* 轮播图内「重点服务推荐」三卡热区（相对 lb 图比例，与常见稿式对齐；若与设计稿有偏差可微调 top/height） */
        .shouye-lb-wrap {
            position: relative;
            display: block;
            line-height: 0;
        }
        .shouye-lb-wrap > img {
            width: 100%;
            display: block;
        }
        .lb-svc-hot {
            position: absolute;
            z-index: 6;
            left: 0;
            width: 33.33%;
            top: 14%;
            height: 32%;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            touch-action: manipulation;
            background: transparent;
        }
        .lb-svc-hot-mid { left: 33.33%; }
        .lb-svc-hot-right { left: 66.66%; width: 33.34%; }

        </style>
    <link rel="stylesheet" href="css/nav.css">
    <script src="/js/theme-loader.js" defer></script>
</head>
<body>
    <!-- 固定搜索框 -->
    <div class="search-bar-wrapper">
        <div class="search-bar">
            <div class="search-icon">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="11" cy="11" r="7" stroke="rgba(255,255,255,0.9)" stroke-width="2"/>
                    <path d="M21 21l-4.35-4.35" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <span class="search-text">请输入想搜索的功能/服务</span>
        </div>
        <div class="scan-btn">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M3 7V5a2 2 0 012-2h2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M17 3h2a2 2 0 012 2v2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M21 17v2a2 2 0 01-2 2h-2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 21H5a2 2 0 01-2-2v-2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="9" y1="12" x2="15" y2="12" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
    </div>
    
    <div class="shouye-page">
        <div class="shouye-header">
            <div style="position: relative;">
                <img id="assetShouyeBanner" src="sydb-v2.jpg?v=3" alt="首页">
                <!-- 消息滚动条 -->
                <div class="notice-bar">
                    <div class="notice-icon" style="flex-shrink:0;"><img src="ld.png" style="width:21px;object-fit:contain;"></div>
                    <div class="notice-slider">
                        <div id="noticeRow0" class="notice-row current">
                            <span class="notice-text" id="noticeText0">国家税务总局令第57号：《个人所得税综合所得汇算清缴管理办法》</span>
                        </div>
                        <div id="noticeRow1" class="notice-row next-below">
                            <span class="notice-text" id="noticeText1">关于近期虚假退税宣传的温馨提示</span>
                        </div>
                    </div>
                </div>
                <script>
                (function() {
                    var row0 = document.getElementById('noticeRow0');
                    var row1 = document.getElementById('noticeRow1');
                    var text0 = document.getElementById('noticeText0');
                    var rafId = null;

                    function startScroll() {
                        row0.style.transition = 'none';
                        row1.style.transition = 'none';
                        row0.className = 'notice-row current';
                        row1.className = 'notice-row next-below';
                        text0.style.transform = 'translateX(0)';

                        requestAnimationFrame(function() {
                            // notice-slider是text0的祖父元素（text0 -> notice-row -> notice-slider）
                            var slider = text0.parentElement.parentElement;
                            slider.style.overflow = 'visible';
                            var containerLeft = slider.getBoundingClientRect().left;
                            var initialRight = text0.getBoundingClientRect().right;
                            slider.style.overflow = '';
                            // 文字右边缘到容器左边缘的距离 = 文字真实宽度
                            var total = initialRight - containerLeft;
                            var speed = 80; // px/s
                            var pos = 0;
                            var last = null;

                            function step(ts) {
                                if (!last) last = ts;
                                var delta = (ts - last) / 1000;
                                last = ts;
                                pos += speed * delta;
                                text0.style.transform = 'translateX(-' + pos + 'px)';
                                if (pos < total) {
                                    rafId = requestAnimationFrame(step);
                                } else {
                                    slideUp();
                                }
                            }
                            rafId = requestAnimationFrame(step);
                        });
                    }

                    function slideUp() {
                        // 两行同时向上滑动
                        row0.style.transition = 'transform 0.4s ease';
                        row1.style.transition = 'transform 0.4s ease';
                        row0.className = 'notice-row exit-up';
                        row1.className = 'notice-row current';
                        // 第二条静止1秒后滑回
                        setTimeout(function() {
                            slideDown();
                        }, 1000);
                    }

                    function slideDown() {
                        // 第一条从下方进入，第二条滑出上方
                        row0.style.transition = 'none';
                        row0.className = 'notice-row next-below';
                        requestAnimationFrame(function() {
                            requestAnimationFrame(function() {
                                row0.style.transition = 'transform 0.4s ease';
                                row1.style.transition = 'transform 0.4s ease';
                                row0.className = 'notice-row current';
                                row1.className = 'notice-row exit-up';
                                setTimeout(function() {
                                    // 回到第一条，暂停500ms后滚动
                                    setTimeout(startScroll, 500);
                                }, 400);
                            });
                        });
                    }

                    // 初始暂停500ms后开始滚动
                    setTimeout(startScroll, 500);
                })();
                </script>
            </div>
            <div class="svc-cards-wrap">
                <img id="assetShouyeZdfwdb" src="zdfwdb.jpg" alt="置顶服务">
                <a href="shuiming.html?reset=1" class="svc-hot svc-hot-left" aria-label="收入纳税明细"></a>
                <a href="najilu.html" class="svc-hot svc-hot-mid" aria-label="纳税记录开具"></a>
                <a href="daiban.html" class="svc-hot svc-hot-right" aria-label="异议申诉"></a>
            </div>
        </div>
        <div class="shouye-content">
            <div class="shouye-lb-wrap">
                <img id="assetShouyeLb" src="lb.jpg" alt="轮播">
                <a href="shuiming.html?reset=1" class="lb-svc-hot" aria-label="收入纳税明细"></a>
                <a href="najilu.html" class="lb-svc-hot lb-svc-hot-mid" aria-label="纳税记录开具"></a>
                <a href="daiban.html" class="lb-svc-hot lb-svc-hot-right" aria-label="异议申诉"></a>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a href="shouye.html" class="nav-item active" data-icon="sy">
            <div class="nav-icon">
                <img src="caidan/sy1.png" width="19" height="19" alt="首页">
            </div>
            <span class="nav-text">首页</span>
        </a>
        <a href="daiban.html" class="nav-item" data-icon="db">
            <div class="nav-icon">
                <img src="caidan/db2.png" width="19" height="19" alt="待办">
            </div>
            <span class="nav-text">待办</span>
        </a>
        <a href="bancha.html" class="nav-item" data-icon="bc">
            <div class="nav-icon">
                <img src="caidan/bc2.png" width="19" height="19" alt="办查">
            </div>
            <span class="nav-text">办&查</span>
        </a>
        <a href="message.html" class="nav-item" data-icon="xx">
            <div class="nav-icon">
                <img src="caidan/xx2.png" width="19" height="19" alt="消息">
            </div>
            <span class="nav-text">消息</span>
        </a>
        <a href="mine.html" class="nav-item" data-icon="w">
            <div class="nav-icon">
                <img src="caidan/w2.png" width="19" height="19" alt="我的">
            </div>
            <span class="nav-text">我的</span>
        </a>
    </div>
    <script>
        // 监听滚动事件：固定搜索条底色随主题（蓝/金）渐显，与 .shouye-header 一致
        var searchWrapper = document.querySelector('.search-bar-wrapper');
        var scrollThreshold = 200;

        function shouyeTopBarRgb() {
            var raw = getComputedStyle(document.documentElement).getPropertyValue('--shouye-top-bar-rgb').trim();
            return raw || '44, 128, 244';
        }

        function updateSearchBarScrollBg() {
            var scrollY = window.scrollY || window.pageYOffset;
            var opacity = Math.min(scrollY / scrollThreshold, 1);
            searchWrapper.style.background = 'rgba(' + shouyeTopBarRgb() + ', ' + opacity + ')';
        }

        window.addEventListener('scroll', updateSearchBarScrollBg);
        window.addEventListener('mineUiConfig', updateSearchBarScrollBg);
        updateSearchBarScrollBg();
        
        // 更新底部导航图标状态
        function updateNavIcons() {
            var navItems = document.querySelectorAll('.bottom-nav .nav-item');
            navItems.forEach(function(item) {
                var icon = item.getAttribute('data-icon');
                var img = item.querySelector('.nav-icon img');
                if (item.classList.contains('active')) {
                    img.src = 'caidan/' + icon + '1.png';
                } else {
                    img.src = 'caidan/' + icon + '2.png';
                }
            });
            if (window.__refreshNavFromMineUi) {
                window.__refreshNavFromMineUi();
            }
        }
        
        // 初始化时更新图标
        updateNavIcons();
        
        // iOS设备检测，底部导航上移
        (function() {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) {
                var bottomNav = document.querySelector('.bottom-nav');
                if (bottomNav) {
                    bottomNav.classList.add('ios-device');
                }
            }
        })();
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
