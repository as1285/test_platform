<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <script src="/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>办&查</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
        }
        
        /* 办&查页面样式 */
        .bancha-page {
            min-height: 100vh;
            background: #f5f6fa;
        }
        
        .bancha-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }
        
        .bancha-header::after {
            content: '';
            bottom: 0;
            background: #f5f6fa;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }
        
        .bancha-header-content {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }
        
        .bancha-title {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
        }
        
        .bancha-subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 13px;
        }
        
        .bancha-content {
            background: #fff;
            border-radius: 16px 16px 0 0;
            margin-top: 80px;
            position: relative;
            z-index: 5;
            min-height: calc(100vh - 120px);
            padding-bottom: 100px;
        }
        
    </style>
    <link rel="stylesheet" href="css/nav.css">
</head>
<body>
    <div class="bancha-page">
        <div class="bancha-header">
            <img src="db.jpg" alt="办&查" style="width: 100%; display: block;">
        </div>
        <div class="bancha-content">
            <img src="bs.jpg" alt="办税" style="width: 100%; display: block; border-radius: 16px 16px 0 0;">
            <img src="cx.jpg" alt="查询" style="width: 100%; display: block;">
            <img src="fp.jpg" alt="发票" style="width: 100%; display: block;">
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <a href="shouye.html" class="nav-item" data-icon="sy">
            <div class="nav-icon">
                <img src="caidan/sy2.png" width="19" height="19" alt="首页">
            </div>
            <span class="nav-text">首页</span>
        </a>
        <a href="daiban.html" class="nav-item" data-icon="db">
            <div class="nav-icon">
                <img src="caidan/db2.png" width="19" height="19" alt="待办">
            </div>
            <span class="nav-text">待办</span>
        </a>
        <a href="bancha.html" class="nav-item active" data-icon="bc">
            <div class="nav-icon">
                <img src="caidan/bc1.png" width="19" height="19" alt="办查">
            </div>
            <span class="nav-text">办&查</span>
        </a>
        <a href="message.html" class="nav-item" data-icon="xx">
            <div class="nav-icon">
                <img src="caidan/xx2.png" width="19" height="19" alt="消息">
            </div>
            <span class="nav-text">消息</span>
        </a>
        <a href="mine.html" class="nav-item" data-icon="w">
            <div class="nav-icon">
                <img src="caidan/w2.png" width="19" height="19" alt="我的">
            </div>
            <span class="nav-text">我的</span>
        </a>
    </div>
    <script>
        // 更新底部导航图标状态
        function updateNavIcons() {
            var navItems = document.querySelectorAll('.bottom-nav .nav-item');
            navItems.forEach(function(item) {
                var icon = item.getAttribute('data-icon');
                var img = item.querySelector('.nav-icon img');
                if (item.classList.contains('active')) {
                    img.src = 'caidan/' + icon + '1.png';
                } else {
                    img.src = 'caidan/' + icon + '2.png';
                }
            });
        }
        
        // 初始化时更新图标
        updateNavIcons();
        
        // iOS设备检测，底部导航上移
        (function() {
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            if (isIOS) {
                var bottomNav = document.querySelector('.bottom-nav');
                if (bottomNav) {
                    bottomNav.classList.add('ios-device');
                }
            }
        })();
    </script>
    <script src="/js/watermark.js"></script>
</body>
</html>
