# 仅构建 Debug APK（供自测 / 内部分发），不包含上架、Release 签名。
# 产物：Artifacts → android-debug-apk → app-debug.apk
# 本地：cd cordova-app && npx cordova build android --debug
name: Cordova Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "cordova-app/**"
      - ".github/workflows/cordova-android.yml"

env:
  # 按照 GitHub Actions 警告建议，强制使用 Node.js 24 运行 Action 以避免弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cordova-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          npm install
          npx cordova telemetry off

      - name: Add Android platform
        run: npx cordova platform add android@13 --no-interactive

      - name: Build debug APK
        run: npx cordova build android --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: cordova-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
