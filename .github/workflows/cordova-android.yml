# 在 GitHub Actions 云端打包 Cordova Android Debug APK（无需本地 Android SDK）。
#
# 如何取包：仓库 → Actions → 本工作流 → 选一次成功运行 → Artifacts → android-debug-apk → 下载 zip（内含 app-debug.apk）
# 手动触发：Actions → Cordova Android Debug APK → Run workflow
#
# 仅 Debug 包（自测 / 内部分发）；上架需另行配置 Release 签名与 Play 流程。
# 本地等价命令：cd cordova-app && npx cordova build android --debug
name: Cordova Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "cordova-app/**"
      - ".github/workflows/cordova-android.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cordova-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cordova-app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-cordova-${{ hashFiles('cordova-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-cordova-
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          npm ci
          npx cordova telemetry off

      - name: Generate splash & icon assets
        run: |
          python3 -m pip install --user --quiet Pillow
          npm run generate-assets

      - name: Add Android platform
        run: npx cordova platform add android@13 --no-interactive

      - name: Build debug APK
        run: npx cordova build android --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: cordova-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
