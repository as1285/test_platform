# 在 GitHub Actions macOS Runner 上打 Cordova iOS Simulator Debug 包（验证工程可编译）。
# 取包：Actions → 本工作流 → Artifacts → ios-simulator-debug-app。
# 手动触发：Actions → Cordova iOS Simulator Debug → Run workflow。
#
# 上架真机 / App Store 需另行配置 Apple 开发者证书与描述文件（本工作流不包含签名上架）。
# 本地等价：cd cordova-app && npx cordova build ios --debug --emulator
name: Cordova iOS Simulator Debug

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "cordova-app/**"
      - ".github/workflows/cordova-ios.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: cordova-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cordova-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow (splash asset script)
        run: pip install Pillow

      - name: Install dependencies
        run: |
          npm ci
          npx cordova telemetry off

      - name: Generate splash & icon assets
        run: npm run generate-assets

      - name: Add iOS platform
        run: npx cordova platform add ios --no-interactive

      - name: Build iOS (Simulator)
        run: npx cordova build ios --debug --emulator

      # upload-artifact 相对仓库根解析路径；本 job 的 run 在 cordova-app 下，须写绝对路径或 cordova-app/ 前缀
      - name: Locate .app bundle
        id: locate
        run: |
          APP=$(find platforms/ios -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app bundle found under platforms/ios"
            find platforms/ios -type d | head -100
            exit 1
          fi
          echo "path=$(pwd)/$APP" >> "$GITHUB_OUTPUT"
          echo "Found: $(pwd)/$APP"

      - name: Upload Simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-debug-app
          path: ${{ steps.locate.outputs.path }}
          if-no-files-found: error
