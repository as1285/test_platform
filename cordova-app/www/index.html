<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
    <title>加载中</title>
    <meta name="theme-color" content="#1e6fff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1e6fff; }
        #app-frame { border: 0; width: 100%; height: 100%; display: block; }
        #startup-screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            background: #fff url("splash.png") center center / cover no-repeat;
            transition: opacity 0.25s ease;
        }
        #startup-screen.hide {
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <script>
        (function () {
            // 远程站点 URL。若可配置 HTTPS，建议改用 https://，iframe 内子页面也会更「干净」。
            var APP_ORIGIN = 'http://139.199.191.204/';
            if (!APP_ORIGIN || !/^https?:\/\//i.test(APP_ORIGIN)) {
                document.body.innerHTML = '<p style="padding:24px;font-family:system-ui,sans-serif;color:#666;text-align:center">请编辑 <code>cordova-app/www/index.html</code> 中的 <code>APP_ORIGIN</code> 为实际站点 URL 后重新打包 APK。</p>';
                return;
            }
            // 使用全屏 iframe 嵌入远程页，主文档仍停留在壳内资源，避免「整页跳转到 http」时
            // WebView 在顶部对主框架显示「不安全」等系统级连接提示（与用 location.replace 打开不同）。
            function mount() {
                var f = document.createElement('iframe');
                f.id = 'app-frame';
                f.setAttribute('title', '应用');
                f.setAttribute('importance', 'high');
                f.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
                f.src = APP_ORIGIN;
                f.addEventListener('load', function () {
                    var s = document.getElementById('startup-screen');
                    if (s) {
                        s.classList.add('hide');
                        setTimeout(function () {
                            if (s && s.parentNode) {
                                s.parentNode.removeChild(s);
                            }
                        }, 300);
                    }
                });
                document.body.appendChild(f);
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', mount);
            } else {
                mount();
            }
            document.addEventListener('deviceready', function () {
                if (window.StatusBar) {
                    StatusBar.overlaysWebView(false);
                    StatusBar.backgroundColorByHexString('#1e6fff');
                    StatusBar.styleLightContent();
                }
            });
        })();
    </script>
</head>
<body><div id="startup-screen" aria-hidden="true"></div></body>
</html>
